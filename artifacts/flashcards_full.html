<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAB 2026 — Full Deck Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #141210;
    --surface:    #1e1b18;
    --surface2:   #262320;
    --border:     #3a3530;
    --text:       #e2d9cc;
    --text-muted: #8a8078;
    --accent:     #c9954a;
    --accent-dim: rgba(201,149,74,0.12);
    --correct:    #4a7c59;
    --correct-bg: rgba(74,124,89,0.15);
    --wrong:      #8b4040;
    --wrong-bg:   rgba(139,64,64,0.15);
    --warn:       #7c6b3a;
    --warn-bg:    rgba(124,107,58,0.15);
    --radius:     10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    line-height: 1.65;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.4; z-index: 0;
  }

  .container { position: relative; z-index: 1; width: 100%; max-width: 720px; }

  /* ---- Header ---- */
  header { text-align: center; margin-bottom: 40px; }
  .eyebrow {
    font-size: 11px; font-weight: 300; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700; line-height: 1.2; margin-bottom: 14px;
  }
  .session-stats {
    display: flex; justify-content: center; gap: 24px;
    font-size: 13px; color: var(--text-muted);
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 20px; color: var(--accent); line-height: 1;
  }
  .stat-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }

  /* ---- Mastery overview bar ---- */
  .mastery-overview {
    margin-bottom: 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .mastery-ring-wrap { position: relative; flex-shrink: 0; }
  .mastery-ring-wrap svg { transform: rotate(-90deg); }
  .mastery-ring-wrap circle { fill: none; stroke-width: 6; stroke-linecap: round; }
  .ring-track { stroke: var(--border); }
  .ring-fill { stroke: var(--accent); transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1); }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-pct { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--accent); line-height: 1; }
  .ring-sub { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }

  .mastery-bars { flex: 1; }
  .mastery-bar-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 3px; font-size: 11px; color: var(--text-muted);
  }
  .mastery-bar-label { width: 64px; text-align: right; flex-shrink: 0; }
  .mastery-bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .mastery-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .mastery-bar-count { width: 28px; font-size: 10px; }

  /* ---- Card ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .module-badge {
    display: inline-block;
    font-size: 10px; font-weight: 300; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(201,149,74,0.25);
    border-radius: 20px; padding: 2px 10px;
    margin-bottom: 14px;
  }

  .card-label {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700; line-height: 1.25;
    color: var(--text); margin-bottom: 18px;
  }

  /* Mastery micro-bar */
  .micro-mastery { margin-bottom: 24px; }
  .micro-mastery-head {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px;
  }
  .micro-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .micro-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; background: var(--accent); }

  .btn-reveal {
    width: 100%; padding: 14px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Source Serif 4', serif; font-size: 15px;
    letter-spacing: 0.04em; cursor: pointer;
    transition: background 0.18s, color 0.18s;
  }
  .btn-reveal:hover { background: var(--accent); color: var(--bg); }

  /* Back of card */
  .definition {
    font-size: 15px; line-height: 1.75;
    color: var(--text); margin-bottom: 28px;
    border-top: 1px solid var(--border); padding-top: 20px;
  }

  .rating-prompt {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 12px; text-align: center;
  }
  .rating-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

  .btn-rate {
    padding: 12px 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'Source Serif 4', serif; font-size: 13px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s;
    text-align: center; line-height: 1.3;
  }
  .btn-rate:hover { transform: translateY(-2px); }
  .btn-rate.fail:hover  { border-color: var(--wrong);   background: var(--wrong-bg); }
  .btn-rate.hard:hover  { border-color: var(--warn);    background: var(--warn-bg); }
  .btn-rate.good:hover  { border-color: var(--accent);  background: var(--accent-dim); }
  .btn-rate.easy:hover  { border-color: var(--correct); background: var(--correct-bg); }

  .btn-rate .rate-label { font-size: 11px; color: var(--text-muted); display: block; margin-top: 3px; }

  /* Next interval hint */
  .interval-hints {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-top: 6px;
  }
  .interval-hint {
    text-align: center; font-size: 10px;
    color: var(--text-muted); letter-spacing: 0.06em;
  }

  /* ---- Credit propagation panel ---- */
  .credit-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 32px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease both;
  }
  .credit-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-weight: 600;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .credit-title .delta-badge {
    font-family: 'Source Serif 4', serif;
    font-size: 11px; padding: 2px 8px;
    border-radius: 20px;
  }
  .credit-title.negative .delta-badge { background: var(--wrong-bg); color: #c46060; border: 1px solid rgba(139,64,64,0.3); }
  .credit-title.positive .delta-badge { background: var(--correct-bg); color: #6aaa7e; border: 1px solid rgba(74,124,89,0.3); }
  .credit-title.neutral  .delta-badge { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(201,149,74,0.2); }

  .credit-entries { display: flex; flex-direction: column; gap: 6px; }
  .credit-entry {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 6px;
    font-size: 13px; animation: fadeUp 0.2s ease both;
  }
  .credit-entry.backward { background: var(--wrong-bg); }
  .credit-entry.forward  { background: var(--correct-bg); }
  .credit-arrow { font-size: 14px; flex-shrink: 0; }
  .credit-concept { flex: 1; color: var(--text); }
  .credit-delta {
    font-family: 'Playfair Display', serif;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .credit-delta.neg { color: #c46060; }
  .credit-delta.pos { color: #6aaa7e; }
  .credit-hop { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
  .credit-none { font-size: 13px; color: var(--text-muted); font-style: italic; }

  .btn-next {
    width: 100%; padding: 13px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 8px; color: var(--accent);
    font-family: 'Source Serif 4', serif; font-size: 15px;
    letter-spacing: 0.04em; cursor: pointer; margin-top: 12px;
    transition: background 0.18s, color 0.18s;
  }
  .btn-next:hover { background: var(--accent); color: var(--bg); }

  /* ---- Bottom dashboard ---- */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 4px;
  }
  .dash-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
  }
  .dash-title {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 14px;
  }

  .weakest-entry {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .weakest-entry:last-child { border-bottom: none; }
  .weakest-label { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .weakest-bar-wrap { width: 48px; height: 4px; background: var(--border); border-radius: 2px; flex-shrink: 0; }
  .weakest-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .weakest-pct { width: 28px; text-align: right; color: var(--text-muted); font-size: 11px; flex-shrink: 0; }

  .due-entry {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .due-entry:last-child { border-bottom: none; }
  .due-label { color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .due-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 12px; flex-shrink: 0; margin-left: 8px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .due-tag.overdue  { background: var(--wrong-bg);   color: #c46060; }
  .due-tag.today    { background: var(--accent-dim);  color: var(--accent); }
  .due-tag.tomorrow { background: var(--surface2);    color: var(--text-muted); }

  .reset-btn {
    margin-top: 16px; width: 100%; padding: 9px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-muted);
    font-family: 'Source Serif 4', serif; font-size: 12px;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--wrong); color: #c46060; }

  .hidden { display: none !important; }

  @media (max-width: 520px) {
    .card { padding: 24px 20px; }
    .rating-btns { grid-template-columns: repeat(2, 1fr); }
    .dashboard { grid-template-columns: 1fr; }
    .mastery-overview { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">FAB 2026 — Flashcards</div>
    <h1 id="deck-title">FAB 2026 — Full Deck Flashcards</h1>
    <div class="session-stats">
      <div class="stat">
        <span class="stat-num" id="stat-due">0</span>
        <span class="stat-label">due now</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-mastered">0</span>
        <span class="stat-label">mastered</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-session">0</span>
        <span class="stat-label">this session</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-total">315</span>
        <span class="stat-label">total cards</span>
      </div>
    </div>
  </header>

  <!-- Mastery overview -->
  <div class="mastery-overview">
    <div class="mastery-ring-wrap">
      <svg viewBox="0 0 80 80" width="80" height="80">
        <circle class="ring-track" cx="40" cy="40" r="34"/>
        <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34"/>
      </svg>
      <div class="ring-center">
        <span class="ring-pct" id="ring-pct">0%</span>
        <span class="ring-sub">done</span>
      </div>
    </div>
    <div class="mastery-bars" id="mastery-bars"></div>
  </div>

  <!-- Flashcard (front) -->
  <div class="card" id="card-front">
    <div class="module-badge" id="card-module">Module —</div>
    <div class="card-label" id="card-label">Loading…</div>
    <div class="micro-mastery">
      <div class="micro-mastery-head">
        <span>Mastery estimate</span>
        <span id="card-mastery-pct">—</span>
      </div>
      <div class="micro-track"><div class="micro-fill" id="card-mastery-fill" style="width:0%"></div></div>
    </div>
    <button class="btn-reveal" onclick="flipCard()">Reveal Definition →</button>
  </div>

  <!-- Flashcard (back) -->
  <div class="card hidden" id="card-back">
    <div class="module-badge" id="card-module-back">Module —</div>
    <div class="card-label" id="card-label-back"></div>
    <p class="definition" id="card-definition"></p>
    <div class="rating-prompt">How well did you recall this?</div>
    <div class="rating-btns">
      <button class="btn-rate fail" onclick="rate(0)">✗<span class="rate-label">Forgot</span></button>
      <button class="btn-rate hard" onclick="rate(1)">≈<span class="rate-label">Hard</span></button>
      <button class="btn-rate good" onclick="rate(2)">✓<span class="rate-label">Good</span></button>
      <button class="btn-rate easy" onclick="rate(3)">★<span class="rate-label">Easy</span></button>
    </div>
    <div class="interval-hints" id="interval-hints"></div>
  </div>

  <!-- Credit propagation panel -->
  <div class="card credit-panel hidden" id="credit-panel">
    <div class="credit-title" id="credit-title"></div>
    <div class="credit-entries" id="credit-entries"></div>
    <button class="btn-next" onclick="nextCard()">Next Card →</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="dash-panel">
      <div class="dash-title">Weakest Concepts</div>
      <div id="weakest-list"></div>
    </div>
    <div class="dash-panel">
      <div class="dash-title">Coming Up</div>
      <div id="due-list"></div>
      <button class="reset-btn" onclick="confirmReset()">Reset all progress</button>
    </div>
  </div>

</div>

d optimisation.", "module": 4}, {"id": "paradigms", "label": "Paradigms", "description": "Dominant frameworks or worldviews that structure inquiry, methodology, and shared assumptions within a field.", "module": 4}, {"id": "pattern_matching", "label": "Pattern Matching", "description": "The process of checking whether a given input matches a stored template or rule condition.", "module": 4}, {"id": "pattern_recognition", "label": "Pattern Recognition", "description": "The identification of regularities, categories, or known templates in sensory or symbolic input.", "module": 4}, {"id": "principle_of_locality", "label": "Principle of Locality", "description": "The observation that, even for highly complex problems, most constraints can usually be reduced to binary constraints (between two variables), allowing agents to process only local interdependencies and avoid combinatorial complexity.", "module": 4}, {"id": "probabilities", "label": "Probabilities", "description": "Numerical measures in [0, 1] of the likelihood of events in a sample space.", "module": 4}, {"id": "productions", "label": "Productions", "description": "IF-THEN rules in a production system that fire when their condition patterns match elements in working memory.", "module": 4}, {"id": "relational_databases", "label": "Relational Databases", "description": "Data storage systems that organise information in structured tables with defined relations, queried via SQL.", "module": 4}, {"id": "representation", "label": "Representation", "description": "The encoding of information about the world in a format that an agent can store, retrieve, reason over, and act upon.", "module": 4}, {"id": "representation_learning", "label": "Representation Learning", "description": "The automatic discovery of useful feature representations from raw data, enabling downstream tasks without manual engineering.", "module": 4}, {"id": "schema", "label": "Schema", "description": "An abstract pattern or template that organises pulation-based search with variation and selection.", "module": 5}, {"id": "fitness", "label": "Fitness", "description": "A scalar measure of how well an individual solution performs on the objective, determining its reproductive success.", "module": 5}, {"id": "fitness_function", "label": "Fitness Function", "description": "The function that evaluates and assigns a fitness score to each individual chromosome in a population.", "module": 5}, {"id": "fitness_measure", "label": "Fitness Measure", "description": "The criterion or metric used to evaluate and rank individuals relative to the optimisation objective.", "module": 5}, {"id": "genes", "label": "Genes", "description": "The individual units of a chromosome, each encoding a specific feature or decision variable of the solution.", "module": 5}, {"id": "genetic_algorithms", "label": "Genetic Algorithms", "description": "Evolutionary algorithms that encode solutions as chromosomes and use selection, crossover, and mutation to search solution spaces.", "module": 5}, {"id": "genetic_sequences", "label": "Genetic Sequences", "description": "Ordered strings of genes forming chromosomes, constituting the solution encoding in a genetic algorithm.", "module": 5}, {"id": "gene_allele", "label": "Gene–Allele Pair", "description": "The pairing of a gene position with its specific allele value in a chromosome.", "module": 5}, {"id": "genotype", "label": "Genotype", "description": "The internal genetic encoding of an individual, as distinct from its expressed behaviour or performance (phenotype).", "module": 5}, {"id": "implicit_parallelism", "label": "Implicit Parallelism", "description": "The property of genetic algorithms that simultaneously evaluates exponentially many schemata across the population.", "module": 5}, {"id": "long_jumping", "label": "Long Jumping", "description": "A mutation-heavy search strategy that makes large random moves across the fitness landscape to escape local optima.", "module": 5}, {"id": "market_mechanism", "label": "Market Mechanism", "description": "The use of price signals and competitive selection to coordinate decentralised decisions without central control.", "module": 5}, {"id": "mendelian_approach", "label": "Mendelian Approach", "description": "Genetics based on discrete heritable units (genes) that segregate independently, following Mendel's laws of inheritance.", "module": 5}, {"id": "mesa_landscape", "label": "Mesa Landscape", "description": "A fitness landscape with a broad flat plateau of similar performance, where many solutions are equally good.", "module": 5}, {"id": "mesa_topology", "label": "Mesa Topology", "description": "The topological structure of a performance landscape characterised by a large flat region (plateau) surrounded by steep edges.", "module": 5}, {"id": "modifications", "label": "Modifications", "description": "Changes to existing solutions produced by evolutionary operators, introducing incremental variation.", "module": 5}, {"id": "mutation", "label": "Mutation", "description": "A genetic operator that randomly alters individual genes in a chromosome to introduce variation and prevent stagnation.", "module": 5}, {"id": "natural_selection", "label": "Natural Selection", "description": "The biological process favouring heritable traits that improve survival and reproduction in a given environment.", "module": 5}, {"id": "novel_configurations", "label": "Novel Configurations", "description": "New combinations of features not present in any parent, produced by crossover and mutation operators.", "module": 5}, {"id": "performance_landscape", "label": "Performance Landscape", "description": "A metaphor mapping solution configurations to performance values, visualised as a terrain with peaks and valleys.", "module": 5}, {"id": "population_of_chromosomes", "label": "Population of Chromosomes", "description": "The set of candidate solutions maintained and collectively evolved by a genetic algorithm across generations.", "module": 5}, {"id": "population_level_learning", "label": "Population-Level Learning", "description": "Learning that occurs through the evolution of a population rather than adaptation within a single individual.", "module": 5}, {"id": "retention", "label": "Retention", "description": "The preservation of high-fitness solutions across generations, ensuring that good discoveries are not lost.", "module": 5}, {"id": "rugged_landscape", "label": "Rugged Landscape", "description": "A fitness landscape with many local optima, making gradient-based or greedy search likely to get trapped.", "module": 5}, {"id": "schema_genetic", "label": "Schema (Genetic)", "description": "A template specifying fixed values at certain gene positions and wildcards at others, representing a subset of the chromosome space.", "module": 5}, {"id": "selection", "label": "Selection", "description": "The evolutionary operator that preferentially chooses fitter individuals to reproduce in the next generation.", "module": 5}, {"id": "single_peaked_landscape", "label": "Single-Peaked Landscape", "description": "A fitness landscape with one global optimum and no local optima, making hill climbing sufficient for optimisation.", "module": 5}, {"id": "smoothing_topology", "label": "Smoothing Topology", "description": "Techniques that transform a rugged fitness landscape into a smoother one to aid optimisation, e.g., by averaging or relaxing constraints.", "module": 5}, {"id": "sparse_learning", "label": "Sparse Learning", "description": "Learning in environments where informative feedback is rare, making credit assignment especially difficult.", "module": 5}, {"id": "spatial_interdependence", "label": "Spatial Interdependence", "description": "The property that the fitness contribution of a gene depends on the values of neighbouring genes, causing epistasis in the landscape.", "module": 5}, {"id": "variation", "label": "Variation", "description": "The generation of diverse candidate solutions through mutation and crossover, supplying the raw material for selection.", "module": 5}, {"id": "vsr", "label": "Variation–Selection–Retention (VSR)", "description": "The three-step evolutionary loop: generate variation, select the fittest, and retain winners for the next generation.", "module": 5}, {"id": "advice_taker", "label": "Advice Taker", "description": "McCarthy's 1959 vision of a hypothetical AI system that learns new knowledge by being told facts in natural language, represents knowledge declaratively across situations, and reasons logically rather than through hard-coded procedures.", "module": 6}, {"id": "arc_consistency", "label": "Arc Consistency", "description": "A preprocessing level ensuring that for every value of one variable there exists a compatible value for every constrained neighbour.", "module": 6}, {"id": "beliefs", "label": "Beliefs", "description": "An agent's probability assignments over possible world states, representing its epistemic state given available evidence.", "module": 6}, {"id": "binary_constraint", "label": "Binary Constraint", "description": "A constraint that restricts the joint values of exactly two variables.", "module": 6}, {"id": "cells_objects", "label": "Cells / Objects", "description": "Basic units in a propagator network or spreadsheet that store values and propagate updates when their content changes.", "module": 6}, {"id": "chain_of_thought", "label": "Chain-of-Thought Reasoning", "description": "A prompting strategy for LLMs that instructs the model to reason step-by-step; described as a heuristic approach to commonsense reasoning under the deep learning KRR paradigm.", "module": 6}, {"id": "child_variable", "label": "Child Variable", "description": "A variable that is conditionally dependent on its parent variables in a DAG.", "module": 6}, {"id": "commonsense_reasoning", "label": "Commonsense Reasoning", "description": "The human-like ability to reason flexibly about real-world situations using commonsense knowledge; McCarthy argued this is the deepest challenge for AI credit assignment.", "module": 6}, {"id": "complete_assignment", "label": "Complete Assignment", "description": "An assignment of values to every variable in a CSP, which may or may not satisfy all constraints.", "module": 6}, {"id": "consistent_assignment", "label": "Consistent Assignment", "description": "An assignment that violates none of the active constraints for the variables assigned so far.", "module": 6}, {"id": "constraint_network", "label": "Constraint Network", "description": "A graph representing a CSP where nodes are variables and edges represent binary constraints between them.", "module": 6}, {"id": "csp", "label": "Constraint Satisfaction Problem (CSP)", "description": "A problem defined by a set of variables, their domains, and constraints that any solution must satisfy.", "module": 6}, {"id": "context_engineering", "label": "Context Engineering", "description": "The practice of selecting and providing relevant information at inference time — via prompts, retrieved documents, or other inputs — to condition an LLM's behaviour on a specific situation; a substitute for explicit context representation in deep learning KRR.", "module": 6}, {"id": "cost_function", "label": "Cost Function", "description": "A function mapping variable assignments to numerical costs, used to guide optimisation toward low-cost solutions.", "module": 6}, {"id": "costs_soft_violation", "label": "Costs of Soft Constraint Violation", "description": "The numerical penalty incurred by violating a soft constraint, used to rank assignments in optimisation problems.", "module": 6}, {"id": "database_integrity", "label": "Database Integrity", "description": "The enforcement of constraints ensuring data in a database remains consistent, valid, and free from corruption.", "module": 6}, {"id": "decision_models", "label": "Decision Models", "description": "Formal representations of options, outcomes, and preferences used to structure and resolve decision problems.", "module": 6}, {"id": "declarative_knowledge", "label": "Declarative Knowledge", "description": "Knowledge represented as stand-alone facts or concepts (as in a database), independent of any procedure — as opposed to procedural knowledge encoded in step-by-step algorithms. McCarthy argued declarative representations are more efficient for commonsense KRR.", "module": 6}, {"id": "deep_learning_krr", "label": "Deep Learning Approach (KRR)", "description": "The currently dominant approach to KRR that represents knowledge as statistical bit-string patterns extracted from large-scale data and stored in vector databases; relies on emergent reasoning (e.g., chain-of-thought) rather than explicit logical procedures.", "module": 6}, {"id": "default_reasoning", "label": "Default Reasoning", "description": "Reasoning that proceeds from default assumptions about the world and revises them only when specific contradicting evidence arrives; required for elaboration tolerance.", "module": 6}, {"id": "dag", "label": "Directed Acyclic Graph (DAG)", "description": "A directed graph with no cycles, used as the structural backbone of Bayesian networks to encode causal or probabilistic dependencies.", "module": 6}, {"id": "domain", "label": "Domain (CSP)", "description": "The set of possible values that a variable is permitted to take in a constraint satisfaction problem.", "module": 6}, {"id": "elaboration", "label": "Elaboration", "description": "The process of adding or removing units of knowledge (facts, concepts, propositions) to an evolving knowledge base or repository as an agent interacts with the world.", "module": 6}, {"id": "elaboration_tolerance", "label": "Elaboration Tolerance", "description": "McCarthy's quality of an intelligent system whereby the effort required to add new knowledge to a repository is proportional to the complexity of that new information; a key criterion for scalable KRR.", "module": 6}, {"id": "epistemological_approach", "label": "Epistemological Approach", "description": "The KRR stance that an intelligent system must first come to know what a problem is before searching for solutions to it — contrasted with heuristic search, which assumes the problem is already given.", "module": 6}, {"id": "expressiveness", "label": "Expressiveness (KRR)", "description": "The adequacy of a representational language for expressing all the operations needed to reason about and modify knowledge as situations change; a requirement for elaboration tolerance in KRR systems.", "module": 6}, {"id": "forward_checking", "label": "Forward Checking", "description": "After each variable assignment, removes from unassigned neighbours' domains any values that would immediately violate a constraint.", "module": 6}, {"id": "frame_problem", "label": "Frame Problem", "description": "McCarthy's 1969 insight that credit assignment in AI requires knowing not only what actions are relevant in a situation, but also the vast set of facts that remain unchanged — tracking \"frame-by-frame\" stability across actions in an unfolding situation.", "module": 6}, {"id": "hard_constraints", "label": "Hard Constraints", "description": "Constraints that must be satisfied for an assignment to be a valid solution; violations are never acceptable.", "module": 6}, {"id": "higher_order_constraint", "label": "Higher-Order Constraint", "description": "A constraint involving three or more variables simultaneously.", "module": 6}, {"id": "implicit_knowledge", "label": "Implicit Knowledge", "description": "Facts that can be derived from a smaller set of explicitly-represented knowledge through logical entailment; McCarthy argued that capturing implicit knowledge efficiently is the core challenge of commonsense KRR.", "module": 6}, {"id": "inference_engine", "label": "Inference Engine", "description": "The reasoning component of a KRR system that draws conclusions from a knowledge base by applying logical or probabilistic procedures; contrasted with the knowledge base itself.", "module": 6}, {"id": "knowledge_about_phenomena", "label": "Knowledge About Phenomena", "description": "McCarthy's term for general, stable facts about the world that an AI system can represent and then use to reason about specific problem-solving situations.", "module": 6}, {"id": "krr", "label": "Knowledge Representation and Reasoning (KRR)", "description": "The subfield of AI studying how to formally encode knowledge and use it to support automated inference and decision-making.", "module": 6}, {"id": "logical_entailment", "label": "Logical Entailment", "description": "The implicit derivation of a fact from other known facts without it ever being explicitly stated; the basis on which declarative commonsense knowledge yields vast implicit knowledge.", "module": 6}, {"id": "mathematical_logic_approach", "label": "Mathematical Logic Approach (KRR)", "description": "McCarthy's approach to KRR that represents knowledge as precise, explicit logical statements (objects, properties, relationships) and draws inferences through formal reasoning procedures rather than statistical prediction.", "module": 6}, {"id": "mental_models", "label": "Mental Models", "description": "Internal cognitive representations of how the world works, used for simulation, prediction, and counterfactual reasoning.", "module": 6}, {"id": "objects_propagator", "label": "Objects (Propagator)", "description": "The autonomous computational entities in a propagator network that hold partial information and communicate updates to neighbours.", "module": 6}, {"id": "ontology", "label": "Ontology (Formal)", "description": "A formal categorisation of phenomena into objects and their relationships, used in the mathematical logic approach to KRR to structure knowledge so that AI systems can reason about complex, evolving real-world situations.", "module": 6}, {"id": "parent_variable", "label": "Parent Variable", "description": "A variable with a directed edge pointing to another (child) variable in a DAG, representing a direct probabilistic dependency.", "module": 6}, {"id": "partial_assignment", "label": "Partial Assignment", "description": "An assignment of values to some but not all variables in a CSP, used during incremental search.", "module": 6}, {"id": "possible_worlds", "label": "Possible Worlds", "description": "All conceivable states of affairs; used in modal logic and probabilistic reasoning to enumerate uncertainty.", "module": 6}, {"id": "procedural_knowledge", "label": "Procedural Knowledge", "description": "Knowledge encoded as step-by-step sequences of actions (algorithms or procedures); contrasted by McCarthy with declarative knowledge, which is more flexible and reusable across situations.", "module": 6}, {"id": "propagation", "label": "Propagation", "description": "The spreading of information or constraint values through a network of connected nodes until a stable state is reached.", "module": 6}, {"id": "propagator_model", "label": "Propagator Model", "description": "A computation model where autonomous objects communicate by propagating constraint values through a shared network.", "module": 6}, {"id": "random_variables", "label": "Random Variables", "description": "Variables whose values are determined by probabilistic outcomes of an experiment or process.", "module": 6}, {"id": "relations_possible_worlds", "label": "Relations Between Possible Worlds", "description": "Accessibility relations specifying which worlds are reachable from others, used in modal logic and probabilistic models.", "module": 6}, {"id": "retrieval_augmented_generation", "label": "Retrieval-Augmented Generation (RAG)", "description": "A technique that enables deep learning KRR systems to incorporate information from external repositories at inference time, extending their effective knowledge base beyond what was encoded during training.", "module": 6}, {"id": "situation", "label": "Situation", "description": "McCarthy's term for a specific real-world context in which an agent acts, to which general knowledge about phenomena is applied for reasoning and credit assignment.", "module": 6}, {"id": "soft_constraints", "label": "Soft Constraints", "description": "Constraints that are preferred but can be violated at a cost, allowing trade-offs in optimisation problems.", "module": 6}, {"id": "solution", "label": "Solution", "description": "A complete, consistent assignment that satisfies all constraints in a CSP.", "module": 6}, {"id": "speech_acts", "label": "Speech Acts", "description": "Goal-oriented utterances or written statements whose meaning depends on the pragmatic context — who is saying them and for what purpose; relevant to KRR because commonsense knowledge alone cannot interpret them without organisational context.", "module": 6}, {"id": "tuples", "label": "Tuples", "description": "Ordered sequences of values forming rows in a relational database table, representing individual records.", "module": 6}, {"id": "unary_constraint", "label": "Unary Constraint", "description": "A constraint that restricts the permissible values of a single variable independently of others.", "module": 6}, {"id": "variables", "label": "Variables (CSP)", "description": "The unknowns in a CSP whose values must be chosen from their respective domains to satisfy all constraints.", "module": 6}, {"id": "vector_databases", "label": "Vector Databases", "description": "Matrix-like data structures used in deep learning KRR systems to store bit-string representations of knowledge; concepts \"emerge\" as statistical patterns among stored vectors.", "module": 6}, {"id": "world_models", "label": "World Models", "description": "Deep learning systems that extend LLMs with external memories (vector databases, knowledge graphs, multimodal data) to construct richer representations of the world for reasoning and prediction.", "module": 6}, {"id": "breakdowns", "label": "Breakdowns", "description": "Moments when an agent's homeostatic comportment fails — when a situation is no longer handled automatically — prompting recourse to explicit symbolic representations as resources for action.", "module": 7}, {"id": "cartesianism", "label": "Cartesianism / Cognitivism", "description": "The view, tracing to Descartes, that intelligence is constituted by internal symbol manipulations divorced from the external world; also called cognitivism. Interactionists critique it for neglecting sensorimotor and cultural dimensions of intelligence.", "module": 7}, {"id": "comportment", "label": "Comportment", "description": "Maintaining an authentic, moment-to-moment alignment between an agent's actions and the unfolding physical world, relying on improvisation and homeostasis rather than pre-planned symbol manipulation.", "module": 7}, {"id": "creature_hypothesis", "label": "Creature Hypothesis", "description": "Rodney Brooks' hypothesis that the sensorimotor foundations of intelligence represent the evolutionarily hard part, requiring millions of years to develop, whereas symbolic language emerged only recently and relatively quickly. Explains Moravec's paradox from an interactionist view.", "module": 7}, {"id": "critical_technical_practice", "label": "Critical Technical Practice", "description": "Phil Agre's method (CTP) for (1) surfacing hidden assumptions in AI language, (2) evaluating them against concrete real-world experience, and (3) using the evaluation to guide alternative AI design. Targets wishful mnemonics embedded in everyday AI terminology.", "module": 7}, {"id": "cybernetics", "label": "Cybernetics", "description": "The science of control and communication in animals and machines, founded by Norbert Wiener in the 1940s. Uses feedback from environmental interaction as the basis of intelligent control, making it a precursor to interactionist AI.", "module": 7}, {"id": "designation", "label": "Designation", "description": "Newell and Simon's notion that intelligence requires symbols which \"designate\" objects in the world by giving them names. Contrasted by interactionists with indexing and registration as insufficient for grounding meaning in experience.", "module": 7}, {"id": "digital_ecosystem", "label": "Digital Ecosystem", "description": "A layered network of interdependent digital agents, services, and goals that has replaced the notion of a discrete industry as the unit of strategic innovation; analogised in the text to a subsumption architecture of lower- and higher-level goals.", "module": 7}, {"id": "direct_manipulation", "label": "Direct Manipulation", "description": "The paradigm of interacting with digital symbolic representations through physical sensorimotor actions on screens and devices, pioneered by Ivan Sutherland's Sketchpad and central to GUI design and modern software interaction.", "module": 7}, {"id": "embeddedness", "label": "Embeddedness", "description": "The property of intelligent action whereby it is shaped by the local cultural norms and context in which it occurs, altering both the goals and constraints of problem-solving.", "module": 7}, {"id": "embodiment", "label": "Embodiment", "description": "The property of intelligent action that grounds it in the physical capabilities and limits of a body, rather than treating it as pure symbol manipulation divorced from physical motion.", "module": 7}, {"id": "extrapolation_fallacy", "label": "Extrapolation Fallacy", "description": "The recurring tendency in AI to believe that impressive gains on one benchmark task (e.g., playing Go) signal imminent artificial general intelligence, diverting resources from the harder sensorimotor challenges identified by the creature hypothesis.", "module": 7}, {"id": "finite_state_machines", "label": "Finite State Machines", "description": "Simple computational circuits with no communication channels used to implement individual goal layers in Brooks' subsumption architecture; chosen for their low cost and robustness over complex representations.", "module": 7}, {"id": "homeostasis", "label": "Homeostasis", "description": "The goal of maintaining a system state within an acceptable range rather than optimising toward a fixed target. Coined by W. Ross Ashby in cybernetics and central to interactionist AI; contrasts with Cartesian satisficing and optimisation.", "module": 7}, {"id": "indexing", "label": "Indexing", "description": "Phil Agre's theory that objects are stored in an agent's memory relative to specific experienced situations rather than as abstract designations, enabling efficient sensorimotor action without explicit planning.", "module": 7}, {"id": "interaction", "label": "Interaction", "description": "The approach to AI and organisations that foregrounds agents' direct engagement with the external physical and cultural world rather than internal symbol manipulation, emphasising sensorimotor action and experiential phenomena.", "module": 7}, {"id": "moravecs_paradox", "label": "Moravec's Paradox", "description": "The observation by Hans Moravec that tasks deemed \"complex\" in AI (e.g., chess, Go) are often easier to solve than tasks that seem trivially simple to humans (e.g., navigating a real environment), inverting naive assumptions about AI difficulty.", "module": 7}, {"id": "registration", "label": "Registration", "description": "Brian Cantwell-Smith's theory that intelligence requires an ongoing interplay — \"reckoning and judgment\" — between representational schemes, physical reality, and the agent's experience of that reality, ensuring representations remain grounded.", "module": 7}, {"id": "resources_for_action", "label": "Resources for Action", "description": "The interactionist reframing of symbolic representations: not necessary for interacting with the world, but potentially valuable aids invoked when homeostatic comportment breaks down.", "module": 7}, {"id": "sensorimotor", "label": "Sensorimotor Action", "description": "Actions that combine perceptual sensing and physical movement, treated in interactionist AI as the fundamental medium of intelligence, prior to and more basic than symbolic representation.", "module": 7}, {"id": "situatedness", "label": "Situatedness", "description": "The property of intelligent action whereby it depends on sensing and responding to ongoing changes in particular real-world situations, not just abstract problem spaces.", "module": 7}, {"id": "subsumption_architecture", "label": "Subsumption Architecture", "description": "Rodney Brooks' AI system design organising behaviour as a hierarchy of simple, layered goals implemented by finite state machines, where higher-priority goals can subsume lower ones; no world model is required.", "module": 7}, {"id": "variety", "label": "Variety (Wiener)", "description": "Norbert Wiener's concept of complexity reflecting the richness of natural and social systems, contrasted with purely internal symbol-manipulation measures such as Shannon entropy or Turing-machine step counts.", "module": 7}, {"id": "wishful_mnemonics", "label": "Wishful Mnemonics", "description": "Memorable terms for symbol manipulation processes (e.g., \"search\", \"planning\", \"learning\") that invite the misleading assumption that such processes faithfully capture real-world phenomena. Coined in the context of Agre's critical technical practice.", "module": 7}, {"id": "bugs", "label": "Bugs", "description": "In the MIT engineering tradition, any discrepancy, symptom, or constraint violation signalling a mismatch between a representation and the physical world; errors of registration rather than mere software syntax errors.", "module": 8}, {"id": "causal_interpretation", "label": "Causal Interpretation", "description": "A tentative threshold-level representation of how a physical system's function emerges from its structure; describes not just how components are assembled but how they causally produce behaviour, and can itself be debugged.", "module": 8}, {"id": "confluences", "label": "Confluences", "description": "De Kleer's term for qualitative constraints representing mutual influences between variables in a physical system; unlike discrete CSP constraints, confluences capture the messy, continuous interdependencies of real-world domains.", "module": 8}, {"id": "debugging", "label": "Debugging", "description": "The AI idea of credit assignment as the ability to detect and resolve discrepancies between a representation of a physical system and the world; encompasses both troubleshooting and theory formation, and extends generate-and-test with representation-modification.", "module": 8}, {"id": "dependency_network", "label": "Dependency Network", "description": "A propagator-level memory that tracks qualitative knowledge, tentative assumptions, and their interdependencies during debugging; complements the constraint network by storing justifications and enabling truth maintenance.", "module": 8}, {"id": "dependency_directed_reasoning", "label": "Dependency-Directed Reasoning", "description": "Problem-solving informed by rich tracking of interdependencies among assumptions in a dependency network; enables tracing bugs to specific assumptions, explaining provenance, resolving inconsistencies, and reusing prior results.", "module": 8}, {"id": "domain_specific_language", "label": "Domain-Specific Language", "description": "A formal language that represents the fundamental entities and relations of a domain to support reasoning from that domain's first principles; examples include CAD software for geometric reasoning and Nvidia CUDA for GPU chip design.", "module": 8}, {"id": "envisioning", "label": "Envisioning", "description": "De Kleer's term for \"running a qualitative simulation in the mind's eye\": predicting and analysing qualitative state transitions in a physical system to construct a causal interpretation of how its components function together.", "module": 8}, {"id": "first_principles_reasoning", "label": "First Principles Reasoning", "description": "A debugging strategy that relies on a small set of stable, fundamental laws of a domain (e.g., voltage laws in electrical engineering) rather than heuristics or exhaustive knowledge; reduces combinatorial explosion by anchoring reasoning in domain-wide constraints.", "module": 8}, {"id": "function_from_structure", "label": "Function from Structure", "description": "The inference of what a physical system does (its function) from observing its components and how they are assembled (its structure); the core reasoning task in the MIT tradition of debugging-based AI, and held to be generally applicable to products, organisations, and manufacturing processes alike.", "module": 8}, {"id": "generate_test_and_debug", "label": "Generate-Test-and-Debug", "description": "An extension of generate-and-test in which a debugging step allows modifying the problem representation itself — adding, removing, or re-ordering actions and components — rather than only testing candidate solutions against a fixed landscape.", "module": 8}, {"id": "justifications", "label": "Justifications", "description": "Belief links in a dependency network representing logical relationships such as consequences, antecedents, or explanations; labelled \"in\" or \"out\" to indicate whether the associated assumption is currently believed true.", "module": 8}, {"id": "qualitative_reasoning", "label": "Qualitative Reasoning", "description": "Reasoning about physical systems without precise numerical values, using commonsense knowledge of domain laws to envision how a system's state will change; most useful when the system's functioning is not yet precisely understood and quantitative reasoning would be premature.", "module": 8}, {"id": "reasoning_about_physical_world", "label": "Reasoning about the Physical World", "description": "The process of reflectively reasoning about physical systems in which AI systems and organisations are situated to identify and resolve breakdowns; involves constructing and debugging causal interpretation // Build adjacency: PREREQS[id] = [ids that point TO id]   (predecessors)
//                 DEPENDENTS[id] = [ids that id points TO] (successors)
const PREREQS    = {};
const DEPENDENTS = {};
CARDS.forEach(c => { PREREQS[c.id] = []; DEPENDENTS[c.id] = []; });
ALL_EDGES.forEach(([src, tgt]) => {
  if (PREREQS[tgt]    !== undefined) PREREQS[tgt].push(src);
  if (DEPENDENTS[src] !== undefined) DEPENDENTS[src].push(tgt);
});

const CARD_MAP = {};
CARDS.forEach(c => { CARD_MAP[c.id] = c; });

// ============================================================
// STATE  (persisted in localStorage)
// ============================================================
const STORAGE_KEY = 'fab2026_fc_v1_full';

function defaultCardState() {
  return { mastery: 0.5, ease: 2.5, interval: 1, dueTime: Date.now(), reviews: 0, streak: 0 };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function initState() {
  const saved = loadState();
  const cards = {};
  CARDS.forEach(c => {
    cards[c.id] = (saved && saved.cards && saved.cards[c.id]) || defaultCardState();
  });
  return {
    cards,
    session: { reviewed: 0, correct: 0, startTime: Date.now() }
  };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = initState();

// ============================================================
// ALGORITHMS
// ============================================================

// --- TD Credit Propagation ---
// α: TD step size (learning rate)
// backwardDecay: blame decay per hop when failing
// forwardDecay:  credit decay per hop when passing
// maxDepth: max BFS depth for propagation
const TD_ALPHA      = 0.15;
const BACKWARD_DECAY = 0.5;
const FORWARD_DECAY  = 0.3;
const MAX_DEPTH      = 3;
const MASTERY_THRESHOLD = 0.7; // above this = "mastered"

// Rating → score mapping: 0=forgot, 1=hard, 2=good, 3=easy
const RATING_SCORES = [0.0, 0.4, 0.7, 1.0];

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function propagateCredit(cardId, delta) {
  const log = [];

  if (delta < 0) {
    // FAIL: blame propagates backward through PREREQS (ancestors)
    const visited = new Set([cardId]);
    const queue = [[cardId, 1]];
    while (queue.length) {
      const [nodeId, depth] = queue.shift();
      if (depth > MAX_DEPTH) continue;
      for (const predId of (PREREQS[nodeId] || [])) {
        if (visited.has(predId) || !state.cards[predId]) continue;
        visited.add(predId);
        const blame = delta * Math.pow(BACKWARD_DECAY, depth);
        const prev = state.cards[predId].mastery;
        state.cards[predId].mastery = clamp(prev + TD_ALPHA * blame, 0, 1);
        log.push({ id: predId, label: CARD_MAP[predId].label, delta: blame, depth, dir: 'backward' });
        queue.push([predId, depth + 1]);
      }
    }
  } else if (delta > 0) {
    // PASS: credit propagates forward through DEPENDENTS (successors)
    const visited = new Set([cardId]);
    const queue = [[cardId, 1]];
    while (queue.length) {
      const [nodeId, depth] = queue.shift();
      if (depth > MAX_DEPTH) continue;
      for (const depId of (DEPENDENTS[nodeId] || [])) {
        if (visited.has(depId) || !state.cards[depId]) continue;
        visited.add(depId);
        const boost = delta * Math.pow(FORWARD_DECAY, depth);
        const prev = state.cards[depId].mastery;
        state.cards[depId].mastery = clamp(prev + TD_ALPHA * boost, 0, 1);
        log.push({ id: depId, label: CARD_MAP[depId].label, delta: boost, depth, dir: 'forward' });
        queue.push([depId, depth + 1]);
      }
    }
  }

  return log;
}

// --- SM-2 Scheduling ---
function nextIntervals(cardId) {
  const s = state.cards[cardId];
  return [
    1,                                                           // 0=forgot
    Math.max(1, Math.round(s.interval * 1.2)),                  // 1=hard
    Math.max(1, Math.round(s.interval * s.ease)),               // 2=good
    Math.max(1, Math.round(s.interval * s.ease * 1.3)),         // 3=easy
  ];
}

function updateSchedule(cardId, rating) {
  const s = state.cards[cardId];
  const actualScore = RATING_SCORES[rating];
  const delta = actualScore - s.mastery;

  // Update own mastery (TD update)
  s.mastery = clamp(s.mastery + TD_ALPHA * delta, 0, 1);

  // SM-2 interval update
  if (rating === 0) {       // forgot
    s.interval = 1;
    s.ease = Math.max(1.3, s.ease - 0.2);
    s.streak = 0;
  } else if (rating === 1) { // hard
    s.interval = Math.max(1, Math.round(s.interval * 1.2));
    s.ease = Math.max(1.3, s.ease - 0.15);
    s.streak = 0;
  } else if (rating === 2) { // good
    s.interval = Math.max(1, Math.round(s.interval * s.ease));
    s.streak++;
  } else {                   // easy
    s.interval = Math.max(1, Math.round(s.interval * s.ease * 1.3));
    s.ease = Math.min(3.0, s.ease + 0.1);
    s.streak++;
  }

  s.dueTime = Date.now() + s.interval * 24 * 60 * 60 * 1000;
  s.reviews++;

  // Propagate credit through prerequisite graph
  const propagationLog = propagateCredit(cardId, delta);

  // Update session stats
  state.session.reviewed++;
  if (rating >= 2) state.session.correct++;

  saveState();
  return { delta, actualScore, propagationLog };
}

// --- Card Selection (Deliberate Practice) ---
function isFrontier(cardId) {
  const prereqs = PREREQS[cardId] || [];
  if (!prereqs.length) return true;
  return prereqs.every(pid => state.cards[pid] && state.cards[pid].mastery >= MASTERY_THRESHOLD);
}

function selectNextCard() {
  const now = Date.now();

  // 1. Due cards: sorted by mastery ascending (weakest first)
  const due = CARDS.filter(c => state.cards[c.id].dueTime <= now)
                   .sort((a, b) => state.cards[a.id].mastery - state.cards[b.id].mastery);
  if (due.length) return due[0];

  // 2. Frontier cards (unlocked but not yet mastered)
  const frontier = CARDS.filter(c => !isMastered(c.id) && isFrontier(c.id))
                        .sort((a, b) => state.cards[a.id].mastery - state.cards[b.id].mastery);
  if (frontier.length) return frontier[0];

  // 3. Globally weakest card
  return CARDS.slice().sort((a, b) => state.cards[a.id].mastery - state.cards[b.id].mastery)[0];
}

function isMastered(cardId) { return state.cards[cardId].mastery >= MASTERY_THRESHOLD; }

// ============================================================
// UI RENDERING
// ============================================================
let currentCard = null;

function showFront(card) {
  currentCard = card;
  const s = state.cards[card.id];
  const pct = Math.round(s.mastery * 100);
  const col = masteryColor(s.mastery);

  document.getElementById('card-module').textContent = card.module < 900 ? `Module ${card.module}` : 'Misc';
  document.getElementById('card-label').textContent = card.label;
  document.getElementById('card-mastery-pct').textContent = pct + '%';
  const fill = document.getElementById('card-mastery-fill');
  fill.style.width = pct + '%';
  fill.style.background = col;

  // Interval hints on back
  const hints = nextIntervals(card.id);
  document.getElementById('interval-hints').innerHTML = hints.map((d, i) => {
    const labels = ['Forgot','Hard','Good','Easy'];
    return `<div class="interval-hint">${d}d</div>`;
  }).join('');

  show('card-front');
  hide('card-back');
  hide('credit-panel');
}

function flipCard() {
  if (!currentCard) return;
  const card = currentCard;
  const hints = nextIntervals(card.id);

  document.getElementById('card-module-back').textContent =
    document.getElementById('card-module').textContent;
  document.getElementById('card-label-back').textContent = card.label;
  document.getElementById('card-definition').textContent = card.description;
  document.getElementById('interval-hints').innerHTML = hints.map(d => `<div class="interval-hint">${d}d</div>`).join('');

  hide('card-front');
  show('card-back');
  hide('credit-panel');
}

function rate(r) {
  if (!currentCard) return;
  const { delta, actualScore, propagationLog } = updateSchedule(currentCard.id, r);
  renderCreditPanel(currentCard, r, delta, propagationLog);
  hide('card-back');
  show('credit-panel');
  refreshStats();
  refreshOverview();
  refreshDashboard();
}

function nextCard() {
  const next = selectNextCard();
  if (next) showFront(next);
}

function renderCreditPanel(card, rating, delta, log) {
  const titleEl = document.getElementById('credit-title');
  const entriesEl = document.getElementById('credit-entries');
  const ratingLabels = ['Forgot','Hard','Good','Easy'];
  const ratingIcons  = ['✗','≈','✓','★'];

  const own = Math.round(state.cards[card.id].mastery * 100);
  const deltaSign = delta >= 0 ? '+' : '';
  const cls = delta < 0 ? 'negative' : delta > 0 ? 'positive' : 'neutral';
  const icon = delta < 0 ? '← blame' : delta > 0 ? '→ credit' : '— no change';

  titleEl.className = `credit-title ${cls}`;
  titleEl.innerHTML = `
    ${ratingIcons[rating]} ${ratingLabels[rating]} — own mastery now ${own}%
    <span class="delta-badge">${icon} δ=${deltaSign}${(TD_ALPHA * delta).toFixed(3)}</span>
  `;

  if (!log.length) {
    entriesEl.innerHTML = `<div class="credit-none">No connected concepts affected (no edges in scope).</div>`;
    return;
  }

  // Sort by abs(delta) descending
  const sorted = log.slice().sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
  entriesEl.innerHTML = sorted.map((e, i) => {
    const arrow = e.dir === 'backward' ? '←' : '→';
    const d = e.dir === 'backward' ? 'neg' : 'pos';
    const sign = e.delta >= 0 ? '+' : '';
    const adj = Math.round(state.cards[e.id].mastery * 100);
    return `<div class="credit-entry ${e.dir}" style="animation-delay:${i*0.05}s">
      <span class="credit-arrow">${arrow}</span>
      <span class="credit-concept">${e.label}</span>
      <span class="credit-delta ${d}">${sign}${(TD_ALPHA * e.delta).toFixed(3)}</span>
      <span class="credit-hop">${e.depth} hop${e.depth > 1 ? 's' : ''} · ${adj}%</span>
    </div>`;
  }).join('');
}

function masteryColor(v) {
  if (v >= 0.7) return '#4a7c59';      // mastered: green
  if (v >= 0.4) return '#c9954a';      // learning: amber
  return '#8b4040';                    // weak: red
}

function refreshStats() {
  const now = Date.now();
  const dueCount = CARDS.filter(c => state.cards[c.id].dueTime <= now).length;
  const masteredCount = CARDS.filter(c => isMastered(c.id)).length;
  document.getElementById('stat-due').textContent = dueCount;
  document.getElementById('stat-mastered').textContent = masteredCount;
  document.getElementById('stat-session').textContent = state.session.reviewed;
}

function refreshOverview() {
  const masteredCount = CARDS.filter(c => isMastered(c.id)).length;
  const pct = CARDS.length ? masteredCount / CARDS.length : 0;
  const C = 2 * Math.PI * 34;
  const ring = document.getElementById('ring-fill');
  ring.style.strokeDasharray = C;
  ring.style.strokeDashoffset = C * (1 - pct);
  document.getElementById('ring-pct').textContent = Math.round(pct * 100) + '%';

  // Histogram bars
  const buckets = [
    { label: '0–20%',  min: 0,   max: 0.2  },
    { label: '20–40%', min: 0.2, max: 0.4  },
    { label: '40–60%', min: 0.4, max: 0.6  },
    { label: '60–80%', min: 0.6, max: 0.8  },
    { label: '80–100%',min: 0.8, max: 1.01 },
  ];
  const colors = ['#8b4040','#7c6b3a','#c9954a','#5a8c6a','#4a7c59'];
  const maxCount = Math.max(...buckets.map(b =>
    CARDS.filter(c => state.cards[c.id].mastery >= b.min && state.cards[c.id].mastery < b.max).length
  ), 1);

  document.getElementById('mastery-bars').innerHTML = buckets.map((b, i) => {
    const count = CARDS.filter(c => state.cards[c.id].mastery >= b.min && state.cards[c.id].mastery < b.max).length;
    const w = Math.round(count / maxCount * 100);
    return `<div class="mastery-bar-row">
      <span class="mastery-bar-label">${b.label}</span>
      <div class="mastery-bar-track">
        <div class="mastery-bar-fill" style="width:${w}%; background:${colors[i]}"></div>
      </div>
      <span class="mastery-bar-count">${count}</span>
    </div>`;
  }).join('');
}

function refreshDashboard() {
  // Weakest concepts
  const weakest = CARDS.slice()
    .sort((a, b) => state.cards[a.id].mastery - state.cards[b.id].mastery)
    .slice(0, 8);
  document.getElementById('weakest-list').innerHTML = weakest.map(c => {
    const v = state.cards[c.id].mastery;
    const pct = Math.round(v * 100);
    return `<div class="weakest-entry">
      <span class="weakest-label" title="${c.label}">${c.label}</span>
      <div class="weakest-bar-wrap"><div class="weakest-bar-fill" style="width:${pct}%; background:${masteryColor(v)}"></div></div>
      <span class="weakest-pct">${pct}%</span>
    </div>`;
  }).join('');

  // Coming up
  const now = Date.now();
  const dayMs = 24 * 60 * 60 * 1000;
  const upcoming = CARDS.slice()
    .sort((a, b) => state.cards[a.id].dueTime - state.cards[b.id].dueTime)
    .slice(0, 8);
  document.getElementById('due-list').innerHTML = upcoming.map(c => {
    const due = state.cards[c.id].dueTime;
    let tag, tagClass;
    if (due <= now) { tag = 'now'; tagClass = 'overdue'; }
    else if (due < now + dayMs) { tag = 'today'; tagClass = 'today'; }
    else {
      const days = Math.ceil((due - now) / dayMs);
      tag = `${days}d`; tagClass = 'tomorrow';
    }
    return `<div class="due-entry">
      <span class="due-label" title="${c.label}">${c.label}</span>
      <span class="due-tag ${tagClass}">${tag}</span>
    </div>`;
  }).join('');
}

// ============================================================
// HELPERS
// ============================================================
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function confirmReset() {
  if (confirm('Reset all flashcard progress? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    state = initState();
    saveState();
    refreshStats(); refreshOverview(); refreshDashboard();
    const next = selectNextCard();
    if (next) showFront(next);
  }
}

// ============================================================
// BOOT
// ============================================================
(function boot() {
  const C = 2 * Math.PI * 34;
  document.getElementById('ring-fill').style.strokeDasharray = C;
  document.getElementById('ring-fill').style.strokeDashoffset = C;

  refreshStats();
  refreshOverview();
  refreshDashboard();

  const first = selectNextCard();
  if (first) showFront(first);
})();
</script>
