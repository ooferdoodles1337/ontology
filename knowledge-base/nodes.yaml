# ============================================================
# FAB 2026 — Nodes (Vocabulary + Metadata)
# ============================================================
# One file for all nodes. Sections: concepts, people_and_institutions,
# examples_and_metaphors. Each entry has id, label, description, and
# type-specific fields (module for concepts; type/era/affiliation for
# people; source/illustrates for examples). No tags.
# ============================================================

concepts:
- id: intelligence
  label: Intelligence
  description: 'The general capacity of an agent to adapt behaviour and solve problems across varied environments,
    typically by learning from experience.

    '
  source_documents:
  - notes_credit_assignment
- id: general_problem_of_intelligence
  label: General Problem of Intelligence
  description: 'The overarching challenge of creating agents that can learn which actions to take in order
    to achieve goals, despite sparse and delayed feedback.

    '
  source_documents:
  - notes_credit_assignment
- id: credit_assignment
  label: Credit Assignment
  description: 'The problem of determining which specific actions in a sequence deserve credit (or blame)
    for a final outcome.

    '
  source_documents:
  - notes_credit_assignment
- id: feedback
  label: Feedback
  description: 'Information an agent receives about the consequences of its actions, used to update its
    behaviour.

    '
  source_documents:
  - notes_credit_assignment
- id: delayed_feedback
  label: Delayed Feedback
  description: 'Feedback that arrives well after the actions that caused it, making it harder to assign
    credit to the right decisions.

    '
  source_documents:
  - notes_credit_assignment
- id: ambiguous_feedback
  label: Ambiguous Feedback
  description: 'Feedback whose causal link to specific actions is unclear, complicating the identification
    of what behaviour produced a given outcome.

    '
  source_documents:
  - notes_credit_assignment
- id: sparse_feedback
  label: Sparse Feedback
  description: 'A feedback regime in which only a small fraction of actions generate informative signals,
    as identified by Minsky.

    '
  source_documents:
  - notes_credit_assignment
- id: intermediate_feedback
  label: Intermediate Feedback
  description: 'Proxy signals that indicate progress toward a goal before a final outcome is known, used
    to assign credit earlier.

    '
  source_documents:
  - notes_credit_assignment
- id: trial_and_error
  label: Trial and Error
  description: 'A basic learning strategy that explores actions and reinforces those that produce positive
    outcomes while abandoning unsuccessful ones.

    '
  source_documents:
  - notes_credit_assignment
- id: reinforcement_learning
  label: Reinforcement Learning
  description: 'A learning paradigm where an agent improves its policy by receiving rewards or penalties
    for actions taken in an environment.

    '
  source_documents:
  - notes_credit_assignment
  - notes_information_processing
  - notes_interaction
- id: reward_hypothesis
  label: Reward Hypothesis
  description: 'The proposition that all goals and purposes can be expressed as the maximisation of cumulative
    scalar reward (Sutton & Barto).

    '
  source_documents:
  - notes_credit_assignment
- id: policy
  label: Policy
  description: 'A mapping from states to actions that specifies what an agent does in each situation it
    encounters.

    '
  source_documents:
  - notes_credit_assignment
- id: value_function
  label: Value Function
  description: 'A function estimating the expected cumulative reward an agent will receive from a given
    state onward under a given policy.

    '
  source_documents:
  - notes_credit_assignment
- id: utility_function
  label: Utility Function
  description: 'A function mapping states or outcomes to scalar values representing their desirability
    to an agent.

    '
  source_documents:
  - notes_credit_assignment
- id: temporal_differencing
  label: Temporal Differencing
  description: 'A reinforcement learning method that updates value estimates by bootstrapping from differences
    between successive time-step predictions.

    '
  source_documents:
  - notes_credit_assignment
- id: aggregate_rewards
  label: Aggregate Rewards
  description: 'The total sum of rewards accumulated by an agent across a sequence of actions and time
    steps.

    '
  source_documents:
  - notes_credit_assignment
- id: maximize_rewards
  label: Maximise Rewards
  description: 'The objective of selecting actions so as to obtain the highest possible cumulative reward
    over time.

    '
  source_documents:
  - notes_credit_assignment
- id: goal_directed_agents
  label: Goal-Directed Agents
  description: 'Agents that select actions based on an internal representation of a desired end state
    rather than fixed reflexes.

    '
  source_documents:
  - notes_credit_assignment
- id: agent_environment_distinction
  label: Agent–Environment Distinction
  description: 'The conceptual boundary separating the learning agent from the world it perceives and
    acts upon.

    '
  source_documents:
  - notes_credit_assignment
- id: agentic_environment
  label: Agentic Environment
  description: 'The environment as modelled and acted upon by an intelligent agent, including the effects
    of the agent''s own actions.

    '
  source_documents:
  - notes_credit_assignment
- id: task_environment
  label: Task Environment
  description: 'The full specification of a problem faced by an agent, including its goals, percepts,
    actions, and performance measure.

    '
  source_documents:
  - notes_credit_assignment
  - notes_search
- id: deliberate_practice
  label: Deliberate Practice
  description: 'Effortful, focused practice designed to improve specific skills through rapid feedback
    and targeted repetition.

    '
  source_documents:
  - notes_credit_assignment
- id: superstitious_learning
  label: Superstitious Learning
  description: 'The acquisition of a false causal model due to coincidental correlation between actions
    and outcomes under sparse feedback.

    '
  source_documents:
  - notes_credit_assignment
  - notes_evolutionary_strategies
- id: path_dependence
  label: Path Dependence
  description: 'The phenomenon where the sequence of past decisions constrains which options remain available
    in the future.

    '
  source_documents:
  - notes_credit_assignment
  - notes_evolutionary_strategies
- id: interdependence_of_actions
  label: Interdependence of Actions
  description: 'The property that the value or appropriateness of one action depends on other actions
    taken concurrently or previously.

    '
  source_documents:
  - notes_credit_assignment
- id: management_hypothesis
  label: Management Hypothesis
  description: 'The hypothesis that intelligence at scale requires coordination, delegation, and management
    of specialised sub-agents.

    '
  source_documents:
  - notes_credit_assignment
- id: society_of_mind_hypothesis
  label: Society of Mind Hypothesis
  description: 'Minsky''s proposal that high-level intelligence emerges from the interaction of many simple,
    specialised sub-agents.

    '
  source_documents:
  - notes_credit_assignment
  - notes_representation
- id: unitary_actor_assumption
  label: Unitary Actor Assumption
  description: 'The simplifying assumption that an agent acts as a single coherent decision-maker rather
    than an organisation of sub-agents.

    '
  source_documents:
  - notes_credit_assignment
- id: agent_specialization
  label: Agent Specialisation
  description: 'The differentiation of agents into distinct roles with narrow, focused capabilities that
    together cover a broader task.

    '
  source_documents:
  - notes_credit_assignment
- id: division_of_labor
  label: Division of Labour
  description: 'The allocation of distinct tasks to specialised agents or workers to increase collective
    efficiency and throughput.

    '
  source_documents:
  - notes_credit_assignment
  - notes_search
  - notes_evolutionary_strategies
- id: organizational_learning
  label: Organisational Learning
  description: 'The process by which collectives of agents update their shared knowledge, routines, and
    behaviour based on experience.

    '
  source_documents:
  - notes_credit_assignment
- id: organizational_memory
  label: Organisational Memory
  description: 'Stored knowledge, routines, and programs that persist in an organisation beyond any individual
    member.

    '
  source_documents:
  - notes_credit_assignment
- id: organizational_programs
  label: Organisational Programs
  description: 'Encoded routines and standard operating procedures that guide an organisation''s responses
    to recurring situations.

    '
  source_documents:
  - notes_credit_assignment
  - notes_search
- id: delegation
  label: Delegation
  description: 'The assignment of authority and responsibility for a task from a higher-level agent to
    a subordinate sub-agent.

    '
  source_documents:
  - notes_credit_assignment
- id: hierarchical_management
  label: Hierarchical Management
  description: 'An organisational structure where agents are arranged in levels, with each level supervising
    and coordinating the level below it.

    '
  source_documents:
  - notes_credit_assignment
- id: gains_to_specialization
  label: Gains to Specialisation
  description: 'The increased efficiency and output achieved when agents focus on narrow, well-practised
    tasks rather than general ones.

    '
  source_documents:
  - notes_credit_assignment
  - notes_search
  - notes_evolutionary_strategies
- id: infinite_regress
  label: Infinite Regress
  description: 'A logical problem where justifying or explaining something requires invoking the same
    type of explanation indefinitely.

    '
  source_documents:
  - notes_credit_assignment
- id: learning
  label: Learning
  description: 'The general process by which an agent modifies its representations or behaviour based
    on experience with its environment.

    '
  source_documents:
  - notes_credit_assignment
  - notes_evolutionary_strategies
- id: information
  label: Information
  description: 'Data that reduces uncertainty about the state of the world; can be characterised either
    syntactically (Shannon) or semantically (Simon).

    '
  source_documents:
  - notes_information_processing
- id: shannon_information
  label: Shannon Information
  description: 'Information defined mathematically as the reduction in uncertainty, measured in bits,
    independent of meaning.

    '
  source_documents:
  - notes_information_processing
  - notes_interaction
- id: simon_information
  label: Simon Information
  description: 'Herbert Simon''s view of information as meaning-laden representations that guide purposeful
    behaviour rather than mere signal statistics.

    '
  source_documents:
  - notes_information_processing
- id: syntactic_information
  label: Syntactic Information
  description: 'Information characterised purely by its formal structure and statistical properties, without
    regard to its meaning or context.

    '
  source_documents:
  - notes_information_processing
- id: semantic_information
  label: Semantic Information
  description: 'Information characterised by its meaning and relevance to an agent''s goals, beyond its
    statistical structure.

    '
  source_documents:
  - notes_information_processing
- id: shannon_entropy
  label: Shannon Entropy
  description: 'A measure of the average information content (uncertainty) in a probability distribution,
    defined as H = −Σ p log₂ p.

    '
  source_documents:
  - notes_information_processing
- id: entropy
  label: Entropy
  description: 'A measure of disorder, uncertainty, or unpredictability in a system; used in both thermodynamics
    and information theory.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
- id: encoding
  label: Encoding
  description: 'The process of converting information into a formal representation suitable for transmission
    or storage.

    '
  source_documents:
  - notes_information_processing
- id: decoding
  label: Decoding
  description: 'The process of recovering original information from an encoded representation.

    '
  source_documents:
  - notes_information_processing
- id: channel_capacity
  label: Channel Capacity
  description: 'The maximum rate at which information can be reliably transmitted through a noisy channel
    (Shannon''s capacity theorem).

    '
  source_documents:
  - notes_information_processing
- id: bandwidth
  label: Bandwidth
  description: 'The range of frequencies or throughput available for transmitting information across a
    communication channel.

    '
  source_documents:
  - notes_information_processing
- id: noise
  label: Noise
  description: 'Unwanted random disturbances in a communication channel that corrupt or obscure the transmitted
    signal.

    '
  source_documents:
  - notes_information_processing
- id: signal_to_noise_ratio
  label: Signal-to-Noise Ratio
  description: 'The ratio of useful signal power to background noise power, indicating how cleanly information
    can be extracted from a channel.

    '
  source_documents:
  - notes_information_processing
- id: compression
  label: Compression
  description: 'Reducing the size of a data representation while preserving its essential information
    content.

    '
  source_documents:
  - notes_information_processing
- id: statistical_redundancy_removal
  label: Statistical Redundancy Removal
  description: 'Compression by eliminating predictable, repeated patterns in data, exploiting statistical
    regularities.

    '
  source_documents:
  - notes_information_processing
- id: abstraction
  label: Abstraction
  description: 'The process of removing irrelevant detail to focus on essential structure, patterns, or
    relationships.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
  - notes_evolutionary_strategies
- id: meaningful_abstraction
  label: Meaningful Abstraction
  description: 'An abstraction that preserves the semantically relevant features necessary for a given
    purpose or task.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
- id: digital_abstraction
  label: Digital Abstraction
  description: 'The representation of information as discrete symbolic states rather than continuous analogue
    values.

    '
  source_documents:
  - notes_information_processing
- id: bit
  label: Bit
  description: 'The fundamental unit of information, representing a binary choice between two equally
    likely outcomes.

    '
  source_documents:
  - notes_information_processing
- id: bit_strings
  label: Bit Strings
  description: 'Sequences of bits used to encode arbitrary information in digital computational systems.

    '
  source_documents:
  - notes_information_processing
- id: information_theory
  label: Information Theory
  description: 'Shannon''s mathematical framework for quantifying information, channel capacity, compression,
    and reliable communication.

    '
  source_documents:
  - notes_information_processing
- id: information_processing
  label: Information Processing
  description: 'The manipulation, transformation, and transmission of information by a computational or
    cognitive system.

    '
  source_documents:
  - notes_information_processing
- id: internal_representations
  label: Internal Representations
  description: 'Mental or computational structures that encode aspects of the world within an agent''s
    memory or model.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
- id: external_representations
  label: External Representations
  description: 'Physical artifacts such as diagrams, notation, and tools that offload cognitive work into
    the environment.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
- id: cognitive_representations
  label: Cognitive Representations
  description: 'Internal symbolic or distributed structures encoding knowledge and beliefs used in reasoning
    and decision-making.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
- id: physical_symbol_system_hypothesis
  label: Physical Symbol System Hypothesis
  description: 'Newell and Simon''s claim that a physical symbol system has the necessary and sufficient
    means for general intelligent action.

    '
  source_documents:
  - notes_information_processing
  - notes_search
- id: physics_hypothesis
  label: Physics Hypothesis
  description: 'The claim that the laws of physics set the boundary conditions and constraints within
    which any intelligent system must operate.

    '
  source_documents:
  - notes_information_processing
- id: symbol_manipulation
  label: Symbol Manipulation
  description: 'The process of transforming formal symbol structures according to syntactic rules, without
    regard to semantic content.

    '
  source_documents:
  - notes_information_processing
  - notes_search
  - notes_interaction
- id: processing_complexity
  label: Processing Complexity
  description: 'The computational resources — time, space, energy — required to process or solve a given
    class of problems.

    '
  source_documents:
  - notes_information_processing
- id: processing_capacity
  label: Processing Capacity
  description: 'The limit on the volume of information an agent can process within a given time period.

    '
  source_documents:
  - notes_information_processing
- id: processing_power
  label: Processing Power
  description: 'The speed and throughput of a computational system''s information- processing operations.

    '
  source_documents:
  - notes_information_processing
- id: combinatorial_explosion
  label: Combinatorial Explosion
  description: 'The exponential growth of the number of possible configurations as the number of components
    or variables increases.

    '
  source_documents:
  - notes_information_processing
  - notes_search
- id: combinatorial_complexity
  label: Combinatorial Complexity
  description: 'The class of problems whose solution space grows combinatorially (exponentially or factorially)
    with input size.

    '
  source_documents:
  - notes_information_processing
  - notes_search
- id: curse_of_dimensionality
  label: Curse of Dimensionality
  description: 'The exponential growth in data requirements and computation as the number of input dimensions
    increases.

    '
  source_documents:
  - notes_information_processing
- id: tacit_knowledge
  label: Tacit Knowledge
  description: 'Knowledge that is difficult or impossible to articulate explicitly, often embodied in
    skilled performance and intuition.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
- id: explicit_knowledge
  label: Explicit Knowledge
  description: 'Knowledge that can be stated, recorded, and transferred in formal representations such
    as text or rules.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
- id: commonsense_knowledge
  label: Commonsense Knowledge
  description: 'Implicit background knowledge about everyday situations that humans apply effortlessly
    but is hard to formalise for AI systems.

    '
  source_documents:
  - notes_information_processing
  - notes_representation
  - notes_krr
- id: convenient_fictions
  label: Convenient Fictions
  description: 'Simplifying assumptions known to be imperfect but useful for modelling complex systems
    tractably.

    '
  source_documents:
  - notes_information_processing
- id: mechanization_of_thought
  label: Mechanisation of Thought
  description: 'The project of formalising and automating cognitive processes through computation and
    formal symbol systems.

    '
  source_documents:
  - notes_information_processing
- id: turing_machine
  label: Turing Machine
  description: 'A theoretical model of computation defining what is algorithmically computable by a deterministic
    finite-state tape automaton.

    '
  source_documents:
  - notes_information_processing
  - notes_search
- id: effective_procedure
  label: Effective Procedure
  description: 'A deterministic, finite sequence of unambiguous steps that correctly solves every instance
    of a class of problems.

    '
  source_documents:
  - notes_information_processing
  - notes_search
- id: minimal_effective_procedure
  label: Minimal Effective Procedure
  description: 'The simplest effective procedure that achieves a desired result, with no redundant steps
    or representations.

    '
  source_documents:
  - notes_information_processing
- id: algorithm
  label: Algorithm
  description: 'A finite, deterministic procedure for solving a class of problems, guaranteed to terminate
    with a correct answer.

    '
  source_documents:
  - notes_information_processing
  - notes_search
- id: short_term_long_term_memory
  label: Short-Term vs Long-Term Memory
  description: 'The distinction between limited-capacity working memory (seconds) and virtually unlimited
    long-term storage in cognitive systems.

    '
  source_documents:
  - notes_information_processing
- id: memory_management
  label: Memory Management
  description: 'The allocation, retrieval, and organisation of information in storage systems, both biological
    and artificial.

    '
  source_documents:
  - notes_information_processing
- id: iid_problems
  label: IID Problems
  description: 'Problems where data samples are independently and identically distributed, so training
    and test conditions match.

    '
  source_documents:
  - notes_information_processing
- id: ood_problems
  label: OOD Problems
  description: 'Out-of-distribution problems where test conditions differ from the training distribution,
    challenging generalisation.

    '
  source_documents:
  - notes_information_processing
- id: search
  label: Search
  description: 'The process of exploring a space of states or candidate solutions to find one that satisfies
    a given goal or criterion.

    '
  source_documents:
  - notes_search
- id: state_space
  label: State Space
  description: 'The set of all possible configurations a system or problem can be in, forming the domain
    over which search operates.

    '
  source_documents:
  - notes_search
- id: search_space
  label: Search Space
  description: 'The portion of the state space actively considered or reachable by a given search algorithm
    from the initial state.

    '
  source_documents:
  - notes_search
- id: initial_state
  label: Initial State
  description: 'The starting configuration from which a search process begins.

    '
  source_documents:
  - notes_search
- id: goal_state
  label: Goal State
  description: 'A configuration that satisfies the problem''s objective and constitutes a valid solution.

    '
  source_documents:
  - notes_search
- id: intermediate_state
  label: Intermediate State
  description: 'A state encountered during search that is neither the initial state nor a goal state.

    '
  source_documents:
  - notes_search
- id: state
  label: State
  description: 'A complete description of the configuration of a system at a given point in time.

    '
  source_documents:
  - notes_search
- id: state_transitions
  label: State Transitions
  description: 'The operations that move a system from one state to another, defining the edges in the
    state space graph.

    '
  source_documents:
  - notes_search
- id: operators
  label: Operators
  description: 'Functions that apply transitions to states, producing successor states and defining the
    structure of the search space.

    '
  source_documents:
  - notes_search
- id: actions
  label: Actions
  description: 'The choices available to an agent at each state, which when applied produce state transitions.

    '
  source_documents:
  - notes_search
- id: paths
  label: Paths
  description: 'Sequences of states and transitions that connect an initial state to a goal state through
    the search space.

    '
  source_documents:
  - notes_search
- id: search_tree
  label: Search Tree
  description: 'A tree structure representing the states and transitions explored during a search, rooted
    at the initial state.

    '
  source_documents:
  - notes_search
- id: branches
  label: Branches
  description: 'Edges in a search tree representing transitions from a parent state to a successor (child)
    state.

    '
  source_documents:
  - notes_search
- id: node
  label: Node
  description: 'A single state in a search tree, including its path history and accumulated cost from
    the root.

    '
  source_documents:
  - notes_search
- id: uninformed_search
  label: Uninformed Search
  description: 'Search that uses no domain-specific knowledge about proximity to the goal; explores blindly
    based on structure alone.

    '
  source_documents:
  - notes_search
- id: breadth_first_search
  label: Breadth-First Search
  description: 'An uninformed search strategy that explores all states at depth d before advancing to
    depth d+1, guaranteeing shortest paths.

    '
  source_documents:
  - notes_search
- id: depth_first_search
  label: Depth-First Search
  description: 'An uninformed search strategy that fully explores one branch before backtracking, using
    minimal memory but risking infinite loops.

    '
  source_documents:
  - notes_search
- id: informed_search
  label: Informed Search
  description: 'Search that uses heuristic estimates of distance to the goal to guide exploration toward
    more promising states.

    '
  source_documents:
  - notes_search
- id: heuristics
  label: Heuristics
  description: 'Rules of thumb or approximation functions that guide search toward promising regions of
    the state space.

    '
  source_documents:
  - notes_search
  - notes_evolutionary_strategies
- id: evaluation_function
  label: Evaluation Function
  description: 'A function that estimates the value or promise of a state in informed search, combining
    path cost and heuristic estimate.

    '
  source_documents:
  - notes_search
- id: hill_climbing
  label: Hill Climbing
  description: 'A local search algorithm that greedily moves to the neighbouring state with the best evaluation;
    can get stuck at local optima.

    '
  source_documents:
  - notes_search
  - notes_evolutionary_strategies
- id: generate_and_test
  label: Generate and Test
  description: 'A search strategy that generates candidate solutions and tests each against the goal criteria,
    discarding failures.

    '
  source_documents:
  - notes_search
- id: backtracking
  label: Backtracking
  description: 'A search technique that undoes recent choices and tries alternatives when a partial solution
    cannot be extended.

    '
  source_documents:
  - notes_search
  - notes_krr
- id: pruning
  label: Pruning
  description: 'Eliminating branches of the search tree known to be suboptimal or infeasible, reducing
    computational cost.

    '
  source_documents:
  - notes_search
- id: brute_force
  label: Brute Force
  description: 'Search that exhaustively enumerates all possibilities without heuristic guidance; complete
    but computationally expensive.

    '
  source_documents:
  - notes_information_processing
  - notes_search
  - notes_representation
- id: forward_checking_search
  label: Forward Checking Search
  description: 'A CSP search procedure that after each variable assignment prunes values in unassigned
    neighbours'' domains that would violate constraints.

    '
  source_documents:
  - notes_search
  - notes_krr
- id: adversarial_search
  label: Adversarial Search
  description: 'Search in competitive settings where an opponent actively opposes the agent''s goal, requiring
    minimax or similar strategies.

    '
  source_documents:
  - notes_search
- id: game_tree
  label: Game Tree
  description: 'A search tree representing all possible move sequences in a two-player zero-sum game.

    '
  source_documents:
  - notes_search
- id: von_neumann_search
  label: Von Neumann Search
  description: 'Von Neumann''s approach to game trees emphasising exhaustive minimax evaluation of all
    possible futures.

    '
  source_documents:
  - notes_search
- id: simon_search
  label: Simon Search
  description: 'Simon''s satisficing approach to search, stopping as soon as a solution meeting an aspiration
    threshold is found.

    '
  source_documents:
  - notes_search
- id: means_ends_analysis
  label: Means–Ends Analysis
  description: 'A problem-solving strategy that identifies the difference between the current state and
    the goal and selects operators to reduce it.

    '
  source_documents:
  - notes_search
- id: giant_strides
  label: Giant Strides
  description: 'Large jumps through the search space enabled by macro-operators or chunked knowledge,
    bypassing many intermediate states.

    '
  source_documents:
  - notes_search
- id: planning
  label: Planning
  description: 'The process of constructing a sequence of actions in advance that will achieve a goal
    from an initial state.

    '
  source_documents:
  - notes_search
- id: subgoals
  label: Subgoals
  description: 'Intermediate goals that decompose a complex objective into simpler, independently achievable
    steps.

    '
  source_documents:
