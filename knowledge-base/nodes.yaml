    '
  source_documents:
  - notes_evolutionary_strategies
- id: novel_configurations
  label: Novel Configurations
  description: 'New combinations of features not present in any parent, produced by crossover and mutation
    operators.

    '
  source_documents:
  - notes_evolutionary_strategies
- id: modifications
  label: Modifications
  description: 'Changes to existing solutions produced by evolutionary operators, introducing incremental
    variation.

    '
  source_documents:
  - notes_evolutionary_strategies
- id: mendelian_approach
  label: Mendelian Approach
  description: 'Genetics based on discrete heritable units (genes) that segregate independently, following
    Mendel''s laws of inheritance.

    '
  source_documents:
  - notes_evolutionary_strategies
- id: sparse_learning
  label: Sparse Learning
  description: 'Learning in environments where informative feedback is rare, making credit assignment
    especially difficult.

    '
  source_documents:
  - notes_evolutionary_strategies
- id: spatial_interdependence
  label: Spatial Interdependence
  description: 'The property that the fitness contribution of a gene depends on the values of neighbouring
    genes, causing epistasis in the landscape.

    '
  source_documents:
  - notes_evolutionary_strategies
- id: market_mechanism
  label: Market Mechanism
  description: 'The use of price signals and competitive selection to coordinate decentralised decisions
    without central control.

    '
  source_documents:
  - notes_evolutionary_strategies
- id: cumulative_expected_value
  label: Cumulative Expected Value
  description: 'The total expected payoff accumulated over many trials or time steps, as in multi-armed
    bandit or investment problems.

    '
  source_documents:
  - notes_evolutionary_strategies
- id: interaction
  label: Interaction
  description: >
    The approach to AI and organisations that foregrounds agents' direct engagement with the
    external physical and cultural world rather than internal symbol manipulation, emphasising
    sensorimotor action and experiential phenomena.
  source_documents:
  - notes_interaction
- id: cartesianism
  label: Cartesianism / Cognitivism
  description: >
    The view, tracing to Descartes, that intelligence is constituted by internal symbol
    manipulations divorced from the external world; also called cognitivism. Interactionists
    critique it for neglecting sensorimotor and cultural dimensions of intelligence.
  source_documents:
  - notes_interaction
- id: critical_technical_practice
  label: Critical Technical Practice
  description: >
    Phil Agre's method (CTP) for (1) surfacing hidden assumptions in AI language, (2) evaluating
    them against concrete real-world experience, and (3) using the evaluation to guide alternative
    AI design. Targets wishful mnemonics embedded in everyday AI terminology.
  source_documents:
  - notes_interaction
- id: wishful_mnemonics
  label: Wishful Mnemonics
  description: >
    Memorable terms for symbol manipulation processes (e.g., "search", "planning", "learning")
    that invite the misleading assumption that such processes faithfully capture real-world
    phenomena. Coined in the context of Agre's critical technical practice.
  source_documents:
  - notes_interaction
- id: moravecs_paradox
  label: Moravec's Paradox
  description: >
    The observation by Hans Moravec that tasks deemed "complex" in AI (e.g., chess, Go) are
    often easier to solve than tasks that seem trivially simple to humans (e.g., navigating a
    real environment), inverting naive assumptions about AI difficulty.
  source_documents:
  - notes_interaction
- id: creature_hypothesis
  label: Creature Hypothesis
  description: >
    Rodney Brooks' hypothesis that the sensorimotor foundations of intelligence represent the
    evolutionarily hard part, requiring millions of years to develop, whereas symbolic language
    emerged only recently and relatively quickly. Explains Moravec's paradox from an
    interactionist view.
  source_documents:
  - notes_interaction
- id: homeostasis
  label: Homeostasis
  description: >
    The goal of maintaining a system state within an acceptable range rather than optimising
    toward a fixed target. Coined by W. Ross Ashby in cybernetics and central to interactionist
    AI; contrasts with Cartesian satisficing and optimisation.
  source_documents:
  - notes_interaction
- id: comportment
  label: Comportment
  description: >
    Maintaining an authentic, moment-to-moment alignment between an agent's actions and the
    unfolding physical world, relying on improvisation and homeostasis rather than pre-planned
    symbol manipulation.
  source_documents:
  - notes_interaction
- id: situatedness
  label: Situatedness
  description: >
    The property of intelligent action whereby it depends on sensing and responding to ongoing
    changes in particular real-world situations, not just abstract problem spaces.
  source_documents:
  - notes_interaction
- id: embodiment
  label: Embodiment
  description: >
    The property of intelligent action that grounds it in the physical capabilities and limits
    of a body, rather than treating it as pure symbol manipulation divorced from physical motion.
  source_documents:
  - notes_interaction
- id: embeddedness
  label: Embeddedness
  description: >
    The property of intelligent action whereby it is shaped by the local cultural norms and
    context in which it occurs, altering both the goals and constraints of problem-solving.
  source_documents:
  - notes_interaction
- id: indexing
  label: Indexing
  description: >
    Phil Agre's theory that objects are stored in an agent's memory relative to specific
    experienced situations rather than as abstract designations, enabling efficient sensorimotor
    action without explicit planning.
  source_documents:
  - notes_interaction
- id: registration
  label: Registration
  description: >
    Brian Cantwell-Smith's theory that intelligence requires an ongoing interplay — "reckoning
    and judgment" — between representational schemes, physical reality, and the agent's experience
    of that reality, ensuring representations remain grounded.
  source_documents:
  - notes_interaction
- id: subsumption_architecture
  label: Subsumption Architecture
  description: >
    Rodney Brooks' AI system design organising behaviour as a hierarchy of simple, layered
    goals implemented by finite state machines, where higher-priority goals can subsume
    lower ones; no world model is required.
  source_documents:
  - notes_interaction
- id: direct_manipulation
  label: Direct Manipulation
  description: >
    The paradigm of interacting with digital symbolic representations through physical
    sensorimotor actions on screens and devices, pioneered by Ivan Sutherland's Sketchpad and
    central to GUI design and modern software interaction.
  source_documents:
  - notes_interaction
- id: variety
  label: Variety (Wiener)
  description: >
    Norbert Wiener's concept of complexity reflecting the richness of natural and social
    systems, contrasted with purely internal symbol-manipulation measures such as Shannon
    entropy or Turing-machine step counts.
  source_documents:
  - notes_interaction
- id: cybernetics
  label: Cybernetics
  description: >
    The science of control and communication in animals and machines, founded by Norbert Wiener
    in the 1940s. Uses feedback from environmental interaction as the basis of intelligent
    control, making it a precursor to interactionist AI.
  source_documents:
  - notes_interaction
- id: sensorimotor
  label: Sensorimotor Action
  description: >
    Actions that combine perceptual sensing and physical movement, treated in interactionist AI
    as the fundamental medium of intelligence, prior to and more basic than symbolic representation.
  source_documents:
  - notes_interaction
- id: designation
  label: Designation
  description: >
    Newell and Simon's notion that intelligence requires symbols which "designate" objects in
    the world by giving them names. Contrasted by interactionists with indexing and registration
    as insufficient for grounding meaning in experience.
  source_documents:
  - notes_interaction
- id: digital_ecosystem
  label: Digital Ecosystem
  description: >
    A layered network of interdependent digital agents, services, and goals that has replaced
    the notion of a discrete industry as the unit of strategic innovation; analogised in the text
    to a subsumption architecture of lower- and higher-level goals.
  source_documents:
  - notes_interaction
- id: breakdowns
  label: Breakdowns
  description: >
    Moments when an agent's homeostatic comportment fails — when a situation is no longer
    handled automatically — prompting recourse to explicit symbolic representations as resources
    for action.
  source_documents:
  - notes_interaction
- id: resources_for_action
  label: Resources for Action
  description: >
    The interactionist reframing of symbolic representations: not necessary for interacting
    with the world, but potentially valuable aids invoked when homeostatic comportment breaks
    down.
  source_documents:
  - notes_interaction
- id: finite_state_machines
  label: Finite State Machines
  description: >
    Simple computational circuits with no communication channels used to implement individual
    goal layers in Brooks' subsumption architecture; chosen for their low cost and robustness
    over complex representations.
  source_documents:
  - notes_interaction
- id: extrapolation_fallacy
  label: Extrapolation Fallacy
  description: >
    The recurring tendency in AI to believe that impressive gains on one benchmark task (e.g.,
    playing Go) signal imminent artificial general intelligence, diverting resources from the
    harder sensorimotor challenges identified by the creature hypothesis.
  source_documents:
  - notes_interaction
- id: epistemological_approach
  label: Epistemological Approach
  description: >
    The KRR stance that an intelligent system must first come to know what a problem is
    before searching for solutions to it — contrasted with heuristic search, which assumes
    the problem is already given.
  source_documents:
  - notes_krr
- id: knowledge_about_phenomena
  label: Knowledge About Phenomena
  description: >
    McCarthy's term for general, stable facts about the world that an AI system can represent
    and then use to reason about specific problem-solving situations.
  source_documents:
  - notes_krr
- id: situation
  label: Situation
  description: >
    McCarthy's term for a specific real-world context in which an agent acts, to which general
    knowledge about phenomena is applied for reasoning and credit assignment.
  source_documents:
  - notes_krr
- id: advice_taker
  label: Advice Taker
  description: >
    McCarthy's 1959 vision of a hypothetical AI system that learns new knowledge by being
    told facts in natural language, represents knowledge declaratively across situations, and
    reasons logically rather than through hard-coded procedures.
  source_documents:
  - notes_krr
- id: frame_problem
  label: Frame Problem
  description: >
    McCarthy's 1969 insight that credit assignment in AI requires knowing not only what actions
    are relevant in a situation, but also the vast set of facts that remain unchanged — tracking
    "frame-by-frame" stability across actions in an unfolding situation.
  source_documents:
  - notes_krr
- id: inference_engine
  label: Inference Engine
  description: >
    The reasoning component of a KRR system that draws conclusions from a knowledge base
    by applying logical or probabilistic procedures; contrasted with the knowledge base itself.
  source_documents:
  - notes_krr
- id: commonsense_reasoning
  label: Commonsense Reasoning
  description: >
    The human-like ability to reason flexibly about real-world situations using commonsense
    knowledge; McCarthy argued this is the deepest challenge for AI credit assignment.
  source_documents:
  - notes_krr
- id: elaboration_tolerance
  label: Elaboration Tolerance
  description: >
    McCarthy's quality of an intelligent system whereby the effort required to add new
    knowledge to a repository is proportional to the complexity of that new information;
    a key criterion for scalable KRR.
  source_documents:
  - notes_krr
- id: elaboration
  label: Elaboration
  description: >
    The process of adding or removing units of knowledge (facts, concepts, propositions) to
    an evolving knowledge base or repository as an agent interacts with the world.
  source_documents:
  - notes_krr
- id: default_reasoning
  label: Default Reasoning
  description: >
    Reasoning that proceeds from default assumptions about the world and revises them only
    when specific contradicting evidence arrives; required for elaboration tolerance.
  source_documents:
  - notes_krr
- id: expressiveness
  label: Expressiveness (KRR)
  description: >
    The adequacy of a representational language for expressing all the operations needed to
    reason about and modify knowledge as situations change; a requirement for elaboration
    tolerance in KRR systems.
  source_documents:
  - notes_krr
- id: declarative_knowledge
  label: Declarative Knowledge
  description: >
    Knowledge represented as stand-alone facts or concepts (as in a database), independent
    of any procedure — as opposed to procedural knowledge encoded in step-by-step algorithms.
    McCarthy argued declarative representations are more efficient for commonsense KRR.
  source_documents:
  - notes_krr
- id: procedural_knowledge
  label: Procedural Knowledge
  description: >
    Knowledge encoded as step-by-step sequences of actions (algorithms or procedures);
    contrasted by McCarthy with declarative knowledge, which is more flexible and reusable
    across situations.
  source_documents:
  - notes_krr
- id: logical_entailment
  label: Logical Entailment
  description: >
    The implicit derivation of a fact from other known facts without it ever being explicitly
    stated; the basis on which declarative commonsense knowledge yields vast implicit knowledge.
  source_documents:
  - notes_krr
- id: implicit_knowledge
  label: Implicit Knowledge
  description: >
    Facts that can be derived from a smaller set of explicitly-represented knowledge through
    logical entailment; McCarthy argued that capturing implicit knowledge efficiently is the
    core challenge of commonsense KRR.
  source_documents:
  - notes_krr
- id: speech_acts
  label: Speech Acts
  description: >
    Goal-oriented utterances or written statements whose meaning depends on the pragmatic
    context — who is saying them and for what purpose; relevant to KRR because commonsense
    knowledge alone cannot interpret them without organisational context.
  source_documents:
  - notes_krr
- id: mathematical_logic_approach
  label: Mathematical Logic Approach (KRR)
  description: >
    McCarthy's approach to KRR that represents knowledge as precise, explicit logical
    statements (objects, properties, relationships) and draws inferences through formal
    reasoning procedures rather than statistical prediction.
  source_documents:
  - notes_krr
- id: deep_learning_krr
  label: Deep Learning Approach (KRR)
  description: >
    The currently dominant approach to KRR that represents knowledge as statistical bit-string
    patterns extracted from large-scale data and stored in vector databases; relies on emergent
    reasoning (e.g., chain-of-thought) rather than explicit logical procedures.
  source_documents:
  - notes_krr
- id: vector_databases
  label: Vector Databases
  description: >
    Matrix-like data structures used in deep learning KRR systems to store bit-string
    representations of knowledge; concepts "emerge" as statistical patterns among stored vectors.
  source_documents:
  - notes_krr
- id: chain_of_thought
  label: Chain-of-Thought Reasoning
  description: >
    A prompting strategy for LLMs that instructs the model to reason step-by-step; described
    as a heuristic approach to commonsense reasoning under the deep learning KRR paradigm.
  source_documents:
  - notes_krr
- id: context_engineering
  label: Context Engineering
  description: >
    The practice of selecting and providing relevant information at inference time — via prompts,
    retrieved documents, or other inputs — to condition an LLM's behaviour on a specific
    situation; a substitute for explicit context representation in deep learning KRR.
  source_documents:
  - notes_krr
- id: retrieval_augmented_generation
  label: Retrieval-Augmented Generation (RAG)
  description: >
    A technique that enables deep learning KRR systems to incorporate information from
    external repositories at inference time, extending their effective knowledge base beyond
    what was encoded during training.
  source_documents:
  - notes_krr
- id: world_models
  label: World Models
  description: >
    Deep learning systems that extend LLMs with external memories (vector databases,
    knowledge graphs, multimodal data) to construct richer representations of the world for
    reasoning and prediction.
  source_documents:
  - notes_krr
- id: ontology
  label: Ontology (Formal)
  description: >
    A formal categorisation of phenomena into objects and their relationships, used in the
    mathematical logic approach to KRR to structure knowledge so that AI systems can
    reason about complex, evolving real-world situations.
  source_documents:
  - notes_krr
- id: principle_of_locality
  label: Principle of Locality
  description: >
    The observation that, even for highly complex problems, most constraints can usually be
    reduced to binary constraints (between two variables), allowing agents to process only
    local interdependencies and avoid combinatorial complexity.
  source_documents:
  - notes_representation
- id: procedural_complexity
  label: Procedural Complexity
  description: >
    The complexity of a problem measured as the minimum number of actions (states) a
    program must transition through to solve it — Babbage and Turing's complement to
    information-theoretic measures of complexity.
  source_documents:
  - notes_search
- id: general_problem_solver
  label: General Problem Solver (GPS)
  description: >
    Newell and Simon's AI system (1957) that modelled intelligent search through means-ends
    analysis: reducing the difference between current and goal states using pattern-matching
    and generate-and-test heuristics that could discover new heuristics during search.
  source_documents:
  - notes_search
- id: ill_defined_problems
  label: Ill-Defined Problems
  description: >
    Problems where the goal state, initial state, or available operators are not fully
    specified in advance. Contrasted with well-defined problems; requires constructing
    the problem representation during search rather than before it.
  source_documents:
  - notes_search
