      embarrassingly simple strategies… paired with massive increases in channel capacity."

  # --- ADDRESSES ---
  - type: ADDRESSES
    source: brute_force
    target: combinatorial_explosion
    note: >
      Brute force addresses combinatorial explosion by claiming that a linear increase in
      channel capacity produces an exponential gain in signal-to-noise, overwhelming the
      complexity growth.
    quote: >
      "a belief in brute force rests on a specific assumption… that any combinatorial explosion
      in the complexity of problems will be more than made up for by the exponential increase
      in signal-to-noise from just a linear increase in channel capacity."

  - type: ADDRESSES
    source: modularity
    target: combinatorial_explosion
    note: >
      Modularity addresses combinatorial explosion by decomposing problems into named
      components, dramatically reducing the search space rather than scaling processing power.
    quote: >
      "having a system learn to assign credit not through brute force, so much as through how
      problem-solving is abstracted into meaningful modules akin to Simon's watchmaker is called
      a modularity strategy."

  - type: ADDRESSES
    source: compression
    target: channel_capacity
    note: >
      Compression reduces the information load on a channel by removing redundancies, allowing
      more content to be transmitted within the same capacity.
    quote: >
      "the original message can be 'compressed' into a smaller number of bit strings that, in
      turn, reduces the processing capacity required."

  - type: ADDRESSES
    source: abstraction
    target: combinatorial_explosion
    note: >
      Abstraction reduces the number of informational units needed to describe a problem by
      working at higher levels of structure, avoiding the need to process every detail.
    quote: >
      "One is better off just trying to find better and higher-level abstractions (i.e.,
      decompositions of problems) to avoid having to process so much information in the first place."

  # --- COMPLICATES ---
  - type: COMPLICATES
    source: noise
    target: information_processing
    note: >
      Noise — the inaccurate transmission of bit strings — makes reliable information processing
      harder by introducing errors into the symbolic patterns being communicated.
    quote: >
      "'Noise' (communication of wrong or irrelevant bit strings) is contrasted with 'signals',
      or the accurate communication of bit strings in a message."

  - type: COMPLICATES
    source: ood_problems
    target: credit_assignment
    note: >
      OOD problems violate the IID statistical assumptions underlying Shannon information,
      making it impossible to rely on learned probability distributions for credit assignment.
    quote: >
      "in many or most real-world settings, they are the rule rather than the exception, and
      this was precisely Minsky's point."

  - type: COMPLICATES
    source: combinatorial_complexity
    target: information_processing
    note: >
      More combinatorially complex problems require exponentially more processing capacity,
      eventually overwhelming any finite system.
    quote: >
      "the complexity of a problem as the amount of symbol manipulation actions for solving it…
      processing more complex information requires greater 'processing power' or 'processing capacity'."

  # --- REQUIRES ---
  - type: REQUIRES
    source: brute_force
    target: channel_capacity
    note: >
      The brute force strategy is only viable if sufficient channel capacity exists to match the
      combinatorial growth of the problem; without it, the strategy fails.
    quote: >
      "having a system learn to assign credit intelligently just by pairing a simple strategy with
      essentially big computers is called a brute force strategy."

  - type: REQUIRES
    source: physical_symbol_system_hypothesis
    target: abstraction
    note: >
      The physical symbol system hypothesis depends on agents having access to meaningful
      abstractions; without abstraction, symbols remain meaningless bit strings.
    quote: >
      "efficient intelligent systems arise not by sheer scaling of syntactic processing capacity,
      but by how meaningful abstractions of bit strings eliminate the need to process information
      about every detail of the environment."

  # --- INSTANCE-OF ---
  - type: INSTANCE-OF
    source: ex_theseus_robot_1950
    target: shannon_information
    note: >
      Theseus demonstrates Shannon's approach in action: a machine that learns to navigate
      a maze using only syntactic circuit signals as information.
    quote: >
      "Shannon… famously displayed this convenient fiction in a robotic mouse he built in 1950
      called Theseus, which 'learns' to navigate a maze."

  - type: INSTANCE-OF
    source: ex_theseus_robot_1950
    target: syntactic_information
    note: >
      Theseus processed only syntactic information — circuit signals indicating open or closed
      paths — with no semantic interpretation of what they meant.
    quote: >
      "Such 'learning' did not require Theseus to interpret the sequence of actions he took,
      other than associating the actions with good or bad paths."

  - type: INSTANCE-OF
    source: ex_telephone_network_routing
    target: channel_capacity
    note: >
      The AT&T telephone network is Shannon's original motivating example of a system with
      physical channel capacity limits to be managed.
    quote: >
      "He developed his approach… ostensibly to solve problems of routing calls over complex
      telephone networks while working at Bell Labs."

  - type: INSTANCE-OF
    source: ex_fiber_optic_5g_tv_bandwidth
    target: bandwidth
    note: >
      The contrast between a TV channel and fiber optic 5G cable illustrates differences in
      bandwidth — the amount of information a channel can carry per unit time.
    quote: >
      "A conventional TV channel… has access to only a limited amount of bandwidth, while
      fiber optic cables in a 5G network have more capacity."

  - type: INSTANCE-OF
    source: ex_pilot_cockpit_altimeter
    target: information_processing
    note: >
      The cockpit pilot illustrates information processing as symbol manipulation — receiving,
      interpreting, and acting on diverse symbolic inputs.
    quote: >
      "A pilot, for example, receives feedback as symbolic information in the visual displays
      of cockpit instruments, audio updates from air traffic control, or ear pressure from a
      sudden change in altitude."

  - type: INSTANCE-OF
    source: ex_coin_toss_fair
    target: iid_problems
    note: >
      A fair coin toss is the canonical IID example: each flip is independent of all others and
      the probability distribution (50/50) never changes.
    quote: >
      "A canonical example is a coin toss, assuming a fair coin. The first coin flip does not
      depend on the second coin flip… the coin flips are independent."

  - type: INSTANCE-OF
    source: ex_coin_toss_weighted_70_30
    target: ood_problems
    note: >
      The non-fair or otherwise violated coin toss illustrates OOD conditions — violations of
      the IID assumptions (weighted coin, edge landing, unreadable result).
    quote: >
      "The coin may not be fair… These and many other possible violations of the basic IID
      coin toss set-up can be thought of as out-of-distribution, or 'OOD'."

  - type: INSTANCE-OF
    source: ex_watchmaker_parable_1000_parts
    target: simon_information
    note: >
      Simon's watchmaker parable is his key illustration of the need for semantic information:
