  # --- REQUIRES ---
  - type: REQUIRES
    source: csp
    target: constraint_propagation
    note: >
      CSPs require propagation to check consistency of assignments
      across the constraint network.

  - type: REQUIRES
    source: backtracking
    target: partial_assignment
