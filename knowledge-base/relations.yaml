  # --- CROSS-MODULE: new additions ---

  - type: CONTRASTS-WITH
    source: krr
    target: search
    note: >
      The notes explicitly contrast the two: search is a heuristic
      approach that assumes the problem is already given; KRR is an
      epistemological approach in which agents must first learn what
      the problem is before searching for solutions.