  # =========================================================
  # Evolutionary Strategies
  # Source: Course Notes — Evolutionary Strategies - FAB Spring 2026.pdf
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: evolutionary_strategies
    target: adaptation
    note: >
      The document defines evolutionary strategies as AI ideas for how to adapt, treating
      them as the specific AI formalisation of adaptation processes.
    quote: >
      "We will call processes of learning to search effectively for solutions to problems as ones
      of adaptation, and AI ideas for how to adapt as evolutionary strategies."

  - type: IS-A
    source: genetic_algorithms
    target: evolutionary_strategies
    note: >
      Genetic algorithms are a chromosome-inspired form of evolutionary strategy, using
      crossover and mutation operators to search performance landscapes.
    quote: >
      "A first approach pioneered by the AI scholar John Holland at the University of Michigan
      is called 'genetic algorithms'."

  - type: IS-A
    source: mendelian_approach
    target: evolutionary_strategies
    note: >
      The Mendelian (gene-inspired) approach is a baseline evolutionary strategy that treats
      adaptive building blocks as individual genes varied by random experimentation.
    quote: >
      "This is much like the idea of plant-breeding as introduced by Gregor Mendel, in which
      evolution occurs through crossing-over (and occasionally mutating) genetic sequences
      across generations."

  - type: IS-A
    source: propagator_model
    target: evolutionary_strategies
    note: >
      The propagator model is a biological-systems-inspired evolutionary strategy that
      propagates constraint information through object networks rather than varying genetic
      sequences across a population.
    quote: >
      "A second approach, pioneered by Marvin Minsky's student Gerald Sussman at MIT, is
      called the 'propagator model'."

  - type: IS-A
    source: hill_climbing
    target: exploitation
    note: >
      Hill-climbing consists of incremental modifications guided by local feedback — the
      canonical exploitation strategy in performance landscapes.
    quote: >
      "we will call smaller modifications — hill-climbing actions — as 'exploitation', in the
      sense that such actions exploit the feedback immediately available to us."

  - type: IS-A
    source: long_jumping
    target: exploration
    note: >
      Long-jumping makes large modifications that venture beyond immediate feedback,
      constituting exploration in the landscape.
    quote: >
      "we will call such movement in the landscape as 'long-jumping'… we will call such
      actions as 'exploration', in that we are venturing into a part of the landscape about
      which we do not have good feedback."

  - type: IS-A
    source: gradient_descent
    target: hill_climbing
    note: >
      Gradient descent is hill-climbing applied to a minimisation objective — the landscape is
      simply viewed upside-down.
    quote: >
      "If the performance measure is something to minimize, then the landscape is simply
      viewed upside-down, and the learning process is called 'gradient descent'."

  - type: IS-A
    source: vsr
    target: evolutionary_strategies
    note: >
      VSR (Variation–Selection–Retention) is the core algorithmic mechanism that underlies
      all evolutionary strategies.
    quote: >
      "These operators are commonly summarized as VSR, standing for variation…selection…
      and retention."

  - type: IS-A
    source: adaptation
    target: credit_assignment
    note: >
      The document frames adaptation as a population-level form of credit assignment:
      generate-and-test applied across a population rather than to a single agent's actions.
    quote: >
      "adaptation is essentially a generate-and-test strategy for assigning credit at the
      population-level."

  # --- PART-OF ---
  - type: PART-OF
    source: variation
    target: vsr
    note: >
      Variation is the first operator of VSR, generating different candidate solutions in
      the population.
    quote: >
      "VSR, standing for variation (generating different solutions), selection…and retention."

  - type: PART-OF
    source: selection
    target: vsr
    note: >
      Selection is the second VSR operator, assigning credit to high-fitness solutions.
    quote: >
      "selection (assigning credit to high-fitness (i.e., high-performing) solutions)."

  - type: PART-OF
    source: retention
    target: vsr
    note: >
      Retention is the third VSR operator, carrying high-performing solutions into the next
      generation of trials.
    quote: >
      "retention (using high-performing solutions in the next 'generation' of trials)."

  - type: PART-OF
    source: genes
    target: chromosome
    note: >
      In genetic algorithms, the chromosome is composed of individual genes, each encoded
      as a bit in a bit string.
    quote: >
      "In genetic algorithms, a schema…is analogized to a 'chromosome', composed of sets
      of 'genetic sequences'. Each bit is analogized to a 'gene'."

  - type: PART-OF
    source: crossover
    target: genetic_algorithms
    note: >
      Crossover is one of the two core genetic operators in GAs; it randomly combines
      chromosomes across a population to generate variation.
    quote: >
      "Variation in the population of genes is coded by making random combinations of two
      or more chromosomes (called 'crossover')."

  - type: PART-OF
    source: mutation
    target: genetic_algorithms
    note: >
      Mutation randomly changes the value of one or more genes in a chromosome, providing
      another source of variation in GAs.
    quote: >
      "by randomly changing the values of one or more genes in a chromosome (called
      'mutation')."

  - type: PART-OF
    source: implicit_parallelism
    target: genetic_algorithms
    note: >
      Implicit parallelism is Holland's key insight behind genetic algorithms: crossover and
      mutation effectively search a vast space of chromosomes without trying most of them.
    quote: >
      "Holland's key insight was that, just by the simple evolutionary mechanisms of crossover
      and mutation, a vast space of possible combinations of genes can be searched… He called
      his insight 'implicit parallelism'."

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: evolutionary_strategies
    target: charles_darwin
    note: >
      Evolutionary strategies in AI derive from Darwinism, which provides the general
      framework of fitness-based adaptation.
    quote: >
      "Evolutionary strategies in AI systems and organizations can be traced to the work of
      Charles Darwin in the 19th century."

  - type: ATTRIBUTED-TO
    source: genetic_algorithms
    target: john_holland
    note: >
      Holland pioneered genetic algorithms at the University of Michigan, introducing the
      chromosome representation and implicit parallelism insight.
    quote: >
      "A first approach pioneered by the AI scholar John Holland at the University of Michigan
      is called 'genetic algorithms'."

  - type: ATTRIBUTED-TO
    source: propagator_model
    target: gerald_sussman
    note: >
      Gerald Sussman, Minsky's student at MIT, pioneered the propagator model as a
      biological-systems-inspired alternative to genetic algorithms.
    quote: >
      "A second approach, pioneered by Marvin Minsky's student Gerald Sussman at MIT, is
      called the 'propagator model'."

  - type: ATTRIBUTED-TO
    source: mendelian_approach
    target: gregor_mendel
    note: >
      The Mendelian approach is named after Gregor Mendel's plant-breeding experiments,
      which first formalised heredity through crossing-over and mutation.
    quote: >
      "This is much like the idea of plant-breeding as introduced by Gregor Mendel."

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: exploration
    target: exploitation
    note: >
      Exploration and exploitation are the two opposing poles of the adaptive learning
      tradeoff: exploration ventures beyond immediate feedback; exploitation refines
      within a known gradient.
    quote: >
      "Given that both 'exploring' and 'exploiting' have risks, the idea in learning programs
      in AI and in organizations is often to balance the two strategically."

  - type: CONTRASTS-WITH
    source: genetic_algorithms
    target: propagator_model
    note: >
      Genetic algorithms represent the gene/chromosome-inspired paradigm (search via
      variation-selection); the propagator model represents the biological-systems paradigm
      (constraint propagation without population-level search).
    quote: >
      "The first two examples are closer to the reinforcement learning paradigm…The third
      example is closer to the learning in a society paradigm."

  # --- CAUSES ---
  - type: CAUSES
    source: exploitation
    target: myopia
    note: >
      Relying purely on hill-climbing (exploitation) causes myopia: the agent only sees the
      local gradient and misses the global optimum.
    quote: >
      "Such learning is called 'myopic', in that the agent is only seeing things locally,
      rather than the entire landscape, and hence missing the global optimum."

  - type: CAUSES
    source: exploitation
    target: path_dependence
    note: >
      Because exploitative agents climb to the nearest peak, their final position depends
      heavily on their initial random starting point.
    quote: >
      "the costs of myopia depend on the luck of wherever our initial actions map to in the
      performance landscape. This is called path dependence."

  - type: CAUSES
    source: local_peaks
    target: superstitious_learning
    note: >
      When an agent climbs the wrong local peak, the improving feedback signal creates the
      illusion that actions are genuinely creditworthy, producing superstitious learning.
    quote: >
      "a rugged landscape also helps visualize the phenomenon of superstitious learning.
      When we go up the 'wrong' local peak, it is because we are getting feedback that our
      performance is improving, yet this feedback may be just superstition."

  # --- ADDRESSES ---
  - type: ADDRESSES
    source: long_jumping
    target: local_peaks
    note: >
      Long-jumping is the strategy for escaping local peaks by making large exploratory
      modifications that move off the current gradient.
    quote: >
      "to avoid myopia and path dependence, we need to be able to move off of local peaks
      to other peaks… we will call such movement in the landscape as 'long-jumping'."

  - type: ADDRESSES
    source: satisficing
    target: local_peaks
    note: >
      Setting an aspiration level below the global optimum allows an agent to accept a
      satisfactory solution, avoiding the worst local peaks without needing to find the global
      maximum.
    quote: >
      "even while economizing on information processing, the agent is able to avoid the worst
      peaks, which may be 'good enough'."

  - type: ADDRESSES
    source: propagator_model
    target: mesa_landscape
    note: >
      The propagator model's constraint-propagation approach is suited to mesa landscapes
      where there are no gradients to climb, requiring "giant strides" of coherent reasoning.
    quote: >
      "something like Sussman's propagator model is needed to construct an understanding of
      the structure of a problem in terms of stable functions (constraints)."

  - type: ADDRESSES
    source: decomposition
    target: spatial_interdependence
    note: >
      Decomposing a problem into independently-functioning parts is the fundamental response
      to spatial interdependence, echoing the watchmaker parable's logic.
    quote: >
      "we will take the fundamental challenge of intelligence as essentially one of
      decomposing the parts of a problem according to their functions."

  - type: ADDRESSES
    source: smoothing_topology
    target: local_peaks
    note: >
      Using modular abstractions (like the second watchmaker's component understanding)
      smooths the rugged landscape, reducing the risk of getting trapped on local peaks.
    quote: >
      "you can think of the effects of such use of components as 'smoothing' the topology
      of the landscape from steep and rugged to gentler."

  # --- COMPLICATES ---
  - type: COMPLICATES
    source: spatial_interdependence
    target: credit_assignment
    note: >
      When actions are spatially interdependent, even small changes to one component affect
      all others combinatorially, making it difficult to assign credit to individual actions.
    quote: >
      "Due to interdependence and combinatorial complexity, even small changes to just a
      single component can have large effects on the performance."

  - type: COMPLICATES
    source: mesa_landscape
    target: exploration_exploitation_tradeoff
    note: >
      In mesa landscapes there are no gradients, so neither hill-climbing nor long-jumping
      provides useful feedback, making the standard exploration–exploitation tradeoff
      inapplicable.
    quote: >
      "Unlike a hilly or peaked landscape, there are no obvious slopes for hill-climbing or
      long-jumping to a satisfactory solution — exploration-exploitation strategies will not work."

  # --- REQUIRES ---
  - type: REQUIRES
    source: performance_landscape
    target: schema
    note: >
      Constructing a performance landscape requires first defining a schema — a simplified
      representation of the agent's task environment (actions, states, performance criteria).
    quote: >
      "We will refer to these simplified representations of symbols as the agent's schemas…
      To interpret a landscape, we need to describe (1) a performance goal; (2) the set of
      actions and states in the schema."

  - type: REQUIRES
    source: genetic_algorithms
    target: exploration_exploitation_tradeoff
    note: >
      Genetic algorithms explicitly operationalise the exploration–exploitation tradeoff
      through crossover (exploration) and incremental variation (exploitation).
    quote: >
      "genetic algorithms, or other schemes inspired by them, enable such effects simply
      based on balancing the level of exploration-exploitation."

  # --- INSTANCE-OF ---
  - type: INSTANCE-OF
    source: natural_selection
    target: selection
    note: >
      Natural selection is the biological instantiation of the VSR selection operator:
      organisms with higher fitness survive and reproduce.
    quote: >
      "In evolutionary terms, we would say that the firms that thrive have higher 'fitness'."

  - type: INSTANCE-OF
    source: market_mechanism
    target: selection
    note: >
      Market forces operate as a selection mechanism, assigning credit (survival) to
      high-performing firms and eliminating low-performing ones.
    quote: >
      "Credit would be assigned by market forces (selection). Factories that made higher
      quality or cheaper pins would thrive (retention)."

  - type: INSTANCE-OF
    source: watchmaker_parable
    target: spatial_interdependence
    note: >
      The watchmaker parable concretely illustrates the challenge of spatial interdependence:
      assembling a watch with 1000 parts requires understanding how they function together.
    quote: >
      "the challenge is not really the sequence of the watch assembly tasks, but in the need
      for effective decomposition based on understanding how a large number of parts are
      spatially-configured to function together."

  - type: INSTANCE-OF
    source: chromosome
    target: schema
    note: >
      In genetic algorithms, the chromosome is the schema — a simplified bit-string
      representation of candidate solutions in the problem space.
    quote: >
      "a schema for representing a problem is analogized to a 'chromosome'."


  # =========================================================
  # Knowledge Representation and Reasoning (KRR)
  # Source: Course Notes — Knowledge Representation and Reasoning - FAB Spring 2026.pdf
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: krr
    target: credit_assignment
    note: >
      KRR is framed in the document as a distinct approach to the general credit-assignment
      problem: instead of search or reinforcement, it assigns credit by reasoning about
      knowledge of phenomena across situations.
    quote: >
      "KRR instead is based on an epistemological approach, in which the assumption is
      that we have to get to know problems before even considering how to search for
      solutions to them."

  - type: IS-A
    source: epistemological_approach
    target: krr
    note: >
      The epistemological approach is the defining methodological stance of KRR: know the
      problem first, then reason about how to solve it.
    quote: >
      "KRR instead is based on an epistemological approach, in which the assumption is
      that we have to get to know problems before even considering how to search for
      solutions to them."

  - type: IS-A
    source: mathematical_logic_approach
    target: krr
    note: >
      The mathematical logic approach is one of two main approaches to KRR studied in
      the document, using explicit logical representations and reasoning procedures.
    quote: >
      "Another approach, pioneered by John McCarthy himself, is based on mathematical logic."

  - type: IS-A
    source: deep_learning_krr
    target: krr
    note: >
      The deep learning approach is the other main KRR approach, representing knowledge
      as statistical patterns in bit strings extracted from large-scale data.
    quote: >
      "The currently-popular approach to knowledge representation and reasoning (KRR) is
      based on deep learning."

  - type: IS-A
    source: chain_of_thought
    target: heuristics
    note: >
      Chain-of-thought is described as a heuristic strategy for prompting LLMs to reason;
      it is not a formal reasoning procedure but an educated guess about how to elicit
      reasoning behaviour.
    quote: >
      "AI systems in a mathematical logic approach also use explicit reasoning procedures
      (rather than heuristic strategies such as 'chain-of-thought')."

  - type: IS-A
    source: logical_entailment
    target: implicit_knowledge
    note: >
      Logical entailment is the mechanism by which implicit knowledge is derived: the
      connection between two facts that yields a new fact without it ever being explicitly stated.
    quote: >
      "The connection between these two facts is called a logical entailment. This entailment
      was implicit in your commonsense knowledge."

  # --- PART-OF ---
  - type: PART-OF
    source: knowledge_base
    target: krr
    note: >
      The knowledge base is one of the two structural components of a KRR system, storing
      representations of knowledge about phenomena.
    quote: >
      "augment constraints with representations of knowledge, or what is often called in AI
      a knowledge base."

  - type: PART-OF
    source: inference_engine
    target: krr
    note: >
      The inference engine is the second structural component of a KRR system, providing
      the reasoning strategies that operate over the knowledge base.
    quote: >
      "augment basic ways of evaluating constraints with more complex reasoning strategies,
      or what is often called in AI an inference engine."

  - type: PART-OF
    source: commonsense_knowledge
    target: krr
    note: >
      Commonsense knowledge is the foundational content requirement of any KRR system;
      McCarthy argued it is a prerequisite for representing and reasoning about any specific
      problem.
    quote: >
      "the ability of an AI system or organization to represent and reason about knowledge
      about any particular problem depends on (indeed, presupposes) a base of commonsense
      knowledge and reasoning."

  - type: PART-OF
    source: commonsense_reasoning
    target: krr
    note: >
      Commonsense reasoning is the reasoning capability required alongside commonsense
      knowledge for a general-purpose KRR system to work.
    quote: >
      "McCarthy's overall point of view was that an intelligent AI system or organization
      is one that has common sense, defined as a general capacity to represent and reason
      about knowledge across situations."

  - type: PART-OF
    source: default_reasoning
    target: elaboration_tolerance
    note: >
      Default reasoning is a necessary mechanism for elaboration tolerance: by reasoning
      from defaults and revising only on new evidence, an agent limits how much knowledge
      must be updated for each elaboration.
    quote: >
      "elaborating our commonsense knowledge efficiently requires doing so on the basis of
      some default assumptions."

  - type: PART-OF
    source: expressiveness
    target: elaboration_tolerance
    note: >
      An expressive formal language is required for elaboration tolerance so that all
      necessary operations on the knowledge repository can be expressed precisely.
    quote: >
      "we call such a language as having adequate expressiveness — essentially, being able
      to express any operators you need to reason about and modify the representations of
      knowledge as situations change."

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: advice_taker
    target: john_mccarthy
    note: >
      McCarthy proposed the Advice Taker in 1959 as his vision of a KRR-based AI system
      that learns from natural-language advice and reasons about knowledge declaratively.
    quote: >
      "In 1959, McCarthy outlined a vision of the possibilities for KRR in terms of a
      hypothetical AI system that he called the 'advice taker'."

  - type: ATTRIBUTED-TO
    source: frame_problem
    target: john_mccarthy
    note: >
      McCarthy identified the frame problem in 1969 as the fundamental credit-assignment
      challenge in KRR.
    quote: >
      "A decade of research later, in 1969, he outlined what he had found to be the
      fundamental credit assignment challenge in KRR that he called the 'frame problem'."

  - type: ATTRIBUTED-TO
    source: krr
    target: john_mccarthy
    note: >
      John McCarthy pioneered KRR in AI, proposing the epistemological stance, the Advice
      Taker, and the formal logic approach.
    quote: >
      "Our guiding light for exploring KRR will be mathematician John McCarthy…who
      pioneered KRR ideas in AI."

  - type: ATTRIBUTED-TO
    source: elaboration_tolerance
    target: john_mccarthy
    note: >
      McCarthy coined and formalised the concept of elaboration tolerance as the key
      quality required of an intelligent KRR system.
    quote: >
      "He called such a quality of an intelligent system to 'take out the trash' efficiently
      as its elaboration tolerance."

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: mathematical_logic_approach
    target: deep_learning_krr
    note: >
      The mathematical logic approach uses explicit, declarative representations and formal
      reasoning; the deep learning approach uses statistical patterns and emergent reasoning —
      the two paradigmatically-different approaches to KRR examined in the document.
    quote: >
      "One approach…derives from the idea of Boltzmann machines… Another approach…
      derives from McCarthy himself and views knowledge representations as emerging
      from patterns in lists."

  - type: CONTRASTS-WITH
    source: declarative_knowledge
    target: procedural_knowledge
    note: >
      Declarative knowledge (stand-alone facts and concepts) is contrasted with procedural
      knowledge (step-by-step algorithms); McCarthy argued declarative representations
      are more efficient for commonsense KRR.
    quote: >
      "McCarthy proposed that this efficiency…depends on representing explicit knowledge
      in AI systems or organizations declaratively…rather than procedurally."

  - type: CONTRASTS-WITH
    source: explicit_knowledge
    target: implicit_knowledge
    note: >
      Explicit knowledge is stored directly; implicit knowledge is derivable from explicit
      knowledge via logical entailment. McCarthy's insight was that explicit commonsense
      representations yield vast implicit knowledge efficiently.
    quote: >
      "If most commonsense knowledge is implicit, then we can represent it efficiently by
      representing a still vast, yet much smaller amount of explicit knowledge."

  - type: CONTRASTS-WITH
    source: epistemological_approach
    target: heuristics
    note: >
      KRR's epistemological approach requires knowing what a problem is before solving it,
      contrasted with heuristic search which assumes the problem is already given.
    quote: >
      "In this heuristic approach, it was assumed that we already knew the problem: the search
      tree was given… KRR instead is based on an epistemological approach."

  # --- ADDRESSES ---
  - type: ADDRESSES
    source: advice_taker
    target: frame_problem
    note: >
      The Advice Taker is McCarthy's proposed AI system that would need elaboration
      tolerance and commonsense knowledge to address the frame problem.
    quote: >
      "McCarthy's proposed AI system can be summarized as having the following
      characteristics: (1) The Advice Taker easily learns new representations just by you
      telling it facts about the situation."

  - type: ADDRESSES
    source: elaboration_tolerance
    target: frame_problem
    note: >
      Elaboration tolerance is McCarthy's proposed criterion for addressing the frame
      problem: a system that can efficiently update its knowledge as situations unfold
      handles the combinatorial complexity of tracking relevant vs irrelevant facts.
    quote: >
      "having common sense knowledge requires having some automatic way of 'taking out
      the trash' in the repository after each elaboration of it."

  - type: ADDRESSES
    source: mathematical_logic_approach
    target: frame_problem
    note: >
      The mathematical logic approach directly addresses the frame problem by formally
      specifying what changes and what stays the same across situations.
    quote: >
      "They directly address issues like the frame problem by trying to formally specify
      what changes and what stays the same across situations."

  - type: ADDRESSES
    source: declarative_knowledge
    target: commonsense_knowledge
    note: >
      Representing knowledge declaratively is McCarthy's proposed strategy for efficiently
      capturing vast commonsense knowledge, because facts can be reused across many
      situations unlike procedural code.
    quote: >
      "The reason is that facts can be implicitly derived across many more situations than
      sequential procedures."

  # --- CAUSES ---
  - type: CAUSES
    source: frame_problem
    target: elaboration
    note: >
      The frame problem means that every action in the world triggers a need for novel
      elaboration of the knowledge base — an agent must know what changed and what did not.
    quote: >
      "each action in the world, or interaction (query, prompt, etc.) results in a need for
      novel elaboration of the knowledge bases or databases of an AI system."

  - type: CAUSES
    source: logical_entailment
    target: implicit_knowledge
    note: >
      Logical entailment is the mechanism that causes implicit knowledge to exist: facts
      entail further facts that were never explicitly stated but are derivable.
    quote: >
      "The connection between these two facts is called a logical entailment. This entailment
      was implicit in your commonsense knowledge."

  # --- COMPLICATES ---
  - type: COMPLICATES
    source: frame_problem
    target: credit_assignment
    note: >
      The frame problem vastly complicates credit assignment: an AI system must know not
      just which actions are relevant, but also the entire set of facts that remain unchanged,
      expanding the knowledge requirement combinatorially.
    quote: >
      "Such a system would need to assign credit to the events and actions of the entire
      universe and do so dynamically as situations unfold frame-by-frame."

  - type: COMPLICATES
    source: speech_acts
    target: commonsense_knowledge
    note: >
      Speech acts require goal-oriented contextual interpretation that commonsense
      knowledge alone cannot provide — they introduce pragmatic complexity beyond
      general world knowledge.
    quote: >
      "knowledge for interpreting what is said or written cannot be handled by general
      common sense alone — it requires knowledge of the pragmatic (i.e., goal-oriented)
      context of the organization."

  # --- REQUIRES ---
  - type: REQUIRES
    source: krr
    target: commonsense_knowledge
    note: >
      A KRR system requires commonsense knowledge as its foundational content: without it,
      reasoning about any specific problem presupposes knowledge the system does not have.
    quote: >
      "McCarthy proposed that such an 'Advice Taker' AI system could be generally
      intelligent when it is provided with (1) enough knowledge…to represent any problem
      in the world."

  - type: REQUIRES
    source: elaboration_tolerance
    target: declarative_knowledge
    note: >
      Elaboration tolerance requires knowledge to be represented declaratively, because
      declarative facts can be added, modified, or removed without cascading side effects
      through procedural code.
    quote: >
      "A clear advantage is that this formalization means that it is always possible to
      reason precisely about how any conclusions are reached, and to modify knowledge
      in a principled fashion."

  # --- INSTANCE-OF ---
  - type: INSTANCE-OF
    source: chain_of_thought
    target: commonsense_reasoning
    note: >
      Chain-of-thought is described as a heuristic approximation of commonsense reasoning
      that emerges from training LLMs on large data; proponents treat it as an "emergent"
      form of the reasoning McCarthy sought.
    quote: >
      "The surprisingly powerful results of this and other strategies has led proponents of
      the deep learning approach to think of commonsense reasoning as an 'emergent ability'."

  - type: INSTANCE-OF
    source: retrieval_augmented_generation
    target: context_engineering
    note: >
      RAG is a specific technique within the broader context engineering paradigm, enabling
      LLMs to pull in relevant external knowledge at inference time.
    quote: >
      "Techniques such as retrieval-augmented generation (RAG) enable systems to
      incorporate information from external repositories."

  - type: INSTANCE-OF
    source: ontology
    target: knowledge_base
    note: >
      An ontology is a specific form of knowledge base used in the mathematical logic
      approach, formally categorising phenomena into objects and their relationships.
    quote: >
      "AI systems in this approach construct rich conceptual structures, such as formal
      databases and ontologies — categorizations of phenomena into objects."

  - type: INSTANCE-OF
    source: palantir
    target: mathematical_logic_approach
    note: >
      Palantir is cited as a recent commercial example of the mathematical logic approach,
      building vast ontologies of real-world entities and relationships for client organisations.
    quote: >
      "the software platform Palantir builds vast ontologies that structure data for specific
      client organizations in terms of real-world 'entities'…and their relationships."


  # =========================================================
  # Representation
  # Source: Course Notes — Representation - FAB.pdf
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: representation
    target: schema
    note: >
      The document explicitly defines representation as the term for a schema when it is used
      in an AI system or organisation.
    quote: >
      "We will refer to a schema used in an AI system or organization as a 'representation'."

  - type: IS-A
    source: representation
    target: credit_assignment
    note: >
      The document frames representation as an intelligence strategy for credit assignment:
      the right representation "exposes the natural constraints" that simplify finding solutions.
    quote: >
      "given the right representation, challenges of assigning credit to complex sequences
      of actions largely go away."

  - type: IS-A
    source: csp
    target: constraint_network
    note: >
      Constraint satisfaction problems are a specific, representation-informed type of search
      that operates on a constraint network where goals are uniquely or optimally satisfiable.
    quote: >
      "constraint satisfaction as almost like a new type of search that interleaves representations."

  - type: IS-A
    source: bayesian_networks
    target: constraint_network
    note: >
      Causal nets (Bayesian networks) are a type of constraint network where constraints are
      conditional probabilities in a directed acyclic graph structure.
    quote: >
      "causal nets…involves viewing a constraint network as a strategy for representing and
      testing for cause-effect relations among variables."

  - type: IS-A
    source: boltzmann_machines
    target: constraint_network
    note: >
      Boltzmann machines are a constraint network type where constraints are learned correlations
      (weights) among binary variables, with soft constraints and entropy minimisation.
    quote: >
      "In Boltzmann machines, the variables are meant to resemble neurons that are either
      'on' or 'off'… A Boltzmann machine largely 'learns' constraints by processing information."

  - type: IS-A
    source: expert_systems
    target: representation
    note: >
      Expert systems are a representation strategy in which domain experts' heuristic rules
      are codified as if-then productions in a knowledge base.
    quote: >
      "Representations that are acquired and stored as heuristics for solving problems… is
      done in what is called an expert system."

  - type: IS-A
    source: constraint_propagation
    target: credit_assignment
    note: >
      Propagation across a constraint network is the mechanism by which representations
      assign credit: information about one constraint yields "gold mine" feedback for
      neighbouring constraints.
    quote: >
      "The credit assignment mechanism can be explained in information processing terms
      through the concept of propagation."

  - type: IS-A
    source: forward_checking
    target: constraint_propagation
    note: >
      Forward-checking interleaves a search action with a propagation step: after guessing
      a value, the system checks consistency across all related constraints.
    quote: >
      "Interleaving propagation with search is called forward-checking."

  - type: IS-A
    source: backtracking
    target: search
    note: >
      Backtracking is a depth-first search strategy used within CSPs: it guesses values in
      sequence and reverts to the previous choice on a constraint violation.
    quote: >
      "backtracking…is a depth-first search strategy that involves guessing the values of
      squares in a sequence then, when a violation of a constraint happens, going back one
      move."

  - type: IS-A
    source: representation_learning
    target: boltzmann_machines
    note: >
      Representation learning is the term used in machine learning for learning the
      constraint network in a Boltzmann machine — learning the probability distribution
      over variables from data.
    quote: >
      "'learning' the constraint network, also called 'representation learning'."

  # --- PART-OF ---
  - type: PART-OF
    source: variables
    target: constraint_network
    note: >
      Variables are the nodes of a constraint network, representing anything measurable
      and relevant to the problem.
    quote: >
      "Any complex problem can be defined as a set of (i) variables, (ii) variable domains,
      and (iii) constraints."

  - type: PART-OF
    source: domain
    target: constraint_network
    note: >
      Domains define the allowable values for each variable, constituting one of three
      structural elements of a constraint problem.
    quote: >
      "A domain is a set of allowable values for variables."

  - type: PART-OF
    source: weights_boltzmann
    target: boltzmann_machines
    note: >
      Weights are the learned correlations (soft constraints) between binary input and output
      variables in a Boltzmann machine.
    quote: >
      "These correlations are probabilities called 'weights', rather than actual cause-effect
      relationships, which are the constraints in the network."

  - type: PART-OF
    source: entropy_minimization_boltzmann
    target: boltzmann_machines
    note: >
      Entropy minimisation is the learning procedure in a Boltzmann machine: propagation
      modifies weights until the overall "cost" (entropy) is minimised.
    quote: >
      "Propagation refers to sending information across the network to modify the weights
      until the overall 'cost' is minimized (also called minimizing the entropy in the network)."

  - type: PART-OF
    source: productions
    target: expert_systems
    note: >
      Productions are the if-then heuristic rules that constitute the knowledge base of an
      expert system, codifying domain experts' experience as search procedures.
    quote: >
      "The if-then heuristic rules, called 'productions', are acquired from 'experts'."

  - type: PART-OF
    source: conditional_probabilities
    target: bayesian_networks
    note: >
      Conditional probabilities are the constraints in a causal net: the probability of a
      variable taking a value given another variable's value, representing cause-effect beliefs.
    quote: >
      "The constraints in a causal net refer to conditional probabilities between variables."

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: bayesian_networks
    target: judea_pearl
    note: >
      Judea Pearl developed causal nets (Bayesian networks) as a formal framework for
      representing and testing cause-effect relations in constraint networks.
    quote: >
      "One approach, developed by the AI scholar Judea Pearl, called causal nets (or also
      Bayesian networks)."

  - type: ATTRIBUTED-TO
    source: boltzmann_machines
    target: geoff_hinton
    note: >
      Geoff Hinton invented Boltzmann machines, establishing the foundational conceptual
      building block of modern deep learning.
    quote: >
      "Boltzmann machines — invented by the recent Nobel Prize in physics and deep learning
      leader Geoff Hinton — is perhaps the foundational conceptual building block of deep
      learning models."

  - type: ATTRIBUTED-TO
    source: expert_systems
    target: feigenbaum
    note: >
      Edward Feigenbaum identified the knowledge acquisition bottleneck in 1964, a
      foundational limitation of expert systems.
    quote: >
      "what is referred to as the knowledge acquisition bottleneck (Feigenbaum 1964)."

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: constraint_network
    target: search_tree
    note: >
      A constraint network is far more general than a search tree: its links carry rich
      constraint information enabling propagation, whereas a search tree's links only indicate
      sequential state transitions.
    quote: >
      "The idea of a constraint network is far more general… nodes of a constraint network
      are any set of variables. The links are any set of constraints that define relations
      among these variables."

  - type: CONTRASTS-WITH
    source: hard_constraints
    target: soft_constraints
    note: >
      Hard constraints are binary: a violation rules out a solution entirely. Soft constraints
      impose a probabilistic cost on violations, so solutions exist on a continuum.
    quote: >
      "Hard constraints mean that a constraint is either satisfied by a value or it is violated…
      Soft constraints instead define constraints in terms of preferences or subjective beliefs."

  - type: CONTRASTS-WITH
    source: physics_hypothesis
    target: society_of_mind_hypothesis
    note: >
      The physics hypothesis (Boltzmann machines / deep learning) reduces intelligence to a
      few statistical laws. The society of mind hypothesis requires diverse representations
      corresponding to the document's KRR perspective.
    quote: >
      "we will make sense of these examples in terms of two 'hypotheses' about how
      representations lead to intelligence…the 'physics hypothesis' and the 'society of mind
      hypothesis'."

  - type: CONTRASTS-WITH
    source: explicit_knowledge
    target: tacit_knowledge
    note: >
      In expert systems, explicit knowledge is articulable and codifiable as rules; tacit
      knowledge is experiential know-how that experts cannot easily express.
    quote: >
      "Rules that can be articulated, and thus codified, are called explicit knowledge; rules
      that are too hard to extract are called tacit knowledge."

  # --- CAUSES ---
  - type: CAUSES
    source: principle_of_locality
    target: constraint_propagation
    note: >
      Because most constraints can be reduced to binary (local) constraints, propagation is
      tractable: each piece of information about one constraint yields useful feedback for
      neighbouring variables.
    quote: >
      "unlike the idea of the curse of dimensionality, you usually need to process information
      only about local interdependencies (i.e., between two variables), and hence can avoid
      combinatorial complexity."

  - type: CAUSES
    source: tacit_knowledge
    target: knowledge_acquisition_bottleneck
    note: >
      The knowledge acquisition bottleneck arises because much expert knowledge is tacit —
      experts cannot articulate it for codification into production rules.
    quote: >
      "The bottleneck concerns the difficulty in getting experts to articulate all the heuristic
      rules that they know."

  - type: CAUSES
    source: brittleness
    target: knowledge_acquisition_bottleneck
    note: >
      Brittleness compounds the knowledge acquisition bottleneck: even codified rules
      generalize poorly beyond their specific problem environment, requiring yet more rules.
    quote: >
      "rules in expert systems are ultimately correlations developed from specific
      problem-solving environments, and often do not generalize well. This is called the
      brittleness issue."

  # --- COMPLICATES ---
  - type: COMPLICATES
    source: infinite_regress
    target: expert_systems
    note: >
      Infinite regress makes expert systems fundamentally hard to complete: even within a
      narrow domain, an unlimited number of rules would theoretically be needed to cover
      all contingencies.
    quote: >
      "Hubert Dreyfus…called this the issue of infinite regress, meaning that one would
      theoretically need an infinite number of rules to capture all the contingencies."

  # --- ADDRESSES ---
  - type: ADDRESSES
    source: constraint_network
    target: spatial_interdependence
    note: >
      Constraint networks address spatial interdependence by encoding interdependencies
      as explicit constraints and exploiting propagation rather than combinatorial search.
    quote: >
      "if an agent can identify constraints, it can exploit these sources of stability to
      simplify its representation of its environment."

  - type: ADDRESSES
    source: csp
    target: sparse_learning
    note: >
      CSPs address sparse learning challenges: understanding the representation of a problem
      (satisfying constraints) can matter more than finding the globally optimal solution.
    quote: >
      "this ability to just satisfy a set of constraints is fundamental to addressing challenges
      of sparse learning, where understanding the representation of a problem may be more
      important than finding an optimal solution."

  # --- REQUIRES ---
  - type: REQUIRES
    source: constraint_propagation
    target: constraint_network
    note: >
      Propagation presupposes a constraint network: without explicitly-defined constraints
      as links between variables, there is nothing to propagate across.
    quote: >
      "Propagation refers to the sending of information across the links of a network."

  - type: REQUIRES
    source: expert_systems
    target: commonsense_knowledge
    note: >
      Brittleness in expert systems is attributed to lacking commonsense knowledge —
      the vast set of domain-independent background rules needed for any narrow domain
      to generalise.
    quote: >
      "brittleness is thought to be the result of expert systems needing commonsense
      knowledge, conceived of as a vast set of heuristic rules of humans' basic
      domain-independent understanding of the world."

  # --- INSTANCE-OF ---
  - type: INSTANCE-OF
    source: bayesian_networks
    target: mental_models
    note: >
      Causal nets (Bayesian networks) are a paradigmatic example of a mental model:
      a simplified, causal representation of a given problem that enables rational behaviour
      under uncertainty.
    quote: >
      "Pearl intended causal nets to define the essence of reasoning about a given problem
      where the causes are uncertain… This is an example of what is referred to in AI…
      as 'mental models'."

  - type: INSTANCE-OF
    source: autoencoders
    target: boltzmann_machines
    note: >
      Autoencoders are a variant of Boltzmann machines that automatically encode (compress)
      correlations among sets of input and output variables.
    quote: >
      "alternative versions of the Boltzmann machine in deep learning that perform similar
      functions are called 'autoencoders'."


  # =========================================================
  # Search
  # Source: Course Notes — Search - FAB - Spring 2026.pdf
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: search
    target: credit_assignment
    note: >
      Search is framed as a general strategy for efficient credit assignment: dividing
      the labor of a problem into plans and using heuristics to economize on information
      processing.
    quote: >
      "search…a fundamental approach to assigning credit for any complex real-world problem."

  - type: IS-A
    source: von_neumann_search
    target: search
    note: >
      Von Neumann search is one of two paradigmatically-different approaches to search,
      treating it as playing a well-defined game using utility functions and reinforcement
      learning.
    quote: >
      "What we will call von Neumann search builds on the former, conceiving of search
      as akin to playing a well-defined game."

  - type: IS-A
    source: simon_search
    target: search
    note: >
      Simon search is the second paradigm, treating search as understanding and structuring
      an ill-defined problem through means-ends analysis and physical symbol manipulation.
    quote: >
      "What we will call Simon search builds on the latter, conceiving of search as
      understanding and structuring an ill-defined problem."

  - type: IS-A
    source: means_ends_analysis
    target: heuristics
    note: >
      Means-ends analysis is a fundamental heuristic method in Simon search: comparing
      current and goal states to identify differences and invoking operators to reduce them.
    quote: >
      "if two states are not equal…then this difference can be thought of as a measure of
      intermediate feedback. The particular difference is then linked to a heuristic."

  - type: IS-A
    source: satisficing
    target: heuristics
    note: >
      Satisficing is itself a heuristic: "generate plans until a satisfactory solution is
      identified, then stop generating plans."
    quote: >
      "Satisficing is itself a heuristic, corresponding to a rule of 'generate plans until
      a satisfactory solution is identified, then stop generating plans'."

  - type: IS-A
    source: general_problem_solver
    target: simon_search
    note: >
      The General Problem Solver (GPS) is Newell and Simon's AI implementation of Simon
      search, using means-ends analysis to model expert search behaviour.
    quote: >
      "Newell & Simon called their system the 'General Problem Solver', or GPS, as a model
      of intelligent search."

  - type: IS-A
    source: adversarial_search
    target: von_neumann_search
    note: >
      Adversarial search is the application of von Neumann search to two-player games where
      agents have conflicting goals; Max/Min game trees are its canonical form.
    quote: >
      "You can think of a game as simply a problem where there are two or more agents
      whose actions are interdependent, yet who have conflicting goals."

  - type: IS-A
    source: division_of_labor
    target: credit_assignment
    note: >
      The division of labor is described as a general solution to credit assignment: simpler
      tasks have fewer interdependencies, making it easier to learn to perform them well.
    quote: >
      "the division of labor is a general solution to the problem of learning to assign credit."

  - type: IS-A
    source: planning
    target: search
    note: >
      Planning — looking ahead by evaluating possible sequences of actions — is the
      mechanism through which search is carried out: agents divide problems into plans
      and learn to select among them.
    quote: >
      "A mouse with some processing capacity can do 'planning' — looking ahead by
      evaluating possible sequences of actions."

  - type: IS-A
    source: procedural_complexity
    target: credit_assignment
    note: >
      Procedural complexity is the Turing/Babbage measure of the credit-assignment
      challenge: the minimum number of states a program must transition through to
      solve a problem.
    quote: >
      "the complexity of a problem refers to the amount of states that a program needs
      to transition through."

  # --- PART-OF ---
  - type: PART-OF
    source: heuristics
    target: search
    note: >
      Heuristics are the defining mechanism of search, enabling agents to prune the search
      tree and economize on information processing.
    quote: >
      "search…dividing the labor of solving a complex problem into plans, using heuristics
      to economize on information processing."

  - type: PART-OF
    source: pruning
    target: search
    note: >
      Pruning — eliminating large branches of the search tree — is the practical effect of
      applying heuristics and the key advantage of search over brute force.
    quote: >
      "This effect of search is called 'pruning' the search tree, in that using heuristics…
      often has the effect of eliminating large sequences of actions or paths."

  - type: PART-OF
    source: evaluation_function
    target: von_neumann_search
    note: >
      The evaluation function is the heuristic at the core of von Neumann search: it
      estimates the utility of a state from intermediate feedback measures, collapsing
      them into a single numerical score.
    quote: >
      "what is called an evaluation function, which you can think of as some collection
      of various amounts of intermediate feedback."

  - type: PART-OF
    source: means_ends_analysis
    target: general_problem_solver
    note: >
      Means-ends analysis is the core search method implemented in GPS: differences
      between current and goal states trigger heuristic operators that reduce those differences.
    quote: >
      "Newell & Simon called their system the 'General Problem Solver', or GPS…
      information is generated in the form of differences between the current state and
      the goal state."

  - type: PART-OF
    source: subgoals
    target: means_ends_analysis
    note: >
      Subgoals are generated in means-ends analysis when a difference between current and
      goal state is identified; the agent then works to reduce each subgoal difference.
    quote: >
      "there were fundamental heuristics at play…'Pattern-matching': given a goal of
      transforming object A into B…If there is a difference…then a subgoal is generated
      of reducing this difference."

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: von_neumann_search
    target: john_von_neumann
    note: >
      Von Neumann search is named after John von Neumann, whose 1930s–1940s work on
      game theory provided the mathematical foundations for search as game-playing.
    quote: >
      "A first approach to search derives from…the seminal work of the mathematician
      John von Neumann in the 1930s and 1940s on game theory."

  - type: ATTRIBUTED-TO
    source: simon_search
    target: herbert_simon
    note: >
      Simon search is named after Herbert Simon, who developed it by contrast with von
      Neumann search, focusing on means-ends analysis and satisficing in open-ended problems.
    quote: >
      "A second approach pioneered by Simon, along with his colleague at Carnegie-Mellon
      Allen Newell."

  - type: ATTRIBUTED-TO
    source: general_problem_solver
    target: allen_newell
    note: >
      Allen Newell co-developed the General Problem Solver with Simon at Carnegie-Mellon.
    quote: >
      "Newell and Simon's solution was that…The particular difference is then linked to
      a heuristic… Newell & Simon called their system the 'General Problem Solver'."

  - type: ATTRIBUTED-TO
    source: general_problem_solver
    target: herbert_simon
    note: >
      Herbert Simon co-developed GPS with Allen Newell as a model of intelligent search
      through means-ends analysis.
    quote: >
      "Newell & Simon called their system the 'General Problem Solver', or GPS, as a model
      of intelligent search."

  - type: ATTRIBUTED-TO
    source: turing_machine
    target: alan_turing
    note: >
      Alan Turing introduced the standard measure of program complexity in 1936 through
      the Turing machine model.
    quote: >
      "The standard way of measuring the effective procedure was introduced in 1936 by
      the mathematician and co-founder of the field Alan Turing."

  - type: ATTRIBUTED-TO
    source: division_of_labor
    target: adam_smith
    note: >
      Adam Smith explained the logic of the division of labor in his 1776 Wealth of Nations
      using the pin factory example.
    quote: >
      "The Scottish economist Adam Smith explained the logic in his 1776 book The Wealth
      of Nations, giving the example of a stylized pin factory."

  - type: ATTRIBUTED-TO
    source: algorithm
    target: charles_babbage
    note: >
      Babbage coined the concept of the algorithm as a "precise and unambiguous
      specification for controlling a sequence of steps that can be carried out mechanically".
    quote: >
      "Babbage called this sequence of instructions as the algorithm."

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: von_neumann_search
    target: simon_search
    note: >
      Von Neumann search treats search as a well-defined game with utility functions;
      Simon search treats it as means-ends analysis in open-ended, ill-defined problems —
      the two paradigmatically-different approaches.
    quote: >
      "We will see that such assumptions can build on either paradigm…What we will call
      von Neumann search builds on the former…What we will call Simon search builds
      on the latter."

  - type: CONTRASTS-WITH
    source: search
    target: brute_force
    note: >
      Search is defined by contrast to brute force: rather than enumerate every possible
      state, search uses heuristics to evaluate only parts of the search tree.
    quote: >
      "we use this term by contrast to brute force: rather than describe and test out every
      state, search involves economizing by using heuristics."

  # --- CAUSES ---
  - type: CAUSES
    source: combinatorial_complexity
    target: search
    note: >
      Combinatorial complexity is the motivating problem for search: when a problem space
      is combinatorially explosive, brute force is infeasible and heuristic search is required.
    quote: >
      "agents cannot evaluate every possible action or path. Hence, we use this term by
      contrast to brute force."

  - type: CAUSES
    source: gains_to_specialization
    target: division_of_labor
    note: >
      Gains to specialisation are why division of labor works: simpler tasks with fewer
      interdependencies are easier to learn, enabling better performance.
    quote: >
      "In the second strategy, the labor of each the three tasks is divided across three
      'specialists'… Smith explained how the latter is more economical thanks to gains
      to specialization."

  # --- ADDRESSES ---
  - type: ADDRESSES
    source: search
    target: combinatorial_complexity
    note: >
      Search directly addresses combinatorial complexity through heuristic pruning:
      rules-of-thumb eliminate large branches of the search tree, making intractable
      problems tractable.
    quote: >
      "search for us will be…about coordinating interdependent tasks…a fundamental
      approach to assigning credit for any complex real-world problem."

  - type: ADDRESSES
    source: satisficing
    target: optimization_goal
    note: >
      Satisficing addresses the unreachability of optimal goals under limited information
      processing: agents search only until a satisfactory threshold (aspiration level) is met.
    quote: >
      "Simon famously proposed that intelligent agents 'satisfice', meaning that they search
      only for satisfactory plans for solving problems, rather than for optimal plans."

  - type: ADDRESSES
    source: means_ends_analysis
    target: ill_defined_problems
    note: >
      Means-ends analysis addresses ill-defined problems by progressively reducing the
      difference between current and goal states, constructing the problem representation
      during search.
    quote: >
      "Simon's focus was instead to start with realistic models of how managers make
      decisions under uncertainty…the ability to manipulate physical symbols to transform
      some simplified model into a model of some meaningful goal state."

  # --- REQUIRES ---
  - type: REQUIRES
    source: search
    target: heuristics
    note: >
      Search requires heuristics: without rules-of-thumb to guide state selection, agents
      are reduced to brute-force enumeration.
    quote: >
      "Agents search by generating, evaluating, and selecting among plans…using heuristics
      to guide which plans (or parts of plans) to generate-and-test and which to ignore."

  - type: REQUIRES
    source: von_neumann_search
    target: utility_function
    note: >
      Von Neumann search requires a utility function to evaluate game states and guide
      path selection through the game tree.
    quote: >
      "the search tree is really a purely syntactic game tree, in which nodes are mapped
      to numerical values of the expected rewards…called a utility function."

  - type: REQUIRES
    source: simon_search
    target: physical_symbol_system_hypothesis
    note: >
      Simon search presupposes the physical symbol system hypothesis: heuristics are
      operators on meaningful lists of physical symbols, not arbitrary bit strings.
    quote: >
      "satisficing also follows from Simon's physical symbol system hypothesis…Given
      information about states of a search tree are physical symbols, they only designate
      objects or concepts in the external world."

  # --- INSTANCE-OF ---
  - type: INSTANCE-OF
    source: general_problem_solver
    target: means_ends_analysis
    note: >
      GPS is the primary instantiation of means-ends analysis: it implements pattern-matching
      and generate-and-test as a model of how expert problem-solvers search.
    quote: >
      "Newell & Simon's idea in GPS was to boil down the vast universe of possible
      heuristics to their essentials — to heuristics for generating heuristics."

  - type: INSTANCE-OF
    source: breadth_first_search
    target: heuristics
    note: >
      Breadth-first search is a generic heuristic strategy in a search tree: search many
      possible paths but only a few actions deep for each.
    quote: >
      "'breadth-first' (search many possible paths, only generating-and-testing a few
      actions for each path)."

  - type: INSTANCE-OF
    source: depth_first_search
    target: heuristics
    note: >
      Depth-first search is a generic heuristic strategy in a search tree: search only one
      or a few paths but many actions deep for each.
    quote: >
      "'depth-first' (search only one or a few paths, but generate-and-test many actions
      for each path)."

  # =========================================================
  # Course Notes 7 — Interaction
  # Source: Course Notes 7 — Interaction - FAB.pdf
  # =========================================================

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: cartesianism
    target: rene_descartes
    note: >
      Cartesianism as a paradigm of intelligence is traced back to René Descartes, whose
      phrase "I think, therefore I am" implies that the very existence of intelligence is
      constituted by internal symbol manipulations.
    quote: >
      "Such a view of intelligence goes back at least to the 17th century and the French
      philosopher René Descartes. His phrase, 'I think, therefore I am' implies that the very
      existence of intelligence is constituted by internal symbol manipulations."

  - type: ATTRIBUTED-TO
    source: creature_hypothesis
    target: rodney_brooks
    note: >
      The creature hypothesis was proposed by roboticist Rodney Brooks to explain Moravec's
      paradox from an interactionist standpoint, arguing that sensorimotor abilities are
      evolutionarily older and genuinely harder than symbolic reasoning.
    quote: >
      "Roboticist Rodney Brooks proposed a 'creature hypothesis' of intelligent learning that
      explains the paradox from an interactionist point of view."

  - type: ATTRIBUTED-TO
    source: critical_technical_practice
    target: phil_agre
    note: >
      Phil Agre introduced critical technical practice (CTP) at MIT in the 1980s as a method
      for surfacing and evaluating the narrow Cartesian assumptions embedded in AI language.
    quote: >
      "In pioneering work in the 1980s at MIT, the AI scholar Phil Agre introduced a method
      for surfacing what he saw as the narrow yet vague language of AI ideas…he called
      'critical technical practice' (CTP)."

  - type: ATTRIBUTED-TO
    source: homeostasis
    target: w_ross_ashby
    note: >
      The cybernetician W. Ross Ashby coined the term "homeostasis" to describe the goal
      of maintaining a stable state through feedback from environmental interaction rather
      than optimising a fixed objective.
    quote: >
      "This idea of maintaining a goal was termed by the cybernetician W. Ross Ashby as
      homeostasis ('same state')."

  - type: ATTRIBUTED-TO
    source: variety
    target: norbert_wiener
    note: >
      Norbert Wiener proposed variety as a concept of complexity better suited to natural
      biological and social systems than to internal symbol manipulations, influencing
      interactionist AI researchers to seek non-Cartesian measures of complexity.
    quote: >
      "the MIT mathematician and polymath Norbert Wiener proposed a concept of complexity
      in terms of variety, where variety referred to a level of complexity more reflective of
      natural systems (biological organisms or human societies and organizations) than internal
      symbol manipulations."

  - type: ATTRIBUTED-TO
    source: subsumption_architecture
    target: rodney_brooks
    note: >
      Rodney Brooks designed the subsumption architecture as a layered set of goals
      implemented through finite state machines, enabling robust homeostatic behavior
      without any symbolic representations.
    quote: >
      "Brooks proposed that an AI system or organization could be formally designed as a set
      of multiple goals…what Brooks called the 'subsumption architecture'."

  - type: ATTRIBUTED-TO
    source: moravecs_paradox
    target: hans_moravec
    note: >
      Moravec's paradox is named after Carnegie-Mellon roboticist Hans Moravec: seemingly
      complex AI tasks are often simpler than expected, while apparently simple sensorimotor
      tasks prove far harder.
    quote: >
      "This is called Moravec's paradox, after Carnegie-Mellon roboticist Hans Moravec:
      seemingly complex problems in AI are often simpler than expected; seemingly simple
      problems in AI are often (much more) complex than expected!"

  - type: ATTRIBUTED-TO
    source: indexing
    target: phil_agre
    note: >
      Phil Agre developed the concept of indexing at MIT, proposing that objects in the
      real world are stored in memory with respect to specific situations rather than as
      abstract names that designate other symbols.
    quote: >
      "In this view, developed also by Phil Agre at MIT, objects in the real-world are 'indexed'
      in an agent's memory, which means that they are stored with respect to a specific situation."

  - type: ATTRIBUTED-TO
    source: registration
    target: brian_cantwell_smith
    note: >
      Brian Cantwell-Smith proposed registration as a theory of how AI systems must account
      for the coherence between symbolic schemes, lived experience, and physical reality
      through ongoing "reckoning and judgment".
    quote: >
      "In a complementary theory proposed also at MIT by AI researcher Brian Cantwell-Smith,
      AI systems need to engage in the 'registration' of symbols."

  - type: ATTRIBUTED-TO
    source: cybernetics
    target: norbert_wiener
    note: >
      Cybernetics arose in the 1940s under the leadership of Norbert Wiener; its focus on
      feedback-based control from environmental interaction made it the immediate predecessor
      of interactionist AI.
    quote: >
      "The earliest ideas about interaction in AI originated in the field's immediate predecessor
      called cybernetics, which arose in the 1940s led by Wiener."

  - type: ATTRIBUTED-TO
    source: ex_roomba
    target: rodney_brooks
    note: >
      The Roomba was designed by Rodney Brooks and colleagues at MIT, applying the
      subsumption architecture to produce the best-selling robot of all time with over
      40 million units sold.
    quote: >
      "the MIT roboticist Rodney Brooks built a series of robots inspired by Walter's ideas,
      which led to developing a commercial robot vacuum cleaner called the Roomba."

  - type: ATTRIBUTED-TO
    source: ex_walter_tortoise
    target: w_grey_walter
    note: >
      W. Grey Walter designed the tortoise robot in the early 1950s using simple analog
      circuits to navigate a real-world room, making it a foundational example of homeostatic
      cybernetic interaction.
    quote: >
      "In the early 1950s, another cybernetician W. Grey Walter designed a 'tortoise' robot
      that used a small set of simple analog circuits to navigate around a room."

  - type: ATTRIBUTED-TO
    source: ex_sketchpad
    target: ivan_sutherland
    note: >
      Ivan Sutherland's Sketchpad system at MIT is the canonical early instance of direct
      manipulation, enabling engineers to draft and tinker with circuit diagrams as graphical
      objects on a physical screen, forerunner to CAD and the GUI.
    quote: >
      "Ivan Sutherland's Sketchpad system (the forerunner to CAD software and the GUI
      (graphical user interface) of personal computers), envisioned software that would enable
      drafting a diagram of a circuit or other complex machine in digital form."

  # --- IS-A ---
  - type: IS-A
    source: comportment
    target: homeostasis
    note: >
      Comportment is an alternative term for homeostasis in the phenomenological tradition,
      emphasising authentic, moment-to-moment alignment between an agent's goals and
      the unfolding physical world rather than convergence to a fixed target state.
    quote: >
      "Another term for this homeostasis is 'comportment', which means maintaining an authentic
      alignment between our goals and the physical world based on our moment-to-moment coping."

  # --- PART-OF ---
  - type: PART-OF
    source: situatedness
    target: interaction
    note: >
      Situatedness is one of three defining characteristics of intelligent interaction: action
      must sense and respond to ongoing changes in particular real-world situations rather
      than to abstract symbolic representations.
    quote: >
      "Intelligent action is situated in that it depends on sensing and responding to ongoing
      changes in particular situations in the world."

  - type: PART-OF
    source: embodiment
    target: interaction
    note: >
      Embodiment is a defining characteristic of intelligent interaction: intelligence depends
      on a body learning physical actions, not just a mind manipulating symbols, and is
      constrained by the physical limits of bodily movement.
    quote: >
      "Intelligent action is embodied, meaning that it depends on the ability of a body to learn
      physical actions, not just the mind's ability to learn symbols."

  - type: PART-OF
    source: embeddedness
    target: interaction
    note: >
      Embeddedness is a defining characteristic of intelligent interaction: intelligent action
      is shaped by the local cultural context in which it takes place, which changes the goals
      of intelligent action.
    quote: >
      "Intelligent action is culturally embedded, meaning that it depends on the local culture
      in which it takes place, which changes the goals of intelligent action."

  - type: PART-OF
    source: sensorimotor
    target: interaction
    note: >
      Sensorimotor action — perceptual senses and physical movements — is a fundamental
      component of interaction-based intelligence, foregrounded by interactionist researchers
      against purely internal cognition.
    quote: >
      "The term interaction is used to emphasize roles beyond internal cognition in intelligence
      of sensorimotor action (perceptual senses and physical movements) and experiencing
      phenomena in the world."

  - type: PART-OF
    source: finite_state_machines
    target: subsumption_architecture
    note: >
      In Brooks' subsumption architecture, each goal or behavior layer is implemented through
      highly simple circuits called finite state machines (FSMs), with no communication
      channels between layers.
    quote: >
      "these goals or behaviors in his proposal are only implemented through highly simple
      circuits, called finite state machines (FSMs), with no communication channels."

  - type: PART-OF
    source: homeostasis
    target: cybernetics
    note: >
      Homeostasis is the central goal-concept of cybernetics, describing how agents maintain
      stable states through environmental feedback rather than optimising a fixed objective.
    quote: >
      "This canonical example illustrates the first major concept in AI ideas of interactionism,
      which is an emphasis on goals of maintaining a state, rather than of optimizing or
      satisfying a specific goal within a state. This idea of maintaining a goal was termed by
      the cybernetician W. Ross Ashby as homeostasis."

  - type: PART-OF
    source: resources_for_action
    target: interaction
    note: >
      Resources for action is the interactionist view that symbolic representations are not
      necessary for intelligence but become useful secondary tools in particular moments when
      homeostatic comportment fails.
    quote: >
      "Symbolic representations are not necessary for interacting with the world; they are
      resources for action."

  - type: PART-OF
    source: designation
    target: symbol_manipulation
    note: >
      Designation — the idea that symbols give names to objects in the actual world — is
      a core concept within Simon's symbol manipulation framework and the physical symbol
      system hypothesis.
    quote: >
      "consider how this 'resources for action' view compares to our earlier notion of Simon
      information and its emphasis on designation — that intelligence requires symbols that
      'designate' objects in the actual world by giving them names."

  - type: PART-OF
    source: wishful_mnemonics
    target: cartesianism
    note: >
      Wishful mnemonics are a product of Cartesian AI language: memorable terms for symbol
      manipulation processes that tempt us to "wish" that such processes actually capture
      real-world phenomena such as planning or searching.
    quote: >
      "They serve as what have been called 'wishful mnemonics' — memorable (mnemonic) terms
      for symbol manipulation processes that allow us to 'wish' that such processes actually
      capture real-world phenomena."

  # --- INSTANCE-OF ---
  - type: INSTANCE-OF
    source: ex_thermostat
    target: homeostasis
    note: >
      The analog thermostat is the canonical cybernetic example of homeostasis: set to
      maintain room temperature within a range, it uses environmental feedback rather than
      converging to a fixed goal state.
    quote: >
      "Perhaps the most canonical example of interaction in cybernetics is an analog thermostat
      in a room. The thermostat is set to maintain the temperature of the room within a certain
      range; if it gets too cold, the thermostat is triggered and the heater starts."

  - type: INSTANCE-OF
    source: ex_walter_tortoise
    target: homeostasis
    note: >
      Walter's tortoise exemplifies homeostasis: rather than learning a specific path through
      a labyrinth, it learned to wander any room and find its way back, maintaining a stable
      state via simple analog circuits.
    quote: >
      "Walter's tortoise was homeostatic in that it learned how to wander around the far less
      structured environment of a house and find its way back from anywhere in the house."

  - type: INSTANCE-OF
    source: ex_roomba
    target: subsumption_architecture
    note: >
      The Roomba is the commercial realisation of Brooks' subsumption architecture: no CPU,
      no complex algorithms, just simple layered circuits enabling it to navigate any real-world
      home environment homestatically.
    quote: >
      "Brooks' approach with the Roomba succeeded based on its simplicity — the Roomba had
      no CPU, no complex algorithms, and no vast stores of data. Rather, it used only a small
      set of simple circuits to learn to react to any type of room by wandering around."

  - type: INSTANCE-OF
    source: ex_sketchpad
    target: direct_manipulation
    note: >
      Sutherland's Sketchpad is the canonical early instance of direct manipulation, enabling
      engineers to draft and tinker with circuit diagrams as graphical objects on a physical
      screen instead of writing code.
    quote: >
      "Ivan Sutherland's Sketchpad system…envisioned software that would enable drafting a
      diagram of a circuit or other complex machine in digital form, and then 'tinkering' with
      this by interacting with the diagram on a physical screen."

  - type: INSTANCE-OF
    source: digital_ecosystem
    target: subsumption_architecture
    note: >
      The digital ecosystem is a recent organisational analogue of the subsumption architecture:
      its layered software stack (from semiconductors to user interfaces) must be orchestrated
      in priority order just as Brooks' behavior layers subsume one another.
    quote: >
      "a canonical recent example of this view of intelligence is the idea of a digital ecosystem…
      A digital ecosystem can be thought of as consisting of the various lower- and higher-level
      goals of a 'software stack'…Intelligence is achieved by 'orchestrating' all of the goals
      of the stack so that they work together."

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: interaction
    target: cartesianism
    note: >
      Interaction and Cartesianism are the document's central opposing paradigms: interactionism
      grounds intelligence in moment-to-moment sensorimotor engagement with the world, whereas
      Cartesianism locates intelligence in internal symbol manipulations.
    quote: >
      "All symbol manipulation approaches to studying AI systems and organizations are repeating
      the same mistakes as narrow Cartesianism (also called cognitivism) approaches of not
      dealing adequately with the external world."

  - type: CONTRASTS-WITH
    source: indexing
    target: designation
    note: >
      Indexing contrasts with designation by grounding reference in a specific physical situation:
      an indexed object is stored as "that-apple-right-there", not merely as a pointer to another
      symbol in an abstract list.
    quote: >
      "Indexing, in contrast, refers to using 'apple' to refer to a particular physical object
      (a particular apple) in the world…not just a list structure — one name points to another name."

  - type: CONTRASTS-WITH
    source: registration
    target: designation
    note: >
      Registration goes beyond designation by requiring agents to evaluate whether symbolic
      schemes accurately reflect experience and whether experience accurately reflects physical
      reality — engaging reckoning and judgment rather than mere naming.
    quote: >
      "designation is not enough — it only accounts for the real-world meaning of symbols
      (i.e. lists) for a given problem, and not to the holistic experience of a specific situation
      as it unfolds."

  - type: CONTRASTS-WITH
    source: subsumption_architecture
    target: reinforcement_learning
    note: >
      The subsumption architecture contrasts with reinforcement learning as competing paradigms
      for robot learning: it uses simple analog circuits and layered homeostatic behaviors, without
      the vast datasets and deep learning models that RL requires.
    quote: >
      "Brooks' approach differed from the prior paradigm in robotics that was based on search and
      representation (and from today's dominant paradigm, which is based on deep learning and
      reinforcement learning using vast volumes of data)."

  - type: CONTRASTS-WITH
    source: variety
    target: shannon_information
    note: >
      Wiener's variety contrasts with Shannon information as competing complexity measures:
      variety reflects the complexity of natural biological and social systems, whereas Shannon
      information is rooted in Cartesian, internalist symbol manipulation.
    quote: >
      "Norbert Wiener proposed a concept of complexity in terms of variety, where variety
      referred to a level of complexity more reflective of natural systems (biological organisms
      or human societies and organizations) than internal symbol manipulations."

  # --- ADDRESSES ---
  - type: ADDRESSES
    source: creature_hypothesis
    target: moravecs_paradox
    note: >
      The creature hypothesis addresses Moravec's paradox by explaining that simple sensorimotor
      interactions are evolutionarily ancient and genuinely hard, while symbolic reasoning
      developed late and rapidly, making the paradox unsurprising from an evolutionary view.
    quote: >
      "Roboticist Rodney Brooks proposed a 'creature hypothesis' of intelligent learning that
      explains the paradox from an interactionist point of view."

  - type: ADDRESSES
    source: critical_technical_practice
    target: wishful_mnemonics
    note: >
      Critical technical practice directly addresses wishful mnemonics by surfacing the Cartesian
      assumptions hidden in AI language, evaluating them against real-world phenomena, and
      guiding construction of alternative AI ideas and systems.
    quote: >
      "The CTP method involves (1) surfacing assumptions in the language of AI ideas, (2)
      evaluating assumptions with respect to observations and experience of concrete phenomena
      in the world, and (3) using the evaluations to guide the construction of alternative AI
      ideas and systems."

  - type: ADDRESSES
    source: subsumption_architecture
    target: cartesianism
    note: >
      The subsumption architecture is Brooks' primary technical response to Cartesian AI:
      it demonstrates robust intelligent behavior through layered sensorimotor goals and simple
      circuits, without any symbolic representations.
    quote: >
      "Next, we will consider two main technical proposals: Brooks' subsumption architecture
      (which does not require any symbol manipulation), and the notion of direct manipulation
      of symbols as resources for action."

  - type: ADDRESSES
    source: direct_manipulation
    target: cartesianism
    note: >
      Direct manipulation is the second main technical alternative to Cartesian AI in the
      document: it foregrounds the sensorimotor, physical nature of how humans interact with
      digital representations on screens rather than writing symbolic code.
    quote: >
      "Another main area of research on interaction in AI and organizations concerns directly
      interacting with physical media, and specifically digital representations in personal
      computers and other personal or collaborative digital devices."

  # --- CAUSES ---
  - type: CAUSES
    source: cartesianism
    target: extrapolation_fallacy
    note: >
      Cartesianism produces the extrapolation fallacy as a recurring consequence: by setting
      benchmarks in terms of symbolic tasks, it encourages the false belief that gains in one
      symbolic domain imply proximity to general intelligence.
    quote: >
      "For Brooks, one consequence of a Cartesian view of learning is a recurring theme in the
      AI field of extrapolation — of believing that a large gain in performance on one type of
      task…means that the field is close to solving most other types of task."

  - type: CAUSES
    source: breakdowns
    target: resources_for_action
    note: >
      Breakdowns — moments when homeostatic comportment fails — cause symbolic representations
      to become salient as resources for action, making them secondary but useful tools triggered
      by situational failure.
    quote: >
      "Representations become significant in particular moments when our homeostatic comportment
      fails, referred to as 'breakdowns'."

  # --- COMPLICATES ---
  - type: COMPLICATES
    source: wishful_mnemonics
    target: interaction
    note: >
      Wishful mnemonics complicate the interactionist research programme by making Cartesian
      assumptions invisible: if researchers accept that "searching" or "planning" genuinely
      describes real-world activity, they will not see the need for interactionist alternatives.
    quote: >
      "The danger is that such metaphors become a self-fulfilling prophecy: we may start thinking
      about search, planning (or learning or knowledge) as what happens symbolically inside of
      a computer."

  - type: COMPLICATES
    source: extrapolation_fallacy
    target: interaction
    note: >
      The extrapolation fallacy complicates interactionist AI by shifting attention and resources
      to whichever symbolic paradigm currently dominates, leaving the genuinely complex
      sensorimotor and embodied aspects of intelligence perpetually unaddressed.
    quote: >
      "such extrapolation leads to large shifts in attention and resources to whatever the current
      paradigm is (e.g., LLMs today), while all the actually complex parts of intelligence…run
      the risk of never getting addressed."

  # =========================================================
  # Course Notes 8 — Reasoning about the Physical World
  # Source: Course Notes 8 — Reasoning about the Physical World - FAB.pdf
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: debugging
    target: credit_assignment
    note: >
      The document reframes intelligence in this session as the ability to "debug"
      representations — credit assignment becomes the process of detecting and resolving
      discrepancies between representations and the physical world.
    quote: >
      "we will call intelligence in this session (i.e., learning to assign credit when solving
      complex problems) as the ability to learn to 'debug' representations of problems in the
      physical world."

  - type: IS-A
    source: bugs
    target: breakdowns
    note: >
      Bugs are the engineering-flavoured term for breakdowns: any discrepancy, symptom, or
      constraint violation that signals a mismatch between a representation and the physical
      world.
    quote: >
      "A breakdown can also be thought of as a symptom of a problem…we will follow the engineering
      tradition of AI research in this area at MIT and call all such symptoms, discrepancies, or
      constraint violations as 'bugs'."

  - type: IS-A
    source: troubleshooting
    target: debugging
    note: >
      Troubleshooting is one of two complementary debugging strategies: it assumes the
      representation is correct and seeks faults in the actual physical system.
    quote: >
      "First, we can assume that our AI system or organization has the correct representation of a
      problem regarding some physical system, but that there are bugs in the actual system.
      We will call such debugging 'troubleshooting'."

  - type: IS-A
    source: theory_formation
    target: debugging
    note: >
      Theory formation is the complementary debugging strategy: it assumes the physical system
      is correct and seeks to construct or repair the representation of it.
    quote: >
      "Second, we can assume that the physical system is fine, but that bugs may arise in the
      representation of the system…We will call these latter debugging processes as 'theory
      formation'."

  - type: IS-A
    source: generate_test_and_debug
    target: generate_and_test
    note: >
      Generate-test-and-debug is a more powerful extension of generate-and-test in which the
      debugging step allows modifying the problem representation itself, not just testing
      candidates against a fixed landscape.
    quote: >
      "the process is really generate-test-and-debug, where debugging involves not just
      generating candidate solutions, but possibly modifying the representation of the problem
      (and even the goals themselves)."

  - type: IS-A
    source: reasoning_about_physical_world
    target: interaction
    note: >
      Reasoning about the physical world is a more specific development within the interactionist
      paradigm: whereas Session 7 treated breakdowns as the exception triggering reflection, this
      session treats them as the rule — the primary site of intelligent credit assignment.
    quote: ~

  # --- PART-OF ---
  - type: PART-OF
    source: first_principles_reasoning
    target: debugging
    note: >
      First-principles reasoning is the core strategy within debugging: rather than
      accumulating heuristics, it anchors credit assignment in a small set of stable domain
      laws that remain relevant across the combinatorially explosive space of possible bugs.
    quote: >
      "the strategy for assigning credit by debugging is to reason from first principles — that
      is, to use a small number of stable, fundamental 'laws' about the physical world that are
      simple and known to be relevant to a problem."

  - type: PART-OF
    source: causal_interpretation
    target: debugging
    note: >
      Building and refining a causal interpretation is the central product of the debugging
      process: it is the threshold-level representation of how function emerges from structure
      that an AI system or organisation constructs and then reasons about to identify bugs.
    quote: >
      "We will call such a threshold understanding as a causal interpretation of the physical
      system — considered as a representation of meaningful information about its functioning."

  - type: PART-OF
    source: function_from_structure
    target: causal_interpretation
    note: >
      Deriving function from structure is the core inferential task within constructing a
      causal interpretation: observing how a system's components are assembled and inferring
      from that structure what the system does.
    quote: >
      "You can think of such reasoning processes as fundamentally about deriving function (what
      the system does) from the structure of it (i.e., from observing the components or parts
      of the system)."

  - type: PART-OF
    source: envisioning
    target: qualitative_reasoning
    note: >
      Envisioning is the active process within qualitative reasoning: running a qualitative
      simulation in the mind's eye to predict how a physical system's state changes according
      to domain laws.
    quote: >
      "De Kleer characterizes this process as one of 'envisioning' how the components and parts
      of a physical system function together, which he describes as 'running a qualitative
      simulation in the mind's eye'."

  - type: PART-OF
    source: confluences
    target: qualitative_reasoning
    note: >
      Confluences are the qualitative constraint form used in qualitative reasoning: they
      represent mutual influences between variables according to domain first principles, in
      place of the discrete, precise constraints of a CSP.
    quote: >
      "the constraints are considered as variables that mutually influence one another — or what
      De Kleer calls 'confluences' — that reflect the first principles of the domain."

  - type: PART-OF
    source: justifications
    target: dependency_network
    note: >
      Justifications are the links in a dependency network, representing logical relationships
      (consequences, antecedents, explanations) between knowledge nodes, and labelled "in" or
      "out" to track whether an assumption is currently believed.
    quote: >
      "The links are beliefs called justifications, which represent things like consequences,
      antecedents, or explanations, and labels that indicate whether such justifications are
      'in' or 'out'."

  - type: PART-OF
    source: dependency_network
    target: propagator_model
    note: >
      The dependency network is a key building block of Sussman's propagator model: the
      "cells" in the model are the locally stored memories of tentative beliefs that form
      the dependency network.
    quote: ~

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: envisioning
    target: johan_de_kleer
    note: >
      De Kleer coined the term "envisioning" and developed it as a formal strategy for
      qualitative reasoning about physical systems.
    quote: >
      "De Kleer characterizes this process as one of 'envisioning' how the components and parts
      of a physical system function together."

  - type: ATTRIBUTED-TO
    source: confluences
    target: johan_de_kleer
    note: >
      De Kleer coined the term "confluences" for the qualitative mutual-influence constraints
      that underlie qualitative reasoning about physical systems.
    quote: >
      "the constraints are considered as variables that mutually influence one another — or what
      De Kleer calls 'confluences'."

  - type: ATTRIBUTED-TO
    source: qualitative_reasoning
    target: johan_de_kleer
    note: >
      De Kleer co-developed qualitative reasoning as a formal AI strategy, articulating the
      key insight that even sophisticated engineers initially reason qualitatively before
      applying quantitative analysis.
    quote: >
      "de Kleer observed that even sophisticated engineers (or other systems designers) initially
      engage in the same such qualitative reasoning, even regarding sophisticated systems."

  - type: ATTRIBUTED-TO
    source: qualitative_reasoning
    target: ken_forbus
    note: >
      Forbus co-developed qualitative reasoning alongside de Kleer; the two co-authored
      Building Problem Solvers, which formalised qualitative reasoning as an AI approach.
    quote: >
      "alums from Minsky's AI lab Ken Forbus and Johan de Kleer in their book Building Problem
      Solvers"

  - type: ATTRIBUTED-TO
    source: dependency_network
    target: gerald_sussman
    note: >
      Sussman pioneered the dependency network as a complement to constraint propagation in
      the 1970s, enabling truth maintenance during debugging of physical-world representations.
    quote: >
      "The key idea, pioneered by Minsky's student Gerald Sussman and his colleagues in the
      1970s, is that the constraint network needs to be supplemented by what is called in this
      tradition of AI research a dependency network."

  - type: ATTRIBUTED-TO
    source: truth_maintenance
    target: gerald_sussman
    note: >
      Sussman's dependency network work gave rise to the concept of truth maintenance — the
      process of making, tracking, and retracting tentative assumptions during debugging.
    quote: >
      "The key idea, pioneered by Minsky's student Gerald Sussman and his colleagues in the
      1970s, is that the constraint network needs to be supplemented by…a dependency network."

  - type: ATTRIBUTED-TO
    source: causal_interpretation
    target: marvin_minsky
    note: >
      Minsky first articulated that the goal of intelligence is not an optimal peak but a
      threshold understanding — what the document calls a causal interpretation — of how a
      physical system functions.
    quote: >
      "Minsky first pointed out that, rather than reach some optimal peak in a landscape, what
      is needed is to reach some threshold of understanding."

  - type: ATTRIBUTED-TO
    source: reasoning_about_physical_world
    target: mit_ai_lab
    note: >
      The MIT AI Lab, through students of Minsky influenced also by McCarthy, originated the
      foundational AI ideas for reasoning about the physical world in the 1970s and 1980s.
    quote: >
      "Foundational AI ideas for reasoning about the physical world emerged in the 1970s and
      1980s from students at the MIT AI lab who were proteges of Minsky."

  - type: ATTRIBUTED-TO
    source: first_principles_reasoning
    target: mit_ai_lab
    note: >
      First-principles reasoning as a strategy for debugging emerged from the MIT AI Lab
      tradition, where engineering backgrounds led researchers to anchor reasoning in domain
      laws rather than heuristics.
    quote: >
      "in the MIT tradition of AI research, this mechanism is commonly thought of as a
      domain-specific language, meaning a language that enables representing the fundamental
      entities and relations of the domain such that reasoning can be based on the principles
      of this domain."

  # --- ADDRESSES ---
  - type: ADDRESSES
    source: first_principles_reasoning
    target: combinatorial_complexity
    note: >
      First-principles reasoning addresses the combinatorial explosion of possible bugs by
      anchoring credit assignment in a small set of stable domain laws, rather than requiring
      heuristics for every possible fault.
    quote: >
      "Due to this combinatorial explosion, it is not realistic to reason based on acquiring
      heuristics (one would need practically an infinite number of heuristics)…Instead, the
      strategy for assigning credit by debugging is to reason from first principles."

  - type: ADDRESSES
    source: dependency_directed_reasoning
    target: bugs
    note: >
      Dependency-directed reasoning directly addresses bugs by enabling an AI system to trace
      a bug to its specific assumption in the constraint network, reason about it using rich
      qualitative representations, and propagate the fix.
    quote: >
      "when 'bugs' arise, an AI system or organization can trace the bugs to specific assumptions
      in the constraint network, 'debug' the local representation based on reasoning about these
      assumptions."

  - type: ADDRESSES
    source: reasoning_about_physical_world
    target: breakdowns
    note: >
      Session 8 positions reasoning about the physical world as the paradigm that treats
      breakdowns not as exceptions but as the central site of intelligence — to be actively
      identified and resolved rather than merely triggering fallback to symbols.
    quote: >
      "In this session, we will view breakdowns not as the exception but the rule. Intelligence
      in AI systems and organizations will involve reflectively reasoning about the physical
      systems…to identify and resolve breakdowns."

  - type: ADDRESSES
    source: dependency_network
    target: frame_problem
    note: >
      The dependency network addresses the frame problem by locally tracking which knowledge
      and assumptions have changed, are in force, or have been retracted — providing the
      "elaboration-tolerant" memory McCarthy called for.
    quote: ~

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: world_models
    target: propagator_model
    note: >
      World models and the propagator model are the two paradigmatically different approaches
      to reasoning about the physical world: world models learn regularities from vast
      Shannon-style data; the propagator model supports explicit qualitative reasoning and
      dependency-directed debugging without requiring such data.
    quote: >
      "we will understand AI ideas for reasoning about the physical world in terms of two
      paradigmatically-different approaches. One approach…is based on deep learning…and is
      commonly referred to today as the 'world models' approach…Another approach…the 'propagator
      model'."

  - type: CONTRASTS-WITH
    source: troubleshooting
    target: theory_formation
    note: >
      Troubleshooting and theory formation are complementary debugging strategies that differ
      in what is assumed correct: troubleshooting fixes the system given a correct
      representation; theory formation fixes the representation given a correct system.
    quote: >
      "You can think of debugging as manifesting in two complementary strategies. First, we can
      assume that our AI system or organization has the correct representation…Second, we can
      assume that the physical system is fine, but that bugs may arise in the representation."

  - type: CONTRASTS-WITH
    source: dependency_directed_reasoning
    target: means_ends_analysis
    note: >
      Dependency-directed reasoning is explicitly contrasted with Simon's means-ends analysis:
      MEA is "chronological" (linear state transitions toward a goal), whereas
      dependency-directed reasoning is iterative and allows revising even the goal representation.
    quote: >
      "problem-solving was less dependency-directed than it was chronological — we assumed that
      we could just use operators and heuristics to transition from an initial state to states
      closer and closer to a goal state."

  - type: CONTRASTS-WITH
    source: qualitative_reasoning
    target: csp
    note: >
      Qualitative reasoning contrasts with CSPs in that its constraints (confluences) are
      continuous and mutual-influence-based rather than discrete and precise; variable values
      are qualitative descriptions rather than enumerated integers.
    quote: >
      "in a standard constraint satisfaction problem, the constraints were discrete and precise…
      In contrast, the variables in any complex physical system are often continuous and messy."

  # --- REQUIRES ---
  - type: REQUIRES
    source: debugging
    target: causal_interpretation
    note: >
      Effective debugging requires a causal interpretation to be constructed and continually
      refined: without some representation of how a system's components causally produce
      behaviour, there is no basis for identifying or localising bugs.
    quote: >
      "debugging involves not just generating candidate solutions, but possibly modifying the
      representation of the problem…Such modifications may involve…re-ordering them based on
      interpreting how the components causally fit together to produce the system's functioning."

  - type: REQUIRES
    source: dependency_directed_reasoning
    target: dependency_network
    note: >
      Dependency-directed reasoning is only possible when a dependency network is in place:
      tracing bugs to specific assumptions, explaining provenance, and storing reasoning results
      all depend on the dependency network's locally maintained memory.
    quote: >
      "reasoning about the physical world becomes 'dependency-directed' — informed by rich and
      diverse information and knowledge about interdependencies (constraints) that enables
      explaining assumptions, tracking provenance."

  # --- ENABLES ---
  - type: ENABLES
    source: dependency_network
    target: truth_maintenance
    note: >
      The dependency network is the mechanism that makes truth maintenance possible: its
      nodes and justification links store tentative assumptions and their interdependencies,
      allowing an AI system to make, modify, and retract beliefs during debugging.
    quote: >
      "The key idea of a dependency network is to enable debugging as a process of making and
      modifying (or retracting) tentative assumptions…referred to as debugging based on 'truth
      maintenance'."

  - type: ENABLES
    source: dependency_network
    target: dependency_directed_reasoning
    note: >
      By storing rich qualitative knowledge, justifications, and interdependencies, the
      dependency network enables reasoning to be dependency-directed rather than
      chronological — dramatically enhancing both the magic of propagation and search efficiency.
    quote: >
      "the TMS and dependency network dramatically (1) enhances the 'magic of propagation'
      by enabling qualitative reasoning; and also (2) greatly enhances the efficiency of any
      search processes used."

  - type: ENABLES
    source: domain_specific_language
    target: first_principles_reasoning
    note: >
      A domain-specific language provides the formal vocabulary and structure that enables
      an AI system to represent domain entities and relations and apply first-principles
      reasoning to them.
    quote: >
      "in the MIT tradition of AI research, this mechanism is commonly thought of as a
      domain-specific language, meaning a language that enables representing the fundamental
      entities and relations of the domain such that reasoning can be based on the principles
      of this domain."

  - type: ENABLES
    source: first_principles_reasoning
    target: qualitative_reasoning
    note: >
      First-principles reasoning supplies the stable domain laws that qualitative reasoning
      uses — without domain laws (e.g., gravity, voltage rules), qualitative envisioning has
      no principled basis for predicting state changes.
    quote: ~

  # --- COMPLICATES ---
  - type: COMPLICATES
    source: combinatorial_complexity
    target: debugging
    note: >
      The combinatorial explosion of possible bugs makes purely heuristic or exhaustive
      approaches to debugging infeasible; even for a simple watch, the number of possible
      faults far exceeds the reach of any finite set of heuristics.
    quote: >
      "even for a physical system such as a mechanical watch with relatively well-defined parts
      and components, the number of possible 'bugs' is combinatorially explosive in ways far
      beyond even a complex search tree."

  # --- INSTANCE-OF ---
  - type: INSTANCE-OF
    source: ex_integrated_circuit_board
    target: debugging
    note: >
      ICB design and repair is the canonical MIT-tradition example of physical-world debugging:
      the combinatorially explosive space of possible faults requires constructing causal
      interpretations from first principles rather than searching predefined trees.
    quote: >
      "A canonical example of reasoning about the physical world in this tradition of AI research
      is the problem of identifying faults in either the design or repair of an integrated
      circuit board."

  - type: INSTANCE-OF
    source: ex_integrated_circuit_board
    target: first_principles_reasoning
    note: >
      ICB debugging is driven by electrical engineering first principles (e.g., voltage laws)
      that constrain the possible values of transistors, resistors, and capacitors — a small
      stable set of laws that anchor reasoning across the combinatorially explosive fault space.
    quote: >
      "engineers use electrical engineering 'laws', such as how much voltage can flow between
      the components, to represent and reason about constraints on variables such as transistors,
      resistors, and capacitors."

  - type: INSTANCE-OF
    source: ex_three_containers
    target: qualitative_reasoning
    note: >
      The three containers example is the book's canonical illustration of qualitative reasoning:
      water flow direction can be inferred from gravity alone, with no numbers — demonstrating
      that domain laws enable useful inference without quantitative data.
    quote: >
      "What happens when water is poured into the highest container? It is easy for you to reason
      that it will flow through the pipes into the second container at medium height…Such
      reasoning did not require any numbers."

  - type: INSTANCE-OF
    source: ex_three_containers
    target: envisioning
    note: >
      De Kleer uses the containers example to illustrate envisioning: predicting how qualitative
      states (water level, flow direction) unfold according to domain laws is precisely "running
      a qualitative simulation in the mind's eye".
    quote: >
      "envisioning means predicting and analyzing changes of the qualitative state of a system
      (e.g., from water being in one container, to flowing into another)."

  - type: INSTANCE-OF
    source: ex_nvidia_cuda
    target: domain_specific_language
    note: >
      Nvidia CUDA is cited as an example of a domain-specific language: it provides a
      programming vocabulary tuned to the first principles of GPU chip design rather than
      general-purpose computation.
    quote: >
      "Nvidia's CUDA language offers a more specific programming language for designing functions
      for graphical processing unit (GPU) chips."

  - type: INSTANCE-OF
    source: ex_cad_software
    target: domain_specific_language
    note: >
      CAD software is cited as a domain-specific language for geometric reasoning, enabling
      engineers to represent and reason about physical systems based on geometric first
      principles.
    quote: >
      "computer-assisted design (CAD) software offers a broad range of engineers a way of
      reasoning about physical systems based on geometric principles."

