      Bayesian inference requires defined conditional probabilities
      between parent and child variables.

  - type: REQUIRES
    source: boltzmann_machines
    target: entropy
    note: >
      Boltzmann machines learn by minimizing entropy (cost) across
      the network of weights.

  - type: REQUIRES
    source: forward_checking
    target: constraint_propagation
    note: >
      Forward checking requires propagation to check whether an
      assignment is consistent.

