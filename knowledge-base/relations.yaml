  - type: ATTRIBUTED-TO
    source: brute_force
    target: richard_sutton
    note: >
      Sutton's 2019 "Bitter Lesson" blog post articulated the brute force view: that AI progress
      has come from scaling compute, not from complex strategies.
    quote: >
      "Richard Sutton… wrote a short blog post titled 'The Bitter Lesson'… the result of over
