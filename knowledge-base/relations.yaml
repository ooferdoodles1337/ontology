  - type: CAUSES
    source: rugged_landscape
    target: path_dependence
    note: >
      The notes state: "the costs of myopia depend on the luck of
      wherever our initial actions map to in the performance landscape.
      This is called path dependence." A rugged landscape is the
      structural cause of this dependency.

  - type: CAUSES
    source: local_peaks
    target: superstitious_learning
    note: >
      The notes note that climbing the wrong local peak produces
      performance improvements that are feedback artifacts, not genuine
      learning — a precise description of superstitious learning.

