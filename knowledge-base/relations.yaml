  # =========================================================
  # MODULE 5: Knowledge Representation and Reasoning (KRR)
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: krr
    target: representation
    note: >
      KRR is a strategy for representation that augments constraints
      with knowledge bases and inference engines.

  - type: IS-A
    source: commonsense_knowledge
    target: explicit_knowledge
    note: >
      Commonsense knowledge is a vast set of default assumptions about
      how the world works, largely stored implicitly but derivable
      from explicit representations.

  - type: IS-A
    source: bayesian_inference
    target: krr
    note: >
      Bayesian inference is one reasoning strategy within the broader
      KRR framework.

  # --- PART-OF ---
  - type: PART-OF
    source: knowledge_base
    target: krr
    note: >
      A knowledge base (representations of knowledge) is one of the
      two main components of KRR.

  - type: PART-OF
    source: bayesian_inference
    target: bayesian_networks
    note: >
      Bayesian inference is the reasoning process that operates
      within the Bayesian network structure.

  - type: PART-OF
    source: beliefs
    target: bayesian_networks
    note: >
      Beliefs (an agent's probabilities about cause-effect relations)
      are the content that Bayesian inference updates.

  - type: PART-OF
    source: random_variables
    target: bayesian_networks
    note: >
      Random variables (events that can be tested as in experiments)
      are the nodes of a Bayesian network.

  - type: PART-OF
    source: probability_distribution
    target: bayesian_networks
    note: >
      The overall probability distribution learned across all variables
      is the output of a Bayesian network.

  # --- CAUSES ---
  - type: CAUSES
    source: commonsense_knowledge
    target: coherence
    note: >
      Having adequate commonsense knowledge enables coherent reasoning
      across diverse situations.

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: decision_models
    target: mental_models
    note: >
      Decision models are formal representations for specific choices;
      mental models are broader simplified representations of the world.
      Both are types of satisficing representations.

  # --- EXAMPLE-OF ---
  - type: EXAMPLE-OF
    source: ex_french_language_model
    target: commonsense_knowledge
    note: >
      A language model for French relies on commonsense knowledge
      about language structure.

  - type: EXAMPLE-OF
    source: ex_food_ordering_model
    target: commonsense_knowledge
    note: >
      A food ordering model relies on commonsense knowledge about
      how ordering and menus work.

  # --- REQUIRES ---
  - type: REQUIRES
    source: krr
    target: commonsense_knowledge
    note: >
      McCarthy argued that KRR ultimately reduces to representing and
      reasoning about commonsense knowledge.

  - type: REQUIRES
    source: krr
    target: commonsense_knowledge
    note: >
      The ability to reason about any specific problem presupposes a
      base of commonsense knowledge (McCarthy).


  # =========================================================
  # MODULE 6: Evolutionary Strategies
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: evolutionary_strategies
    target: learning
    note: >
      Evolutionary strategies are a class of learning processes that
      assign credit at the population level through adaptation.

  - type: IS-A
    source: genetic_algorithms
    target: evolutionary_strategies
    note: >
      Genetic algorithms are a specific evolutionary strategy using
      chromosome-inspired representations with crossover and mutation.

  - type: IS-A
    source: natural_selection
    target: selection
    note: >
      Natural selection is the biological form of the selection
      operator in evolutionary strategies.

  - type: IS-A
    source: artificial_selection
    target: selection
    note: >
      Artificial selection is a designed selection environment (e.g.,
      Mendelian plant breeding or A/B testing within a firm).

  - type: IS-A
    source: crossover
    target: evolutionary_operators
    note: >
      Crossover (combining parts of two chromosomes) is one of the
      three core evolutionary operators.

  - type: IS-A
    source: mutation
    target: evolutionary_operators
    note: >
      Mutation (randomly changing a gene value) is one of the
      core evolutionary operators.

  - type: IS-A
    source: selection
    target: evolutionary_operators
    note: >
      Selection (assigning credit to high-fitness solutions) is one
      of the core evolutionary operators.

  - type: IS-A
    source: rugged_landscape
    target: performance_landscape
    note: >
      A rugged landscape has multiple local fitness peaks due to
      interdependence among components.

  - type: IS-A
    source: single_peaked_landscape
    target: performance_landscape
    note: >
      A single-peaked landscape has one global optimum with smooth
      gradients leading to it.

  - type: IS-A
    source: mesa_landscape
    target: performance_landscape
    note: >
      A mesa landscape has a flat bottom and flat top with no
      gradients for trial-and-error learning.

  - type: IS-A
    source: propagator_model
    target: evolutionary_strategies
    note: >
      The propagator model (Sussman) is an alternative evolutionary
      strategy using constraint-based objects rather than bit strings.

  - type: IS-A
    source: schema_genetic
    target: schema
    note: >
      A genetic schema is a template describing a subset of
      chromosome positions (fixed and variable bits).

  # --- PART-OF ---
  - type: PART-OF
    source: variation
    target: vsr
    note: >
      Variation (generating different solutions) is the V in VSR.

  - type: PART-OF
    source: selection
    target: vsr
    note: >
      Selection (assigning credit to high-fitness solutions) is the
      S in VSR.

  - type: PART-OF
    source: retention
    target: vsr
    note: >
      Retention (using high-performing solutions in the next generation)
      is the R in VSR.

  - type: PART-OF
    source: genes
    target: chromosome
    note: >
      Individual genes (bits) are the components of a chromosome.

  - type: PART-OF
    source: alleles
    target: genes
    note: >
      Alleles are the possible values (expressions) of a gene.

  - type: PART-OF
    source: genetic_sequences
    target: chromosome
    note: >
      Genetic sequences are ordered sets of genes within a chromosome.

  - type: PART-OF
    source: fitness_function
    target: evolutionary_strategies
    note: >
      The fitness function evaluates how well a solution performs
      relative to the problem environment.

  - type: PART-OF
    source: population_of_chromosomes
    target: genetic_algorithms
    note: >
      A population of chromosomes is the set of candidate solutions
      that evolve across generations.

  - type: PART-OF
    source: building_blocks
    target: schema_genetic
    note: >
      Building blocks are short, high-fitness schemas that combine
      to form good solutions.

  - type: PART-OF
    source: objects_propagator
    target: propagator_model
    note: >
      Objects (cells encoded with constraint information) are the
      building blocks of the propagator model.

  # --- CAUSES ---
  - type: CAUSES
    source: spatial_interdependence
    target: rugged_landscape
    note: >
      Spatial interdependence among components causes the landscape
      to become rugged with multiple local peaks.

  - type: CAUSES
    source: path_dependence
    target: local_peaks
    note: >
      Path dependence (early actions having outsized effects) causes
      agents to get stuck on local peaks.

  - type: CAUSES
    source: myopia
    target: path_dependence
    note: >
      Myopic (local-only) search causes agents to follow paths
      determined by their initial position.

  - type: CAUSES
    source: implicit_parallelism
    target: exploration_exploitation_tradeoff
    note: >
      Implicit parallelism in GAs enables efficiently searching vast
      spaces by balancing exploration and exploitation.

  - type: CAUSES
    source: exploration
    target: novel_configurations
    note: >
      Exploration (large modifications / long-jumping) generates novel
      configurations not informed by immediate feedback.

  - type: CAUSES
    source: exploitation
    target: local_peaks
    note: >
      Exploitation (small incremental modifications / hill-climbing)
      tends to converge on local peaks.

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: exploration
    target: exploitation
    note: >
      Exploration (large risky modifications / long-jumping) contrasts
      with exploitation (small incremental modifications / hill-climbing).

  - type: CONTRASTS-WITH
    source: mendelian_approach
    target: genetic_algorithms
    note: >
      The Mendelian approach experiments with individual gene traits;
      genetic algorithms use chromosome-level abstractions (crossover).

  - type: CONTRASTS-WITH
    source: genetic_algorithms
    target: propagator_model
    note: >
      GAs use bit strings with crossover/mutation; the propagator model
      uses richly-encoded objects with constraint-based propagation.

  - type: CONTRASTS-WITH
    source: rugged_landscape
    target: single_peaked_landscape
    note: >
      Rugged landscapes have multiple local peaks from interdependence;
      single-peaked landscapes have one smooth gradient.

  - type: CONTRASTS-WITH
    source: mesa_landscape
    target: rugged_landscape
    note: >
      Mesa landscapes lack gradients entirely; rugged landscapes have
      local gradients that enable hill-climbing.

  - type: CONTRASTS-WITH
    source: long_jumping
    target: hill_climbing
    note: >
      Long-jumping makes large exploratory moves across the landscape;
      hill-climbing makes small exploitative moves along gradients.

  - type: CONTRASTS-WITH
    source: giant_strides
    target: hill_climbing
    note: >
      Giant strides (Minsky) are coherent logical leaps needed in mesa
      landscapes; hill-climbing follows existing gradients.

  - type: CONTRASTS-WITH
    source: smoothing_topology
    target: rugged_landscape
    note: >
      Understanding component structure smooths the landscape topology
      from rugged to gentler, enabling easier navigation.

