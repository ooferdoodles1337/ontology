# ============================================================
# FAB 2026 — Course Ontology Relations
# v2: original relations retained in full; new relations
#     appended in a clearly-labelled supplement section.
# ============================================================
# RELATION TYPES
#   IS-A, PART-OF, CAUSES, CONTRASTS-WITH, EXAMPLE-OF, REQUIRES, ATTRIBUTED-TO
# ============================================================

relations:

  # =========================================================
  # MODULE 1: General Problem of Intelligence / Credit Assignment
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: credit_assignment
    target: general_problem_of_intelligence
    note: >
      Credit assignment is characterized as the specific formulation of the
      general problem of intelligence: learning to evaluate effects of
      individual actions on solving a problem.

  - type: IS-A
    source: reinforcement_learning
    target: learning
    note: >
      Reinforcement learning is one paradigm of learning, defined by
      reinforcing actions that seem to move the agent closer to a goal.

  - type: IS-A
    source: delayed_feedback
    target: feedback
    note: >
      Delayed feedback is feedback that arrives well after actions are generated.

  - type: IS-A
    source: ambiguous_feedback
    target: feedback
    note: >
      Ambiguous feedback is feedback whose relationship to actions is unclear.

  - type: IS-A
    source: sparse_feedback
    target: feedback
    note: >
      Sparse feedback is feedback where only a small subset of actions
      generate information useful for assigning credit (Minsky).

  - type: IS-A
    source: intermediate_feedback
    target: feedback
    note: >
      Intermediate feedback refers to proxies indicating progress toward
      a goal, used to assign credit before a final outcome.

  - type: IS-A
    source: policy
    target: organizational_programs
    note: >
      A policy in RL is a set of rules defining how to update probabilities,
      analogous to an organizational program.

  - type: IS-A
    source: delegation
    target: actions
    note: >
      In the society-of-mind paradigm, delegation of subproblems to
      other agents is itself a fundamental type of action.

  - type: IS-A
    source: hierarchical_management
    target: delegation
    note: >
      Hierarchical management is a specific form of delegation structured
      into levels of agents.

  # --- PART-OF ---
  - type: PART-OF
    source: feedback
    target: credit_assignment
    note: >
      Feedback is the essential input to any credit assignment process;
      generating and using feedback is how credit is assigned.

  - type: PART-OF
    source: trial_and_error
    target: credit_assignment
    note: >
      Trial-and-error is the basic generate-and-test mechanism through
      which credit assignment operates.

  - type: PART-OF
    source: policy
    target: reinforcement_learning
    note: >
      A policy (rules for updating beliefs) is a core component of
      reinforcement learning.

  - type: PART-OF
    source: value_function
    target: reinforcement_learning
    note: >
      The value function estimates aggregate rewards and is a core
      component of the RL framework.

  - type: PART-OF
    source: learning_rate
    target: policy
    note: >
      The learning rate (0 to 1) determines the magnitude of belief
      updates and is the key parameter of a policy.

  - type: PART-OF
    source: maximize_rewards
    target: reinforcement_learning
    note: >
      The overall goal in reinforcement learning is to maximize rewards.

  - type: PART-OF
    source: aggregate_rewards
    target: value_function
    note: >
      The value function estimates aggregate (cumulative expected) rewards.

  - type: PART-OF
    source: agent_specialization
    target: society_of_mind_hypothesis
    note: >
      Specialized agents are constituent parts of Minsky's society of mind.

  - type: PART-OF
    source: division_of_labor
    target: society_of_mind_hypothesis
    note: >
      Division of labor among agents is a structural component of the
      society of mind.

  - type: PART-OF
    source: organizational_memory
    target: organizational_learning
    note: >
      Organizational memory (storing and using feedback about past
      decompositions) is a component of organizational learning.

  - type: PART-OF
    source: organizational_programs
    target: organizational_learning
    note: >
      Organizational programs are stored routines that constitute the
      repertoire of organizational learning.

  # --- CAUSES ---
  - type: CAUSES
    source: interdependence_of_actions
    target: combinatorial_explosion
    note: >
      A linear increase in interdependent actions leads to a
      combinatorial increase in the cost of trial-and-error learning.

  - type: CAUSES
    source: sparse_feedback
    target: superstitious_learning
    note: >
      Lacking enough feedback about interdependent actions leads to
      reinforcing beliefs without adequate evidence (superstitious learning).

  - type: CAUSES
    source: combinatorial_explosion
    target: superstitious_learning
    note: >
      Combinatorial explosion overwhelms trial-and-error, making it
      impossible to tell if reinforced beliefs are true or superstitious.

  - type: CAUSES
    source: delayed_feedback
    target: superstitious_learning
    note: >
      Delayed feedback contributes to superstitious learning because
      agents cannot easily link actions to outcomes.

  - type: CAUSES
    source: ambiguous_feedback
    target: superstitious_learning
    note: >
      Ambiguous feedback makes it hard to know which actions actually
      caused observed outcomes.

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: reward_hypothesis
    target: management_hypothesis
    note: >
      The reward hypothesis (Sutton) proposes maximizing cumulative scalar
      reward; the management hypothesis (Minsky-inspired) proposes managing
      decomposition of problems into societies of agents.

  - type: CONTRASTS-WITH
    source: reinforcement_learning
    target: society_of_mind_hypothesis
    note: >
      RL assigns credit via a single agent updating beliefs about actions;
      society of mind assigns credit through coordinated societies of
      specialized agents.

  - type: CONTRASTS-WITH
    source: unitary_actor_assumption
    target: society_of_mind_hypothesis
    note: >
      The unitary actor assumption treats the agent as a single
      decision-maker; society of mind treats it as an organization of
      many cooperating agents.

  # --- EXAMPLE-OF ---
  - type: EXAMPLE-OF
    source: ex_tmaze_mouse_cheese
    target: reinforcement_learning
    note: >
      The T-maze mouse searching for cheese is the primary example of
      reinforcement learning and belief updating in Module 1.

  - type: EXAMPLE-OF
    source: ex_checkers_game
    target: credit_assignment
    note: >
      Samuel's checkers program is the canonical example of using
      intermediate feedback to assign credit.

  - type: EXAMPLE-OF
    source: ex_coin_toss_weighted_70_30
    target: reinforcement_learning
    note: >
      The weighted 70/30 coin determines cheese placement in the T-maze,
      illustrating the probabilistic structure of RL problems.

  - type: EXAMPLE-OF
    source: ex_shipbuilding_company
    target: credit_assignment
    note: >
      The shipbuilding company learning to reduce defects illustrates
      credit assignment challenges in organizations.

  - type: EXAMPLE-OF
    source: ex_app_development_team
    target: credit_assignment
    note: >
      The app team using A/B testing illustrates organizational credit
      assignment through generate-and-test.

  - type: EXAMPLE-OF
    source: ex_budgeting_committee
    target: credit_assignment
    note: >
      The pharma budgeting committee illustrates credit assignment
      challenges of delayed and ambiguous feedback.

  - type: EXAMPLE-OF
    source: ex_ceo_builder_grasp_move_agents
    target: society_of_mind_hypothesis
    note: >
      Geoffrey delegating maze construction to Builder, Add, Grasp,
      and Move agents illustrates the society of mind.

  - type: EXAMPLE-OF
    source: ex_ab_testing
    target: trial_and_error
    note: >
      A/B testing is a concrete organizational instantiation of
      generate-and-test for credit assignment.

  - type: EXAMPLE-OF
    source: ex_kpi_milestones_customer_journey
    target: intermediate_feedback
    note: >
      KPIs for each step of a customer journey are a form of
      intermediate feedback in organizations.

  - type: EXAMPLE-OF
    source: ex_net_present_value_cash_flows
    target: temporal_differencing
    note: >
      NPV estimating investment reward as the sum of cash flows is
      analogous to temporal differencing in RL.

  - type: EXAMPLE-OF
    source: ex_muscle_fibers
    target: agent_specialization
    note: >
      Muscle fiber agents controlling Geoffrey's fingers illustrate
      the lowest level of agent specialization.

  # --- REQUIRES ---
  - type: REQUIRES
    source: temporal_differencing
    target: value_function
    note: >
      TD updates estimates of cumulative reward, which requires the
      concept of a value function.

  - type: REQUIRES
    source: reinforcement_learning
    target: feedback
    note: >
      RL cannot operate without some form of feedback to reinforce or
      punish actions.

  - type: REQUIRES
    source: society_of_mind_hypothesis
    target: decomposition
    note: >
      Learning in a society requires decomposing problems into subproblems
      delegated to specialized agents.

  - type: REQUIRES
    source: management_hypothesis
    target: organizational_memory
    note: >
      The management hypothesis requires memory about past decompositions
      and how agents were organized.

  - type: REQUIRES
    source: credit_assignment
    target: goal_directed_agents
    note: >
      Credit assignment presupposes agents with goals against which
      actions can be evaluated.

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: credit_assignment
    target: arthur_samuel
    note: >
      Samuel (1959) first described the general solution to credit
      assignment as generating intermediate feedback (checkers program).

  - type: ATTRIBUTED-TO
    source: society_of_mind_hypothesis
    target: minsky_1961
    note: >
      Minsky's 1961 paper argued that reinforcement is insufficient and
      proposed learning in a society as an alternative paradigm.

  - type: ATTRIBUTED-TO
    source: reward_hypothesis
    target: richard_sutton
    note: >
      Sutton (with Barto) developed the reward hypothesis and temporal
      differencing at UMass Amherst.

  - type: ATTRIBUTED-TO
    source: temporal_differencing
    target: andrew_barto
    note: >
      Barto co-developed TD learning with Sutton.

  - type: ATTRIBUTED-TO
    source: reinforcement_learning
    target: richard_bellman
    note: >
      Bellman's operations research work at RAND laid mathematical
      foundations for reinforcement learning.


  # =========================================================
  # MODULE 2: Information Processing
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: shannon_information
    target: information
    note: >
      Shannon information is a specific approach that treats information
      as meaningless syntactic units (bits).

  - type: IS-A
    source: simon_information
    target: information
    note: >
      Simon information is an approach that treats information as
      meaningful semantic units (lists).

  - type: IS-A
    source: syntactic_information
    target: information
    note: >
      Syntactic information concerns the structural patterns of symbols,
      independent of meaning.

  - type: IS-A
    source: semantic_information
    target: information
    note: >
      Semantic information concerns the meaning that symbols designate
      in the physical or conceptual world.

  - type: IS-A
    source: compression
    target: encoding
    note: >
      Compression is a specific form of encoding that removes statistical
      redundancies to reduce the number of bits.

  - type: IS-A
    source: meaningful_abstraction
    target: abstraction
    note: >
      Meaningful abstraction (Simon) organizes information into named
      semantic structures, as distinct from mere data reduction.

  - type: IS-A
    source: statistical_redundancy_removal
    target: compression
    note: >
      Statistical redundancy removal is the mechanism by which Shannon
      compression works.

  - type: IS-A
    source: pattern_matching
    target: symbol_manipulation
    note: >
      Pattern matching (matching exact symbols) is a basic type of
      symbol manipulation.

  - type: IS-A
    source: pattern_recognition
    target: symbol_manipulation
    note: >
      Pattern recognition (matching similar symbols) is a basic type of
      symbol manipulation.

  - type: IS-A
    source: ood_problems
    target: information_processing
    note: >
      Out-of-distribution problems are a class of information processing
      challenges where the statistical distribution of outcomes changes.

  - type: IS-A
    source: iid_problems
    target: information_processing
    note: >
      IID problems are information processing tasks where outcomes are
      independently and identically distributed.

  # --- PART-OF ---
  - type: PART-OF
    source: shannon_entropy
    target: information_theory
    note: >
      Shannon entropy (uncertainty measure over probability distributions)
      is a central component of information theory.

  - type: PART-OF
    source: bit
    target: shannon_information
    note: >
      The bit (binary digit) is the fundamental unit of Shannon information.

  - type: PART-OF
    source: bit_strings
    target: shannon_information
    note: >
      Bit strings are sequences of bits that encode symbolic patterns.

  - type: PART-OF
    source: encoding
    target: information_processing
    note: >
      Encoding (converting symbols into bit strings) is a basic
      information processing operation.

  - type: PART-OF
    source: decoding
    target: information_processing
    note: >
      Decoding (reconstructing symbols from bit strings) is a basic
      information processing operation.

  - type: PART-OF
    source: channel_capacity
    target: information_theory
    note: >
      Channel capacity (maximum bandwidth of a physical channel) is a
      core concept in Shannon's information theory.

  - type: PART-OF
    source: noise
    target: information_theory
    note: >
      Noise (wrong or irrelevant bit strings) is a fundamental concept
      in information theory.

  - type: PART-OF
    source: signal_to_noise_ratio
    target: information_theory
    note: >
      Signal-to-noise ratio measures how reliably messages can be
      communicated over a channel.

  # --- CAUSES ---
  - type: CAUSES
    source: processing_complexity
    target: combinatorial_explosion
    note: >
      As problem complexity grows, the number of symbol manipulation
      operations required explodes combinatorially.

  - type: CAUSES
    source: combinatorial_complexity
    target: curse_of_dimensionality
    note: >
      Combinatorial complexity in high-dimensional problems produces
      the curse of dimensionality.

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: shannon_information
    target: simon_information
    note: >
      Shannon treats information as meaningless bits processed via brute
      force; Simon treats information as meaningful lists processed via
      abstraction and modularity.

  - type: CONTRASTS-WITH
    source: syntactic_information
    target: semantic_information
    note: >
      Syntactic information concerns structural patterns independent of
      meaning; semantic information concerns what symbols designate.

  - type: CONTRASTS-WITH
    source: internal_representations
    target: external_representations
    note: >
      Internal representations are stored in minds or computer memory;
      external representations are stored in artifacts like documents
      or displays.

  - type: CONTRASTS-WITH
    source: explicit_knowledge
    target: tacit_knowledge
    note: >
      Explicit knowledge can be articulated and codified; tacit knowledge
      is too hard to extract or formalize.

  - type: CONTRASTS-WITH
    source: iid_problems
    target: ood_problems
    note: >
      IID problems assume a stable statistical distribution; OOD problems
      involve distributions that change or are unknown.

  - type: CONTRASTS-WITH
    source: abstraction
    target: compression
    note: >
      Abstraction (Simon) organizes information into meaningful modules;
      compression (Shannon) removes statistical redundancy from bit strings.

  # --- EXAMPLE-OF ---
  - type: EXAMPLE-OF
    source: ex_theseus_robot_1950
    target: shannon_information
    note: >
      Shannon's Theseus robot learned to navigate a maze using only
      syntactic electrical circuit messages, with no semantic content.

  - type: EXAMPLE-OF
    source: ex_electrical_circuits
    target: agentic_environment
    note: >
      The electrical circuits underneath Theseus's maze illustrate
      the convenient fiction of treating environments as agentic.

  - type: EXAMPLE-OF
    source: ex_telephone_network_routing
    target: channel_capacity
    note: >
      AT&T's telephone network routing was the canonical problem that
      motivated Shannon's information theory.

  - type: EXAMPLE-OF
    source: ex_pilot_cockpit_altimeter
    target: information_processing
    note: >
      A pilot reading cockpit instruments illustrates information
      processing through symbol manipulation.

  - type: EXAMPLE-OF
    source: ex_fiber_optic_5g_tv_bandwidth
    target: bandwidth
    note: >
      Fiber optic and 5G channels illustrate differences in bandwidth
      and channel capacity.

  - type: EXAMPLE-OF
    source: ex_english_word_distribution
    target: iid_problems
    note: >
      Predicting the next English word in an LLM prompt assumes
      an IID distribution of English words.

  - type: EXAMPLE-OF
    source: ex_mechanical_watch_assembly
    target: modularity
    note: >
      Simon's watchmaker parable (1000 parts vs 100 modules of 10)
      is the canonical illustration of modularity.

  - type: EXAMPLE-OF
    source: ex_neuron_synapses_100_trillion
    target: processing_capacity
    note: >
      The estimate of 100 trillion brain synapses illustrates the scale
      of processing capacity relevant to artificial brain arguments.

  - type: EXAMPLE-OF
    source: ex_coin_toss_fair
    target: iid_problems
    note: >
      A fair coin toss is the canonical example of IID outcomes.

  # --- REQUIRES ---
  - type: REQUIRES
    source: compression
    target: encoding
    note: >
      Compression requires first encoding symbols into bit strings
      before redundancies can be removed.

  - type: REQUIRES
    source: physical_symbol_system_hypothesis
    target: simon_information
    note: >
      The PSSH requires meaningful (Simon-type) symbols that designate
      objects in the world.

  - type: REQUIRES
    source: information_processing
    target: processing_capacity
    note: >
      All information processing requires some amount of processing
      capacity (energy or work).

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: shannon_information
    target: claude_shannon
    note: >
      Shannon pioneered syntactic information theory at Bell Labs / MIT.

  - type: ATTRIBUTED-TO
    source: simon_information
    target: herbert_simon
    note: >
      Simon pioneered semantic information processing at Carnegie-Mellon.

  - type: ATTRIBUTED-TO
    source: turing_machine
    target: alan_turing
    note: >
      Turing introduced the Turing machine in 1936 as a model of
      effective procedures.

  - type: ATTRIBUTED-TO
    source: physical_symbol_system_hypothesis
    target: allen_newell
    note: >
      Newell (with Simon) articulated the PSSH in their Turing Award speech.

  # --- EXAMPLE-OF (people as users/commentators) ---
  - type: EXAMPLE-OF
    source: saleema_amershi
    target: modularity
    note: >
      Amershi et al. (2019) at Microsoft Research showed ML deployment
      requires organizational/modular processes, not just brute force.

  - type: EXAMPLE-OF
    source: cantwell_smith
    target: information_processing
    note: >
      Cantwell Smith's definition of information processing as storing,
      manipulating, displaying, and trafficking in information.


  # =========================================================
  # MODULE 3: Search
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: search
    target: information_processing
    note: >
      Search is a specific information processing strategy that divides
      complex problems into plans using heuristics.

  - type: IS-A
    source: uninformed_search
    target: search
    note: >
      Uninformed search uses no domain-specific heuristics to guide
      action selection.

  - type: IS-A
    source: informed_search
    target: search
    note: >
      Informed search uses domain-specific heuristics to guide action
      selection and prune the search tree.

  - type: IS-A
    source: breadth_first_search
    target: uninformed_search
    note: >
      BFS searches many paths, generating-and-testing a few actions
      for each path.

  - type: IS-A
    source: depth_first_search
    target: uninformed_search
    note: >
      DFS searches one or few paths deeply, generating-and-testing
      many actions per path.

  - type: IS-A
    source: hill_climbing
    target: informed_search
    note: >
      Hill-climbing is an informed search that follows local gradients
      toward higher performance.

  - type: IS-A
    source: adversarial_search
    target: search
    note: >
      Adversarial search involves two or more agents with conflicting
      goals (game-playing).

  - type: IS-A
    source: von_neumann_search
    target: adversarial_search
    note: >
      Von Neumann search conceives of search as playing a well-defined
      game with utility functions.

  - type: IS-A
    source: simon_search
    target: search
    note: >
      Simon search conceives of search as understanding and structuring
      an ill-defined problem using means-ends analysis.

  - type: IS-A
    source: means_ends_analysis
    target: heuristics
    note: >
      Means-ends analysis is a general heuristic method: identify
      differences between current state and goal, then reduce them.

  - type: IS-A
    source: satisficing
    target: heuristics
    note: >
      Satisficing is itself a heuristic: generate plans until a
      satisfactory solution is found, then stop.

  - type: IS-A
    source: brute_force
    target: search
    note: >
      Brute force is a search strategy that tests all possible states,
      contrasted with heuristic search.

  - type: IS-A
    source: generate_and_test
    target: search
    note: >
      Generate-and-test is the most basic search strategy: produce a
      candidate and evaluate it.

  - type: IS-A
    source: backtracking
    target: depth_first_search
    note: >
      Backtracking is a depth-first strategy that reverses one move
      when a violation is detected.

  - type: IS-A
    source: algorithm
    target: effective_procedure
    note: >
      An algorithm is a precise and unambiguous specification for
      controlling a sequence of mechanically executable steps.

  # --- PART-OF ---
  - type: PART-OF
    source: state
    target: search_space
    note: >
      States are the nodes of the search space / search tree.

  - type: PART-OF
    source: initial_state
    target: search
    note: >
      The initial state is the starting point of any search process.

  - type: PART-OF
    source: goal_state
    target: search
    note: >
      The goal state is the target endpoint of a search process.

  - type: PART-OF
    source: intermediate_state
    target: search
    note: >
      Intermediate states are the states visited between the initial
      and goal states.

  - type: PART-OF
    source: operators
    target: search
    note: >
      Operators are the actions available to transform one state into another.

  - type: PART-OF
    source: state_transitions
    target: search
    note: >
      State transitions are the moves from one state to another via operators.

  - type: PART-OF
    source: paths
    target: search_tree
    note: >
      Paths are sequences of actions / state transitions in the search tree.

  - type: PART-OF
    source: branches
    target: search_tree
    note: >
      Branches are segments of the search tree that can be pruned.

  - type: PART-OF
    source: node
    target: search_tree
    note: >
      Nodes represent individual states in the search tree.

  - type: PART-OF
    source: evaluation_function
    target: von_neumann_search
    note: >
      The evaluation function collapses intermediate feedback into a
      single utility value for each state in von Neumann search.

  - type: PART-OF
    source: subgoals
    target: planning
    note: >
      Subgoals are intermediate targets that decompose a complex
      planning problem.

  - type: PART-OF
    source: memory_of_action_sequences
    target: planning
    note: >
      Remembering good sequences of actions allows agents to form
      beliefs about plans.

  - type: PART-OF
    source: aspiration_level
    target: satisficing
    note: >
      The aspiration level is the threshold of satisfactory performance
      that triggers the stop-search heuristic.

  # --- CAUSES ---
  - type: CAUSES
    source: heuristics
    target: pruning
    note: >
      Using heuristics eliminates (prunes) large branches of the
      search tree that need not be evaluated.

  - type: CAUSES
    source: myopia
    target: local_peaks
    note: >
      Myopic search (only seeing things locally) causes agents to get
      stuck on local peaks rather than finding the global optimum.

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: von_neumann_search
    target: simon_search
    note: >
      Von Neumann search uses utility functions for well-defined games;
      Simon search uses means-ends analysis for ill-defined problems.

  - type: CONTRASTS-WITH
    source: brute_force
    target: heuristics
    note: >
      Brute force tests all states; heuristics economize by testing
      only promising states.

  - type: CONTRASTS-WITH
    source: uninformed_search
    target: informed_search
    note: >
      Uninformed search has no domain-specific guidance; informed search
      uses heuristics to prune and prioritize.

  - type: CONTRASTS-WITH
    source: global_optimum
    target: local_peaks
    note: >
      The global optimum is the best solution overall; local peaks are
      suboptimal solutions that appear best in their neighborhood.

  - type: CONTRASTS-WITH
    source: find_best_solution_goal
    target: satisficing
    note: >
      Finding the best solution (optimization) contrasts with satisficing
      (finding any good-enough solution).

  # --- EXAMPLE-OF ---
  - type: EXAMPLE-OF
    source: ex_safe_combination_81_factorial
    target: brute_force
    note: >
      Trying all combinations of a safe illustrates brute force search.

  - type: EXAMPLE-OF
    source: ex_kaist_to_incheon_airport
    target: search
    note: >
      Planning a train route from KAIST to Incheon Airport illustrates
      search with pruning via a map representation.

  - type: EXAMPLE-OF
    source: ex_pin_factory_adam_smith
    target: division_of_labor
    note: >
      Smith's pin factory is the canonical example of gains to
      specialization through division of labor.

  - type: EXAMPLE-OF
    source: ex_checkers_game
    target: von_neumann_search
    note: >
      Samuel's checkers program exemplifies von Neumann search with
      evaluation functions and backward propagation.

  - type: EXAMPLE-OF
    source: deliberate_practice
    target: heuristics
    note: >
      Deliberate practice is a heuristic experts use to learn other
      heuristics (Simon's research on expertise).

  - type: EXAMPLE-OF
