# ============================================================
# FAB 2026 — Course Ontology Relations
# ============================================================
# Relation types are defined in knowledge-base/relation-schema.yaml.
# Type names are free-form strings from that vocabulary.
# ============================================================

relations:

  # =========================================================
  # MODULE 1: The General Problem of Intelligence — Credit Assignment
  # Source: 2026_Course Notes_Ch. 1 — The General Problem of Intelligence_ Credit Assignment - FAB.pdf
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: credit_assignment
    target: general_problem_of_intelligence
    note: >
      The text frames credit assignment as the specific, tractable formulation of the general
      problem of intelligence — the problem of learning which actions deserve credit for a given outcome.
    quote: >
      "Founders of AI referred to this general problem of intelligence as that of learning to assign credit."

  - type: IS-A
    source: reinforcement_learning
    target: learning
    note: >
      Reinforcement learning is one paradigm of learning, defined by reinforcing actions that
      seem to move an agent closer to its goal.
    quote: >
      "In reinforcement learning, an agent assigns credit simply by 'reinforcing' actions that
      seem to have the effect of getting it closer to its goal."

  - type: IS-A
    source: society_of_mind_hypothesis
    target: learning
    note: >
      The society-of-mind hypothesis is presented as an alternative paradigm of learning,
      contrasting with reinforcement learning throughout the document.
    quote: ~

  - type: IS-A
    source: delayed_feedback
    target: feedback
    note: >
      Delayed feedback is a specific problematic variety of feedback where signals arrive well
      after the actions that caused them.
    quote: >
      "Feedback about goals... was either delayed until well after actions were generated, or ambiguous."

  - type: IS-A
    source: ambiguous_feedback
    target: feedback
    note: >
      Ambiguous feedback is feedback whose causal link to specific actions is unclear.
    quote: >
      "While the organizations 'learned' something... there was no easy way to know whether they
      learned the right things due to these challenges of assigning credit of delayed and ambiguous feedback."

  - type: IS-A
    source: sparse_feedback
    target: feedback
    note: >
      Sparse feedback is Minsky's third major difficulty: only a small fraction of actions generate
      feedback that is useful for assigning credit.
    quote: >
      "Minsky argued feedback is not just uncertain or ambiguous but sparse, meaning that only a
      small subset of actions generate feedback useful for assigning credit."

  - type: IS-A
    source: intermediate_feedback
    target: feedback
    note: >
      Intermediate feedback is a specific type of feedback — proxy signals evaluated during the
      process rather than only at the final outcome.
    quote: >
      "Samuel called the evaluation of such proxies the use of 'intermediate feedback' to assign credit."

  - type: IS-A
    source: temporal_differencing
    target: reinforcement_learning
    note: >
      Temporal differencing is a specific technique within reinforcement learning developed by
      Sutton and Barto to address combinatorial explosion.
    quote: >
      "Richard Sutton and his colleague Andrew Barto developed a reinforcement learning approach to
      address combinatorial explosion that they called temporal differencing, or TD."

  - type: IS-A
    source: exploration
    target: policy
    note: >
      Exploration is the RL policy of using a high learning rate to rapidly update beliefs and
      take risks on new actions.
    quote: >
      "they call a policy of using a high learning rate as exploration, in that making large updates
      amounts to taking a risk on a new belief without much basis in prior feedback"

  - type: IS-A
    source: exploitation
    target: policy
    note: >
      Exploitation is the RL policy of using a low learning rate to conserve and build on prior
      trial-and-error learning.
    quote: >
      "AI and organizational researchers call a policy of using a low learning rate exploitation,
      in that it 'exploits' learning based on prior trial-and-error actions"

  # --- INSTANCE-OF ---
  - type: INSTANCE-OF
    source: ex_checkers_game
    target: credit_assignment
    note: >
      Samuel's checkers program is the canonical example introducing the credit assignment problem
      and its solution form.
    quote: >
      "The shape of the general solution to challenges of credit assignment was initially described by
      the IBM scientist Arthur Samuel in 1959 regarding his pioneering AI program for learning to
      play the game of checkers."

  - type: INSTANCE-OF
    source: ex_checkers_game
    target: intermediate_feedback
    note: >
      Counting pieces and monitoring board distribution are the concrete examples of intermediate
      feedback as proxy signals.
    quote: >
      "Good checkers players, Samuel noted, do not wait until the end of a game to assign credit…
      they count the number of pieces left, and monitor how the pieces are distributed across the board."

  - type: INSTANCE-OF
    source: ex_tmaze_mouse_cheese
    target: reinforcement_learning
    note: >
      The T-maze is the primary worked example for reinforcement learning, illustrating how a
      policy updates beliefs over many trials.
    quote: >
      "let us first look at the use of reinforcement to assign credit in a simple problem… Imagine
      a mouse who generates actions in a T-shaped 'maze' to find cheese as a reward"

  - type: INSTANCE-OF
    source: ex_tmaze_mouse_cheese
    target: exploration_exploitation_tradeoff
    note: >
      The two learning rates (10% vs 30%) in the T-maze directly illustrate the efficiency vs
      effectiveness tradeoff between exploitation and exploration.
    quote: >
      "Compare, for example, how the learning rates in Table 1 change the efficiency and
      effectiveness of updating the mouse's probability of going left."

  - type: INSTANCE-OF
    source: ex_shipbuilding_company
    target: credit_assignment
    note: >
      The shipbuilding company illustrates credit assignment under combinatorial complexity:
      managers cannot isolate which interdependent actions caused improvements.
    quote: >
      "how did management know which changes to the vast number of interdependent actions in the
      shipbuilding factory actually caused faster production speed and fewer defects"

  - type: INSTANCE-OF
    source: ex_shipbuilding_company
    target: organizational_learning
    note: >
      The shipbuilding company is a direct illustration of organizational learning through
      accumulated trial-and-error feedback.
    quote: >
      "Many years later, having built hundreds of ships, management claims to have 'learned' to
      make them faster and with fewer defects than its competitors."

  - type: INSTANCE-OF
    source: ex_app_development_team
    target: credit_assignment
    note: >
      The A/B testing team illustrates credit assignment under limited test coverage — they can
      only evaluate features relative to each other, not against all possible features.
    quote: >
      "how could they tell whether they learned the features of a social media app that users
      actually want, or just which features users relatively want among the ones that they tested?"

  - type: INSTANCE-OF
    source: ex_budgeting_committee
    target: credit_assignment
    note: >
      The budgeting committee illustrates ambiguous credit assignment across interdependent
      business unit decisions.
    quote: >
      "many business unit heads believe sales would have grown even more if more budget had been
      allocated to their units."

  - type: INSTANCE-OF
    source: ex_ceo_builder_grasp_move_agents
    target: society_of_mind_hypothesis
    note: >
      The CEO/Builder/Add/Grasp/MoveAgent hierarchy concretely illustrates the society-of-mind
      decomposition of intelligence into specialized delegating agents.
    quote: >
      "Geoffrey delegates the overall problem of constructing a maze to a 'Builder' agent in his
      mind, who is specialized in making stuff like mazes out of blocks."

  - type: INSTANCE-OF
    source: ex_ceo_builder_grasp_move_agents
    target: delegation
    note: >
      The example is built entirely around delegation as the primary action primitive — every
      agent acts by delegating to subordinate agents.
    quote: >
      "Geoffrey is a sort of 'CEO' agent, whose actions manage lower-level agents in his mind or
      body needed to construct the maze."

  - type: INSTANCE-OF
    source: ex_hedge_maze
    target: organizational_memory
    note: >
      Switching from a block maze to a hedge maze illustrates the challenge of selective memory:
      what to carry forward and what to discard from prior problem decompositions.
    quote: >
      "Geoffrey's credit assignment challenge is… largely a matter of figuring out what to remember
      and what not to about how the previous problem was decomposed and managed."

  - type: INSTANCE-OF
    source: ex_net_present_value_cash_flows
    target: temporal_differencing
    note: >
      NPV illustrates the TD insight: estimate cumulative value from intermediate cash flows
      without tracking every interdependent action.
    quote: >
      "The intuition is much like that of economic valuation techniques such as net present value
      (NPV) that managers commonly use when deciding to invest in a project."

  - type: INSTANCE-OF
    source: ex_kpi_milestones_customer_journey
    target: intermediate_feedback
    note: >
      KPIs per journey step are an organizational example of intermediate feedback — proxy
      signals that allow credit assignment before the final outcome.
    quote: >
      "the app development team may have defined key performance indicators (KPIs) for each step
      of a customer 'journey'"

  - type: INSTANCE-OF
    source: ex_muscle_fibers
    target: agent_specialization
    note: >
      The muscle fiber agents illustrate extreme bottom-level specialization in the society of
      mind: each agent controls only a tiny, specific action.
    quote: >
      "These agents… only know that they need to delegate their actions to thousands of other
      agents who control the muscle fibers of Geoffrey's fingers."

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: credit_assignment
    target: arthur_samuel
    note: >
      Samuel coined the credit assignment framing in his 1959 checkers paper.
    quote: >
      "Founders of AI referred to this general problem of intelligence as that of learning to
      assign credit (Samuel 1959; Minsky 1961; Holland 1975)."

  - type: ATTRIBUTED-TO
    source: credit_assignment
    target: marvin_minsky
    note: >
      Minsky co-founded the credit assignment framing in his 1961 AI agenda-setting paper.
    quote: >
      "Founders of AI referred to this general problem of intelligence as that of learning to
      assign credit (Samuel 1959; Minsky 1961; Holland 1975)."

  - type: ATTRIBUTED-TO
    source: credit_assignment
    target: john_holland
    note: >
      Holland contributed the credit assignment framing in his 1975 work on adaptive systems
      and genetic algorithms.
    quote: >
      "Founders of AI referred to this general problem of intelligence as that of learning to
      assign credit (Samuel 1959; Minsky 1961; Holland 1975)."

  - type: ATTRIBUTED-TO
    source: temporal_differencing
    target: richard_sutton
    note: >
      Sutton and Barto developed temporal differencing as their main contribution to reinforcement
      learning at the University of Massachusetts, Amherst.
    quote: >
      "Richard Sutton and his colleague Andrew Barto developed a reinforcement learning approach
      to address combinatorial explosion that they called temporal differencing, or TD."

  - type: ATTRIBUTED-TO
    source: temporal_differencing
    target: andrew_barto
    note: >
      Barto co-developed temporal differencing with Sutton at the University of Massachusetts, Amherst.
    quote: >
      "Richard Sutton and his colleague Andrew Barto developed a reinforcement learning approach
      to address combinatorial explosion that they called temporal differencing, or TD."

  - type: ATTRIBUTED-TO
    source: reward_hypothesis
    target: richard_sutton
    note: >
      Sutton and Barto formulated the reward hypothesis as the theoretical claim underlying TD.
    quote: >
      "Sutton and Barto claim that this approach offers a general solution to the credit assignment
      problem, corresponding to what they call the 'reward hypothesis'."

  - type: ATTRIBUTED-TO
    source: society_of_mind_hypothesis
    target: marvin_minsky
    note: >
      Minsky proposed the society of mind as an alternative paradigm to reinforcement learning
      in his 1961 paper and subsequent work.
    quote: >
      "A counterargument in the AI field is from Minsky… He proposed a distinct paradigm he
      called learning in a 'society of mind'."

  - type: ATTRIBUTED-TO
    source: reinforcement_learning
    target: richard_bellman
    note: >
      Bellman's operations research work at RAND in the 1940s–1950s established the mathematical
      foundations for reinforcement learning.
    quote: >
      "Reinforcement learning has roots in 1940s-1950s research in the US, famously by Richard
      Bellman, an applied mathematician at a US government think tank called the RAND Corporation."

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: exploration
    target: exploitation
    note: >
      Exploration (high learning rate, rapid belief updates) and exploitation (low learning rate,
      conservative updates) are opposing RL policies that must be balanced.
    quote: >
      "The need to balance the efficiency and effectiveness of these policies is famously called
      the exploration-exploitation tradeoff."

  - type: CONTRASTS-WITH
    source: reward_hypothesis
    target: management_hypothesis
    note: >
      The reward hypothesis (maximize cumulative rewards via a single value function) and the
      management hypothesis (manage decompositions and memories in a society) offer fundamentally
      different solutions to credit assignment.
    quote: >
      "Sutton's reward hypothesis proposes reinforcement learning as a general solution to credit
      assignment… Is this really plausible? A counterargument in the AI field is from Minsky."

  - type: CONTRASTS-WITH
    source: reinforcement_learning
    target: society_of_mind_hypothesis
    note: >
      The two paradigms represent competing views of intelligence: RL reduces problems to reward
      maximization; the society of mind requires decomposition, delegation, and memory management.
    quote: >
      "he proposed a distinct paradigm he called learning in a 'society of mind'. Next, we explore
      these two paradigms, both to better understand the idea of credit assignment."

  # --- ADDRESSES ---
  - type: ADDRESSES
    source: intermediate_feedback
    target: credit_assignment
    note: >
      Generating and testing intermediate feedback is the general solution form for credit
      assignment, as Samuel argued.
    quote: >
      "Solutions to the credit assignment problem, Samuel argued, are generally of this form: they
      are ways of generating-and-testing various types of intermediate feedback."

  - type: ADDRESSES
    source: temporal_differencing
    target: combinatorial_explosion
    note: >
      TD was specifically developed to overcome the exponential cost growth caused by interdependent
      actions, by aggregating rewards rather than tracking individual belief paths.
    quote: >
      "Richard Sutton and his colleague Andrew Barto developed a reinforcement learning approach to
      address combinatorial explosion that they called temporal differencing."

  - type: ADDRESSES
    source: reward_hypothesis
    target: credit_assignment
    note: >
      The reward hypothesis claims that maximizing cumulative expected value via TD is a sufficient
      general solution to any credit assignment problem.
    quote: >
      "Sutton and Barto claim that this approach offers a general solution to the credit assignment
      problem, corresponding to what they call the 'reward hypothesis'."

  - type: ADDRESSES
    source: management_hypothesis
    target: credit_assignment
    note: >
      The management hypothesis offers an alternative by framing credit assignment as managing
      problem decompositions and memories across a society of agents.
    quote: >
      "All of this leads to an overall view of how to address the general problem of credit
      assignment that we will call in this course the 'management hypothesis'."

  # --- CAUSES ---
  - type: CAUSES
    source: interdependence_of_actions
    target: combinatorial_explosion
    note: >
      Each added interdependent action multiplies the number of belief paths to evaluate, causing
      exponential growth in the cost of trial-and-error learning.
    quote: >
      "a linear increase in interdependent actions leads to a combinatorial increase in the cost
      of trial-and-error learning… even small increases in the number of interdependent actions…
      overwhelm the effectiveness of trial-and-error learning policies."

  - type: CAUSES
    source: combinatorial_explosion
    target: superstitious_learning
    note: >
      Combinatorial explosion makes adequate feedback collection impossible, so agents reinforce
      beliefs that may be false rather than causally accurate.
    quote: >
      "Combinatorial explosion helps explain why our three organizations struggled to assign credit…
      they could not tell if the beliefs they reinforced about these actions were true or just 'superstitious'."

  # --- COMPLICATES ---
  - type: COMPLICATES
    source: delayed_feedback
    target: credit_assignment
    note: >
      Delayed feedback makes it difficult to trace outcomes back to the specific earlier actions
      responsible for them.
    quote: >
      "Feedback about goals… was either delayed until well after actions were generated, or ambiguous."

  - type: COMPLICATES
    source: ambiguous_feedback
    target: credit_assignment
    note: >
      Ambiguous feedback obscures the causal link between actions and outcomes, so agents cannot
      reliably identify which actions deserve credit.
    quote: >
      "there was no easy way to know whether they learned the right things due to these challenges
      of assigning credit of delayed and ambiguous feedback regarding interdependent actions."

  - type: COMPLICATES
    source: sparse_feedback
    target: credit_assignment
    note: >
      Sparse feedback leaves most actions unevaluated, making it impossible to assign credit
      broadly across an agent's repertoire of possible behaviors.
    quote: >
      "Minsky argued feedback is not just uncertain or ambiguous but sparse, meaning that only a
      small subset of actions generate feedback useful for assigning credit."

  - type: COMPLICATES
    source: interdependence_of_actions
    target: credit_assignment
    note: >
      When actions are interdependent, isolating the contribution of any single action is
      confounded by the effects of all other simultaneous or sequential actions.
    quote: >
      "We will refer to this requirement as the challenge of assigning credit arising from the
      interdependence of actions."

  # --- REQUIRES ---
  - type: REQUIRES
    source: credit_assignment
    target: feedback
    note: >
      Credit assignment is fundamentally about using feedback to evaluate individual actions;
      the concept cannot be understood without prior understanding of what feedback is.
    quote: ~

  # --- PART-OF ---
  - type: PART-OF
    source: policy
    target: reinforcement_learning
    note: >
      Policy is the central mechanism in RL that defines how credit is assigned via belief updates
      after each action.
    quote: >
      "a policy in reinforcement learning is a set of rules defining how to update probabilities
      of beliefs about actions."

  - type: PART-OF
    source: learning_rate
    target: policy
    note: >
      The learning rate is the specific parameter that operationalises a RL policy — it determines
      how much each trial updates the agent's beliefs.
    quote: >
      "The policy refers to the amount of updating after each action, called a learning rate,
      that ranges from 0 to 1"

  - type: PART-OF
    source: beliefs
    target: policy
    note: >
      In RL, beliefs are the probability estimates for actions that the policy updates after each
      trial; they are the state the policy operates on.
    quote: >
      "we will call these probabilities for generating actions 'beliefs', in that they capture not
      facts about reality per se, so much as an estimate by some agent of how much credit individual
      actions should get"

  - type: PART-OF
    source: value_function
    target: temporal_differencing
    note: >
      The value function is the data structure TD operates on — it aggregates rewards across
      interdependent actions without requiring explicit belief paths.
    quote: >
      "an agent may learn to act effectively by assigning credit to a much simpler 'value function'
      that only estimates actions' aggregate rewards"

  - type: PART-OF
    source: maximize_rewards
    target: reinforcement_learning
    note: >
      Maximizing cumulative rewards is the fundamental objective that defines reinforcement learning
      as a paradigm.
    quote: >
      "The overall goal in reinforcement learning is to 'maximize rewards'."

  - type: PART-OF
    source: exploration_exploitation_tradeoff
    target: reinforcement_learning
    note: >
      The exploration-exploitation tradeoff is the central design challenge inherent to RL — the
      core tension the paradigm must resolve.
    quote: >
      "The need to balance the efficiency and effectiveness of these policies is famously called
      the exploration-exploitation tradeoff. This tradeoff frames the solution to the fundamental
      problem of credit assignment in our first AI idea."

  - type: PART-OF
    source: generate_and_test
    target: credit_assignment
    note: >
      Generate-and-test is the basic action mechanism shared across all instances of credit
      assignment: agents generate actions, test effects, and modify accordingly.
    quote: >
      "all three examples involved (1) goal-directed agents who (2) generated actions (3) tested
      the effects of actions on goals using (4) trial-and-error feedback, and used this feedback
      to (5) modify actions."

  - type: PART-OF
    source: delegation
    target: society_of_mind_hypothesis
    note: >
      Delegation is the fundamental action primitive in the society of mind — every agent acts by
      delegating subproblems to subordinate specialized agents.
    quote: >
      "Geoffrey is a sort of 'CEO' agent, whose actions manage lower-level agents in his mind or
      body needed to construct the maze."

  - type: PART-OF
    source: agent_specialization
    target: society_of_mind_hypothesis
    note: >
      Each agent in the society of mind is specialized for a narrow task and cannot act alone;
      specialization is what makes delegation possible.
    quote: >
      "'Add' itself does not actually know how to construct the walls. It does know, however,
      that it needs another agent 'Grasp' to pick up the actual blocks"

  - type: PART-OF
    source: organizational_memory
    target: management_hypothesis
    note: >
      Managing memories about problem decompositions is a core requirement of the management
      hypothesis alongside managing delegation structures.
    quote: >
      "he also needs to simplify all these memories, such as decomposing agents into hierarchical
      levels and assigning credit to their actions at these aggregate levels, akin to managing
      an organization."

  - type: PART-OF
    source: hierarchical_management
    target: management_hypothesis
    note: >
      Hierarchical management of agents is the structural feature that allows the management
      hypothesis to handle complexity by operating at different levels of abstraction.
    quote: >
      "he also needs to simplify all these memories, such as decomposing agents into hierarchical
      levels and assigning credit to their actions at these aggregate levels, akin to managing
      an organization."

  # =========================================================
  # MODULE 2: Information Processing
  # Source: Course Notes, Session 2 — Information Processing - FAB.pdf
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: credit_assignment
    target: information_processing
    note: >
      The text explicitly reframes credit assignment as a specific form of information processing —
      the evaluation of symbolic patterns to determine which actions deserve credit.
    quote: >
      "Assigning credit is an information process of evaluating (i.e., matching or recognizing)
      patterns in symbols about problems."

  - type: IS-A
    source: shannon_information
    target: syntactic_information
    note: >
      Shannon's entire approach is built on the premise that information can be treated as
      syntactic patterns in bit strings, independent of meaning.
    quote: >
      "We will understand the Shannon information approach in terms of three assumptions:
      information processing as syntactic."

  - type: IS-A
    source: simon_information
    target: semantic_information
    note: >
      Simon's approach is defined by the primacy of semantic content — information must carry
      meaning that agents can interpret, not just statistical patterns.
    quote: >
      "We will contrast Simon information from Shannon's approach in terms of three assumptions:
      information processing as semantic and not just syntactic."

  - type: IS-A
    source: shannon_entropy
    target: entropy
    note: >
      Shannon entropy is a specific mathematical formalization of the thermodynamic entropy
      concept, applied to probability distributions over messages.
    quote: >
      "A crowning achievement of Shannon is to formalize a measure of uncertainty… that he
      called 'entropy', named for its similarity to entropy in thermodynamics."

  - type: IS-A
    source: digital_abstraction
    target: convenient_fictions
    note: >
      The digital abstraction is one of the convenient fictions the course asks students to
      maintain — treating information as a symbolic thing independent of physical substrate.
    quote: >
      "this symbol manipulation assumption will require us to maintain a second fiction, called
      the 'digital abstraction', which is that we can talk about information as a symbolic thing,
      independent of the physical world."

  # --- PART-OF ---
  - type: PART-OF
    source: bit
    target: shannon_information
    note: >
      Bits are the fundamental unit of Shannon information — the atomic building blocks from
      which all syntactic messages are composed.
    quote: >
      "Shannon proposed binary digits — 0's or 1's — that he called 'bits' as the building
      block units of syntactic information processing."

  - type: PART-OF
    source: bit_strings
    target: shannon_information
    note: >
      Bit strings are the patterns of bits that encode all messages in Shannon's framework.
    quote: >
      "Bits are linked together into 'messages' as patterns of 0's and 1's called bit strings."

  - type: PART-OF
    source: shannon_entropy
    target: shannon_information
    note: >
      Shannon entropy is the central measure of information quantity in Shannon's framework,
      quantifying uncertainty reduction from receiving a message.
    quote: >
      "the amount of information in a message… refers to the uncertainty reduced about the
      probability distribution of outcomes from receiving a compressed message."

  - type: PART-OF
    source: channel_capacity
    target: shannon_information
    note: >
      Channel capacity is the physical constraint that limits how much information can be
      transmitted, and is central to Shannon's theory.
    quote: >
      "Shannon described these limits as arising from how communication… ultimately happens
      over physical channels, or restricted pathways to send and receive messages."

  - type: PART-OF
    source: bandwidth
    target: channel_capacity
    note: >
      Bandwidth is the measure of channel capacity — the amount of information that can be
      processed per unit of time over a given channel.
    quote: >
      "Limits to channel capacity mean that only a certain amount of information, or 'bandwidth',
      can be processed at a certain speed over any one period of time."

  - type: PART-OF
    source: noise
    target: channel_capacity
    note: >
      Noise is defined as the inaccurate transmission of bit strings due to channel capacity
      limits; it is the failure mode of any channel.
    quote: >
      "Channel capacity limits mean that information in messages is what Shannon called 'noisy'
      — that the symbolic patterns encoded into bit strings are only communicated with a certain
      probability."

  - type: PART-OF
    source: signal_to_noise_ratio
    target: channel_capacity
    note: >
      The signal-to-noise ratio measures how reliably a channel communicates messages and is the
      key performance metric of channel capacity.
    quote: >
      "The signal-to-noise ratio is a measure of how reliable a message can be communicated."

  - type: PART-OF
    source: encoding
    target: bit_strings
    note: >
      Encoding is the process of converting symbols into bit strings — it is the operation that
      creates bit string representations from source messages.
    quote: >
      "Converting symbols into bit strings is called encoding a message."

  - type: PART-OF
    source: decoding
    target: bit_strings
    note: >
      Decoding is the reverse: reconstructing the original symbolic message from its bit string
      representation.
    quote: >
      "reconstructing the symbols in the original message is called decoding it."

  - type: PART-OF
    source: compression
    target: shannon_information
    note: >
      Compression reduces the bit string representation by removing statistical redundancies,
      and is a core operation in the Shannon information framework.
    quote: >
      "allows the original message to be 'compressed' into a smaller number of bit strings that,
      in turn, reduces the processing capacity required."

  - type: PART-OF
    source: statistical_redundancy_removal
    target: compression
    note: >
      Statistical redundancy removal is the specific mechanism by which compression is achieved
      — redundant symbol sequences are identified and eliminated.
    quote: >
      "since messages often have redundant sequences of symbols (e.g., repeating the same words
      or grammatical patterns), the encoded bit strings… are not a true measure of the number of
      bits required to communicate the message."

  - type: PART-OF
    source: lists
    target: simon_information
    note: >
      Lists — meaningful symbol patterns with a name and items — are Simon's fundamental
      informational unit, replacing Shannon's meaningless bit strings.
    quote: >
      "Simon proposed that… the bits should be organized into meaningful patterns… that he
      called lists."

  - type: PART-OF
    source: abstraction
    target: simon_information
    note: >
      Abstraction — describing problems at higher levels to reduce the number of informational
      units needed — is the core mechanism of Simon information.
    quote: >
      "One is better off just trying to find better and higher-level abstractions (i.e.,
      decompositions of problems) to avoid having to process so much information in the first place."

  - type: PART-OF
    source: modularity
    target: simon_information
    note: >
      Modularity — decomposing problems into meaningful named components — is the credit
      assignment strategy that follows directly from Simon's informational approach.
    quote: >
      "having a system learn to assign credit… through how problem-solving is abstracted into
      meaningful modules akin to Simon's watchmaker is called a modularity strategy."

  - type: PART-OF
    source: physical_symbol_system_hypothesis
    target: simon_information
    note: >
      The physical symbol system hypothesis is the theoretical claim underlying Simon information:
      that meaningful symbols are a necessary and sufficient basis for intelligence.
    quote: >
      "In their Turing Award speech, Simon and his colleague Newell explained this idea…
      through what they called the 'physical symbol system hypothesis' (1976)."

  - type: PART-OF
    source: pattern_matching
    target: symbol_manipulation
    note: >
      Pattern matching (exact symbol matching) is one of the two basic operations underlying
      all symbol manipulation.
    quote: >
      "Such evaluation may involve either pattern matching (matching exact symbols) or pattern
      recognition (matching similar symbols)."

  - type: PART-OF
    source: pattern_recognition
    target: symbol_manipulation
    note: >
      Pattern recognition (fuzzy/similar symbol matching) is the second basic operation
      underlying symbol manipulation.
    quote: >
      "Such evaluation may involve either pattern matching (matching exact symbols) or pattern
      recognition (matching similar symbols)."

  - type: PART-OF
    source: symbol_manipulation
    target: information_processing
    note: >
      Symbol manipulation — applying operations to symbolic patterns — is the basic action
      underlying all information processing.
    quote: >
      "we will refer to all basic actions underlying information processing or message passing
      as 'symbol manipulation' operations."

  - type: PART-OF
    source: digital_abstraction
    target: shannon_information
    note: >
      The digital abstraction is a foundational assumption of Shannon's approach — treating
      information as symbolic regardless of the physical substrate.
    quote: >
      "The digital abstraction… enables us to relate any actions (analog or otherwise) to a
      single, coherent system for evaluating and transforming patterns of symbols."

  - type: PART-OF
    source: brute_force
    target: shannon_information
    note: >
      Brute force is the credit assignment strategy that naturally follows from Shannon
      information: scale up channel capacity to overcome combinatorial complexity.
    quote: >
      "having a system learn to assign credit intelligently just by pairing a simple strategy with
      essentially big computers is called a brute force strategy."

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: shannon_information
    target: simon_information
    note: >
      The two paradigms differ fundamentally in their units of information (bits vs lists),
      their view of meaning (syntactic vs semantic), and their solution to credit assignment
      (brute force vs modularity).
    quote: >
      "To explore this question robustly, we will… consider two paradigmatically-different
      approaches to information in the study of AI systems and organizations."

  - type: CONTRASTS-WITH
    source: syntactic_information
    target: semantic_information
    note: >
      Syntactic information strips away meaning and treats symbols as arbitrary patterns;
      semantic information treats meaning as essential to intelligent processing.
    quote: >
      "information processing as semantic and not just syntactic… the fundamental units of
      information for intelligence as meaningful lists, rather than meaningless bits."

  - type: CONTRASTS-WITH
    source: bit
    target: lists
    note: >
      Bits are meaningless atomic units; lists are meaningful named structures. They represent
      the opposing views of what constitutes the basic unit of information.
    quote: >
      "Simon proposed that, rather than reduce symbols to individual bits that are formed into
      meaningless strings of 0's and 1's, the bits should be organized into meaningful patterns
      … that he called lists."

  - type: CONTRASTS-WITH
    source: brute_force
    target: modularity
    note: >
      Brute force scales syntactic processing capacity; modularity works by finding better
      semantic abstractions. They are the two opposing strategies for handling combinatorial
      explosion in credit assignment.
    quote: >
      "You should see that a belief in modularity rests on a specific assumption… that contrasts
      with what is implied by Shannon information."

  - type: CONTRASTS-WITH
    source: iid_problems
    target: ood_problems
    note: >
      IID problems have a stable probability distribution that agents can learn; OOD problems
      violate this assumption, making statistical credit assignment unreliable.
    quote: >
      "These and many other possible violations of the basic IID coin toss set-up can be thought
      of as out-of-distribution, or 'OOD'."

  # --- ATTRIBUTED-TO ---
  - type: ATTRIBUTED-TO
    source: shannon_information
    target: claude_shannon
    note: >
      Shannon developed his information theory at Bell Labs in the 1930s–1940s, published in
      his landmark 1948 paper.
    quote: >
      "In a 1948 paper, Shannon introduced an approach to thinking about information that has
      been so influential… that it is still often simply called 'information theory'."

  - type: ATTRIBUTED-TO
    source: information_theory
    target: claude_shannon
    note: >
      Information theory is the name widely given to Shannon's 1948 framework for measuring
      and transmitting information.
    quote: >
      "In a 1948 paper, Shannon introduced an approach… that is still often simply called
      'information theory'."

  - type: ATTRIBUTED-TO
    source: shannon_entropy
    target: claude_shannon
    note: >
      Shannon formalized entropy as a measure of uncertainty in probability distributions
      over messages.
    quote: >
      "A crowning achievement of Shannon is to formalize a measure of uncertainty… that he
      called 'entropy'."

  - type: ATTRIBUTED-TO
    source: simon_information
    target: herbert_simon
    note: >
      Simon developed his semantic information approach through his research on organizational
      decision-making from the 1930s–1950s, synthesized in his famous 1962 paper.
    quote: >
      "In a famous 1962 paper titled 'The Architecture of Complexity', Herbert Simon described
      an alternative to Shannon's approach."

  - type: ATTRIBUTED-TO
    source: physical_symbol_system_hypothesis
    target: herbert_simon
    note: >
      Simon and Newell proposed the physical symbol system hypothesis in their joint Turing
      Award lecture in 1976.
    quote: >
      "In their Turing Award speech, Simon and his colleague Newell explained this idea…
