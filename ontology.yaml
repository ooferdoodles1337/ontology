# ============================================================
# FAB 2026 — Course Ontology Scaffolding
# ============================================================
# This file defines the vocabulary (concepts, people, examples)
# and the relation schema. Relation instances are populated in
# the next step.
#
# RELATION TYPES
# ──────────────
# IS-A          A is a more specific version of B. A inherits all
#               properties of B but adds something that narrows its
#               scope. Anything true of B is also true of A, but not
#               the reverse.
#               Example: Hill-Climbing IS-A Informed Search.
#
# PART-OF       A is a component that constitutes B as a whole. A does
#               not inherit B's properties; it contributes to B's
#               existence or function. Removing A makes B incomplete.
#               Example: Shannon Entropy PART-OF Information Theory.
#
# CAUSES        A produces or gives rise to B as a consequence. A
#               precedes B and is responsible for B occurring.
#               Example: Sparse Feedback CAUSES Superstitious Learning.
#
# CONTRASTS-WITH A and B differ meaningfully along a shared dimension,
#               and neither can be fully defined without referencing
#               the other. The relation is bidirectional.
#               Example: Hard Constraints CONTRASTS-WITH Soft Constraints.
#
# EXAMPLE-OF    A is a concrete instantiation that illustrates the
#               abstract concept B. A does not define B and is not a
#               subtype of B. It makes B tangible by showing what B
#               looks like in practice.
#               Example: Mycin EXAMPLE-OF Expert Systems.
#
# REQUIRES      A cannot be meaningfully understood without first
#               understanding B. This is an epistemic dependency on
#               the learner, not a causal relation between the concepts
#               themselves.
#               Example: Backtracking REQUIRES Partial Assignment.
# ============================================================


