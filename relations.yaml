  - type: IS-A
    source: search
    target: credit_assignment
    note: >
      Search is a specific strategy for assigning credit by dividing
      complex problems into plans using heuristics.

  - type: IS-A
    source: evolutionary_strategies
    target: credit_assignment
    note: >
      Evolutionary strategies are a population-level approach to
      assigning credit through adaptation.

  - type: IS-A
    source: representation
    target: credit_assignment
    note: >
      Representation strategies assign credit by exposing natural
      constraints inherent in problems.

  - type: IS-A
    source: krr
    target: credit_assignment
    note: >
      KRR assigns credit through representing and reasoning about
      knowledge across situations.

  - type: CONTRASTS-WITH
    source: von_neumann_search
    target: effectuation
    note: >
      Von Neumann search plans ahead with full game rules; effectuation
      constructs understanding piecemeal without full information.

  - type: CONTRASTS-WITH
    source: constraint_propagation
    target: search
    note: >
      Constraint propagation sends information across spatial network
      links; search traverses sequential paths in a tree.

