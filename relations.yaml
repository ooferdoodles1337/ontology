      Crossover requires chromosome-level representations to combine.

  - type: REQUIRES
    source: mutation
    target: genes
    note: >
      Mutation operates on individual genes within a chromosome.

  - type: REQUIRES
    source: exploration_exploitation_tradeoff
    target: performance_landscape
    note: >
      The exploration-exploitation tradeoff is meaningful only within
      a performance landscape that has topological features.

  - type: REQUIRES
    source: long_jumping
    target: exploration
    note: >
      Long-jumping across the landscape requires exploratory (risky,
      large) modifications to actions.

  - type: REQUIRES
    source: hill_climbing
    target: exploitation
    note: >
      Hill-climbing requires exploiting local gradient information.

  - type: REQUIRES
    source: giant_strides
    target: mesa_landscape
    note: >
      Giant strides are needed specifically in mesa landscapes where
      there are no gradients for hill-climbing.

  - type: REQUIRES
    source: propagator_model
    target: constraint_propagation
    note: >
      The propagator model works by propagating constraint information
      among connected objects.

  - type: REQUIRES
    source: adaptation
    target: fitness
    note: >
      Adaptation depends on measuring fitness (ability to survive and
      reproduce relative to the environment).

