  # =========================================================
  # MODULE 4: Representation
  # =========================================================

  # --- IS-A ---
  - type: IS-A
    source: representation
    target: schema
    note: >
      A representation used in an AI system or organization is called
      a schema (they are synonymous in the course).

  - type: IS-A
    source: csp
    target: search
    note: >
      CSPs are a type of search that interleaves representations
      (constraint propagation) with heuristic search.

  - type: IS-A
    source: bayesian_networks
    target: constraint_network
    note: >
      Bayesian networks (causal nets) are a specific type of constraint
      network using conditional probabilities.

  - type: IS-A
    source: boltzmann_machines
    target: constraint_network
    note: >
      Boltzmann machines are a constraint network using binary variables
      and learned correlation weights.

  - type: IS-A
    source: expert_systems
    target: knowledge_base
    note: >
      Expert systems store heuristic rules in a knowledge base acquired
      from domain experts.

  - type: IS-A
    source: hard_constraints
    target: variables
    note: >
      Hard constraints are restrictions where violation eliminates a
      value from any possible solution.

  - type: IS-A
    source: soft_constraints
    target: variables
    note: >
      Soft constraints impose a cost on violation but do not eliminate
      the value from solutions.

  - type: IS-A
    source: unary_constraint
    target: hard_constraints
    note: >
      A unary constraint restricts the values of a single variable.

  - type: IS-A
    source: binary_constraint
    target: hard_constraints
    note: >
      A binary constraint restricts the relation between two variables.

  - type: IS-A
    source: higher_order_constraint
    target: hard_constraints
    note: >
      Higher-order constraints restrict relations among three or more
      variables; they can usually be reduced to binary constraints.

  - type: IS-A
    source: forward_checking_search
    target: csp
    note: >
      Forward checking interleaves a search action with constraint
      propagation to check consistency.

  - type: IS-A
    source: arc_consistency
    target: constraint_propagation
    note: >
      Arc consistency is a specific propagation technique ensuring
      every value in a domain has a consistent partner.

  - type: IS-A
    source: gradient_descent
    target: hill_climbing
    note: >
      Gradient descent is hill-climbing viewed from the minimization
      perspective (the landscape flipped upside down).

  - type: IS-A
    source: autoencoders
    target: boltzmann_machines
    note: >
      Autoencoders are models for automatically encoding correlations,
      performing similar functions to Boltzmann machines.

  - type: IS-A
    source: representation_learning
    target: learning
    note: >
      Representation learning refers to learning constraint networks
      (specifically correlation-based ones in deep learning).

  # --- PART-OF ---
  - type: PART-OF
    source: variables
    target: csp
    note: >
      Variables are one of the three defining elements of any constraint
      problem.

  - type: PART-OF
    source: domain
    target: csp
    note: >
      Domains (allowable values for variables) are a defining element
      of constraint problems.

  - type: PART-OF
    source: constraint_propagation
    target: constraint_network
    note: >
      Constraint propagation (sending information across network links)
      is the core mechanism of constraint networks.

  - type: PART-OF
    source: conditional_probabilities
    target: bayesian_networks
    note: >
      Conditional probabilities between parent and child variables
      define the constraints in a Bayesian network.

  - type: PART-OF
    source: dag
    target: bayesian_networks
    note: >
      A directed acyclic graph is the required structure for a
      Bayesian network.

  - type: PART-OF
    source: parent_variable
    target: bayesian_networks
    note: >
      Parent variables are those that cause or direct child variables
      in a Bayesian network.

  - type: PART-OF
    source: child_variable
    target: bayesian_networks
    note: >
      Child variables depend on parent variables in a Bayesian network.

  - type: PART-OF
    source: binary_variables_boltzmann
    target: boltzmann_machines
    note: >
      Binary (1,0) variables resembling on/off neurons are the
      building blocks of Boltzmann machines.

  - type: PART-OF
    source: weights_boltzmann
    target: boltzmann_machines
    note: >
      Weights (correlation probabilities) are the learned constraints
      in a Boltzmann machine.

  - type: PART-OF
    source: productions
    target: expert_systems
    note: >
      Productions (if-then heuristic rules) are the knowledge units
      stored in expert systems.

  - type: PART-OF
    source: partial_assignment
    target: state
    note: >
      A partial assignment (only some variables assigned values)
      characterizes most intermediate states.

  - type: PART-OF
    source: complete_assignment
    target: state
    note: >
      A complete assignment (all variables assigned) characterizes
      a terminal state.

  - type: PART-OF
    source: consistent_assignment
    target: solution
    note: >
      A consistent assignment (satisfies all constraints) is required
      for a solution.

  # --- CAUSES ---
  - type: CAUSES
    source: constraint_propagation
    target: intermediate_feedback
    note: >
      Propagating information across a constraint network generates
      intermediate feedback for credit assignment.

  - type: CAUSES
    source: entropy_minimization_boltzmann
    target: representation_learning
    note: >
      Minimizing entropy (cost) across the Boltzmann network is the
      learning mechanism that produces learned representations.

  - type: CAUSES
    source: knowledge_acquisition_bottleneck
    target: brittleness
    note: >
      The difficulty of extracting all expert heuristic rules
      contributes to the brittleness of expert systems.

  # --- CONTRASTS-WITH ---
  - type: CONTRASTS-WITH
    source: hard_constraints
    target: soft_constraints
    note: >
      Hard constraints are binary (satisfied/violated); soft constraints
      impose costs on a continuum.

  - type: CONTRASTS-WITH
    source: constraint_network
    target: search_tree
    note: >
      A constraint network has informative links (constraints) among
      variables; a search tree has sequential links among states.
      A search tree is a highly restricted type of constraint network.

  - type: CONTRASTS-WITH
    source: physics_hypothesis
    target: society_of_mind_hypothesis
    note: >
      The physics hypothesis (Hinton/Boltzmann) reduces intelligence to
      simple statistical laws; the society of mind hypothesis requires
      diverse knowledge representations.

  - type: CONTRASTS-WITH
    source: bayesian_networks
    target: boltzmann_machines
    note: >
      Bayesian nets have directed acyclic structure with causal relations;
      Boltzmann machines have undirected cyclic structure with correlations.

  - type: CONTRASTS-WITH
    source: expert_systems
    target: representation_learning
    note: >
      Expert systems acquire knowledge by codifying expert heuristics;
      representation learning discovers patterns from large data volumes.

  # --- EXAMPLE-OF ---
